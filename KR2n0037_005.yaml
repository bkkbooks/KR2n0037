body:
  text: 金石文字記卷五崑山顧炎武撰唐國子學石經周易二萬四千四百三十七字尚書二萬七千一百三十四字毛詩四萬八百四十八字周禮四萬九千五百一十六字儀禮五萬七千一百一十一字禮記九萬八千九百九十四字春秋左氏傳一十九萬八千九百四十五字公羊傳四萬四千七百四十八字穀梁傳四萬二千八十九字孝經二千闕百闕十三字論語一萬六千五百九字爾雅一萬七百九十一字五經文字九經字樣九經并孝經論語爾雅字樣等都計六十五萬二百五十二字今在西安府儒學其末有年月一行題名十行曰開成二年丁巳歲月次于玄日惟丁亥書石學生前四門館明經臣艾居晦書石學生前四門館明經臣陳玠書石學生前文學館明經臣闕書石官將仕郎守潤州句容縣尉臣段絳校勘兼看書上石官將仕郎守祕書省正字臣柏皓校勘兼看書上石官將仕郎守四門助教臣陳莊士覆定字體官翰林待詔朝議郎權知沔王友上柱國賜緋魚袋臣唐玄度校勘官兼專知都勘定經書檢校刋勒上石朝議郎守國子毛詩博士上柱國臣章師道朝散大夫守國子司業騎都尉賜緋魚袋臣楊敬之都檢校官銀青光祿大夫闕國子祭酒同中書門下平章事太清宫使監修國史上柱國滎陽郡開國公食邑二千户臣覃官銜缺十字九經字樣云右僕射兼門下侍郎國子祭酒平章事覃按舊唐書開成元年正月中書門下奏起居舍人集賢殿學士周墀監察御史張次宗禮部員外郎孔溫業兵部員外郎集賢殿直學士崔球等同勘校經典釋文又云令率更令韓泉充詳定石經官新唐書亦列墀等四人而碑並不載舊唐書文宗紀開成二年宰臣判國子祭酒鄭覃進石壁九經一百六十卷時上好文覃以經義啓導稍折文章之士遂奏置五經博士依漢蔡雍刋碑列於太學創立石壁九經諸儒校正訛謬上又令翰林勒字官唐玄度復校字體又乖師法故石經立後數十年名儒皆不窺之以為蕪纍甚矣舊史之評如此愚初讀而疑之又見新書無貶辭以為石壁九經雖不逮古人亦何遽不賢於寺碑冢碣及得其本而詳校之乃知經中之繆戾非一而劉昫之言不誣也略識于左周易君子以裒多益寡裒誤作褒悔吝者言乎其小疵也言誤作存其孰能與於此哉脫於字周易繫辭下第八脫下字易窮則變變則通通則久是以自天祐之吉無不利下多一也字力小而任重小誤作少傷於外者必反其家其誤作於決必有所遇脫所字蠱則飭也飭誤作飾豐多故親寡旅也故下多一也字姤遇也姤誤作遘其與今文不同而兩通者終來有他吉他作它剛健篤實輝光輝作輝君子以治厯明時厯作厯可與佑神矣佑作祐其受命也如嚮嚮作響兼三才而兩之三才之道也才皆作材其一字而前後不同者包蒙包荒包承包羞繫于包桑繫辭下同包皆作苞包有魚包無魚以杞包爪包皆作包問以辨之由辨之不早辨也其辨明也明辨晳也辨吉凶者存乎辭困德之辨也井以辨義辨是與非辨皆作辨君子以類族辨物剝牀以辨君子以慎辨物居方復小而辨於物辨皆作辨其旁注者至靜而德方德下添一也字賁亨小利有攸往利下添一貞字其先誤而後改者略例筌誤作荃愈誤作喻二無誤作無皆即其誤改之其標題周易繫辭上第七周易繫辭第八周易説卦第九皆八分書而周易序卦第十周易雜卦第十一皆正書雖依古注本附於第九之內以正書為别終似未安尚書乃祖乃父丕乃告我髙后曰作丕刑于朕孫乃父誤作先父孫上多一子字臣下罔攸稟令令誤作命若藥弗瞑眩藥誤作樂王乃徇師而誓徇誤作循乃汝世讎世誤作誓太保乃以庶殷攻位于洛汭攻誤作公用端命于上帝于誤作豫其與今文不同而兩通者敢對揚天子之休命無之字其旁注者豫有亂臣十人臣字旁注惟婦言是用是字旁注釋箕子囚封比干墓式商容閭干下容下各添一之字詩小戎序國人則矜其車甲甲誤作田舒懮受兮懮誤作憂豫尾翛翛翛誤作修戎車既飭飭誤作飾以祈黃耉祈誤作祁涼曰不可涼誤作諒無此疆爾界界誤作介侯疆侯以疆誤作強其與今文不同而兩通者雍雍鳴鴈雍作雍之死矢靡他他作它不知我者謂我士也驕作不我知二章同和鸞雍雍雍作雍何人斯序故蘇公作是詩以絶之也以作而維塵雍兮雍作雍既匡既敕敕作勑其政不獲政從鄭箋作正尚不愧于屋漏愧作愧于彼西雍肅雍和鳴有來雍雍雍皆作雍屢豐年屢作婁其先誤而後改者抱衾與裯裯誤作稠不瑕有害瑕誤作遐鱣鮪發發發誤作撥噂沓背憎噂誤作蹲如彼遡風遡誤作訴駉駉牡馬牡皆誤作牧皆即其誤改之云何其盱脫其字添周禮女史八人史誤作使太宰三曰郊甸之賦郊誤作邦內饔豕盲視而交睫豕誤作施典枲掌布緦縷紵之麻草之物緦誤作絲牛人軍事共其犒牛犒誤作稿司市市司帥賈師而從賈誤作胥肆長掌其戒令令誤作禁鞮鞻氏府一人一誤作八鬯人禜門用瓢齎用誤作明司几筵設莞筵紛純筵誤作席大司樂大㲈㲈誤作磬王大食三侑侑誤作宥大師令奏鼓􅉧鼓誤作瞽大祝四曰禜禜誤作榮司常家各象其號象誤作相凡以神仕者仕誤作士小子史二人二誤作一大司馬旗居卒間居誤作車考工記妢胡之笴笴誤作笱矢人前弱則俯俯誤作勉其與今文不同而兩通者醫師疕瘍者疕上多一有字野廬氏有相翔者誅之誅上多一則字邦之大師大上多一有字庭氏以救日之弓與救月之矢射之射上多一夜字儀禮士冠禮捷柶興捷誤作建鄉射禮司射適堂西袒決袒誤作祖楅髤橫而奉之奉誤作拳大夫與士射袒纁襦纁誤作薰燕禮右祭脯醢脯誤作酺大射儀賔升成拜拜誤作敗坐授瑟乃降授誤作受聘禮賔既將公事復見訝以其摰訝誤作之公食大夫禮陳鼎於碑南南面西上脫一南字覲禮天子賜舍曰伯父脫曰字士喪禮祭服不倒倒誤作到少牢饋食禮如筮日之儀儀誤作禮主婦被錫衣侈袂侈誤作移下同祝延尸延誤作筵有司徹二手執挑七枋挑誤作桃主婦洗爵于房中脫爵字主婦北面答拜受爵尸降筵受主婦爵以降誤作受尸爵主人降洗爵爵誤作觶下主人實爵並同主人拜受爵尸拜送脫爵字其與今文不同而兩通者鄉射禮適左個中亦如之亦作皆燕禮小臣又請媵爵者二大夫媵爵如初大夫下更有大夫二字禮記御刪定月令在曲禮之前月令人乃遷徙徙誤作徒其器閎以奄奄誤作掩檀弓上周公蓋祔祔誤作附王制示弗故生也示誤作亦禮器饗帝於郊而風雨節寒暑時脫節字學記燕辟廢其學辟誤作譬喪大記男子出寢門外脫外字子大夫公子衆士食粥脫衆士二字哀公問如此則國家順矣脫則字坊記民猶薄於孝而厚於慈猶下多一有字中庸待其人而後行而誤作然君子之所不可及者脫之字緇衣有國家者章義􅓠惡脫家字儒行慎靜而尚寬脫而字大學人之其所親愛而辟焉五辟字皆誤作譬若有一個臣個誤作介其與今文不同而兩通者檀弓上有亡惡乎齊亡作無歲一漆之一作一樂記非聽其鏗鏘而已也鏘作鎗雜記上客立于門西于作於雜記下泄柳之母死泄作世喪大記命婦汜拜衆賔於堂上於作于主人先俟于門外于作於中庸可一言而盡也一作一問喪祭之宗廟以鬼享之享作饗大學堯舜帥天下以仁二帥字皆作率昏義祖廟既毁教于宗室于作於射義是以諸侯君臣以作故其先誤而後改者學記教人不盡其材材誤作才故人不耐無樂耐誤作能皆即其誤改之春秋左傳隱元年且告之悔且誤作具五年僖伯稱疾不從疾誤作侯十年伐戴戴誤作載桓二年故封桓叔于曲沃故誤作政六年楚之羸羸誤作嬴以類命為象類誤作德閔二年從曰撫軍軍誤作國僖三年公子友如齊涖盟涖誤作泣四年歸胙于公脫胙字姬置諸宫六日宫誤作公公殺其傅杜原傅誤作傳七年弗可改也已改誤作故十四年公怒止之止誤作上十五年輅秦伯輅誤作轄使郤乞告瑕吕飴甥且召之且誤作國二十五年昏而傅焉傅誤作傳二十七年責無禮也責誤作青郤縠可縠誤作榖三十一年晉新得諸侯新誤作親東傅于濟傅誤作傳三十三年入險而脫入誤作人為從者之淹淹誤作流文元年王使毛伯衛來錫公命錫誤作賜享江芉芉誤作芊二年廢六關關誤作闕七年置文公子焉焉誤作曰十二年太子以夫鍾與郕邽來奔邽誤作封宣二年晉趙盾弒其君夷皋弒誤作殺二年晉侯伐鄭及郔郔誤作延商紂暴虐紂誤作討四年秋公如齊秋誤作利六年離卦誤畫作同人八年殺諸絳市絳誤作終十二年晉師在敖鄗之間師誤作帥十五年吾獲狄土土誤作士十七年盟于卷楚卷誤作巷郤子其或者欲已亂於齊乎乎誤作平十八年凡自虐其君曰弒虐上多一內字成二年及齊師戰于新築師誤作侯且辟左右且誤作旦七年尋蟲牢之盟蟲誤作蠱十七年楚公子櫜師襲舒庸櫜誤作橐襄十年子蟜曰蟜誤作矯今伐其師今誤作令十四年士鞅反反誤作及十七年苟過華臣之門必騁騁誤作聘十九年而視不可含含誤作舍所不嗣事于齊者事誤作是天子令德天誤作夫二十一年欒盈過于周過上多奔楚二字二十三年邾畀我來奔畀誤作卑二十五年先夫當之矣夫誤作天井堙木刋堙誤作煙賦車兵徒卒甲楯之數卒誤作兵二十七年父子死余矣余誤作餘免餘復攻寧氏餘誤作余二十八年重丘之盟未可忘也忘誤作志使析歸父告晏平仲晏誤作宴文子使召之召誤作君慶氏之馬善驚馬誤作焉武王有亂臣十人脫臣字三十年蔡景侯為太子般娶于楚娶誤作聚單公子愆期期誤作旗駟帶追之駟誤作四昭元年今武猶是心也今誤作令二年齊使上大夫送之送誤作逆三年少薑有寵而死薑誤作齊知而復從復誤作弗四年恃險與馬馬誤作焉五年娶於子尾氏娶誤作聚君若歡焉好逆使臣若誤作苦九年無囿猶可囿誤作宥十三年隱太子之子廬歸于蔡廬誤作盧十四年楚子使然丹簡上國之兵於宗丘宗誤作宋二十年余不忍其詬詬誤作詢取人於􅍉苻之澤苻誤作符二十一年心是以感感實生疾感誤作咸二十五年士平出奔楚士誤作氏邊卬為大司徒卬誤作印二十五年季公鳥生申申誤作甲二十七年入于堀室堀誤作􅀈定元年榮駕鵝駕誤作駕三年及邾子盟于拔拔誤作技八年子姑使溷代子代誤作伐十年駟赤謂侯犯曰赤誤作亦哀四年盜殺蔡侯申殺誤作弒蔡昭侯將如吳蔡誤作葬十六年與晉人謀襲鄭晉誤作為二十三年有不腆先人之産馬馬誤作焉二十六年四方其訓之訓誤作順其與今文不同而兩通者宣二年以視諸朝視作示哀十六年此事克則為卿事下有也字其續添者昭二十二年辛丑伐京毁其西南下添子朝奔郊四字春秋公羊傳隱元年何以名字也字上多一不字二年婦人謂嫁曰歸嫁誤作稼三年曷為或言崩或言薨脫上一或字生毋相見死毋相哭毋字並誤作母死毋誤作母死六年吾與鄭人末有成也末誤作未下同十年宋人蔡人衛人伐載載誤作戴桓二年曰有有則此何以書脫一有字隱賢而桓賊也賊誤作賤莊十九年此其言遂何脫其字二十五年求乎隂之道也隂誤作隱三十二年狄伐邢邢誤作刑僖四年南夷與北狄交誤作北夷六年此其言圍何圍下多一者字二十六年乞師者何脫師字三十年歸惡乎元咺也乎誤作于三十三年百里子與蹇叔子百誤作伯文四年其謂之逆婦薑于齊何何誤作河宣十五年然後歸爾爾誤作耳成十五年成公幼幼誤作憂臧宣叔者相也叔誤作公襄十四年季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾婁人于戚邾婁人脫人字十七年春王二月二誤作三十九年為其驕蹇為誤作或二十九年許人子者必使子也人下脫子字昭九年其言陳火何脫陳字定元年立煬宫宫誤作公四年夷狄也而憂中國而誤作其哀四年盜殺蔡侯申殺誤作弒六年齊國夏及髙張來奔髙上多一齊字十四年顔淵死子曰子上多一孔字其與今文不同而兩通者隱四年隱公曰否作隱曰吾否桓六年簡車徒也徒作馬淫乎蔡乎作于十一年祭仲者何鄭相也相上有之字文六年何以謂之天無是月非常月也是月下更有是月二字宣六年此非弒君而何而作如十年未絶於我也於作于十二年是以君子篤於禮而薄於利下於作于成二年得一貶焉爾一作一襄十二年春王正月正作三二十九年爾殺吾君殺作弒三十一年於是負孝公之周訴天子訴作訴十四年有麏而角者麏作麕其先誤而後改者桓二年此其目言之何目誤作月閔元年盍弒之矣使弒子般弒並誤作殺僖十三年葬陳宣公宣誤作桓成二年及齊侯戰于鞍侯誤作師昭二十五年慶子免君於大難矣脫矣字皆即其誤改之春秋榖梁傳隱元年父者何傅也傅誤作傳四年弒而代之也代誤作伐九年所俠也俠誤作挾莊七年則是雨説也雨誤作兩下同僖五年天子世子世天下也誤作士子二十二年春秋三十有四戰脫有字二十八年晉侯齊師宋師秦師誤作齊侯文二年內大夫可以會外諸侯脫外字三年王子虎卒誤作壬子宣八年以譏乎宣也譏誤作飢襄元年晉侯使荀罃來聘罃誤作嬰二年三年同三年諸侯始失正矣正誤作王六年立異姓以蒞祭祀立上多一非字哀元年此該之變而道之也該誤作郊六年入者內弗受也弗誤作不下同其與今文不同而兩通者僖十七年桓公嘗有存亡繼絶之功脫公字文六年處父主境上事事上多一之字成五年帥羣臣而哭之前作率後作帥其先誤而後改者甚多不具載論語賜也爾愛其羊爾誤作女不知其仁仁誤作人子使漆雕開仕雕誤作雕再斯可矣斯誤作思三人行三上多一我字必有我師焉有誤作得冉有子貢侃侃如也有誤作子告夫三子三上多一二字可與言而不與之言脫之字無求生以害仁仁誤作人吾猶及史之闕文也脫之字稱諸異邦曰諸誤作謂何德之衰衰下多一也字其與今文不同而兩通者女得人焉爾乎爾作耳人潔已以進潔作潔其先脫而後添注者陽貨篇子曰巧言令色鮮矣仁爾雅替戾底廢誤作底砥翿纛也翿誤作翢皇華也誤作華皇赫兮咺兮咺誤作烜是刈是濩濩誤作穫木謂之虡木誤作本何鼓謂之牽牛何誤作河澤烏􅀢􅀢誤作薞莩麻母莩誤作茡穫橐含穫誤作攫柷州木柷誤作祝魚尾謂之丙尾上添一之字燕白脰鳥鳥誤作烏楊鳥白鷢楊鳥誤作鸉鳶鳥醜鳥誤作烏鳥鵲醜鳥誤作烏􅕱大􅕱誤作大麕凡經中二十字皆作草三十字皆作卅按古詩之文多是四言如于三十里三十維物皆四言也則當為三十字史記秦始皇刻石如草有六年維草九年卅有七年則當為草字卅字今改經文而為草卅字非矣凡經中虎字皆缺末筆作虎虓號􅊒叨滮篪褫字皆同避太祖諱淵字皆缺筆作姻亦作避髙祖諱世字皆缺筆作世泄作泄紲作絏棄作棄勩作葉作泄􅀈皆改從云民字皆缺筆作氓作氓岷作㞴汦昏緍痻碈蚊皆改從氏避太宗諱亨字皆作亨避肅宗諱豫字皆缺筆作豫避代宗諱適字皆缺筆作適避德宗諱誦字皆缺筆作誦避順宗諱純字皆缺筆作避憲宗諱恆字皆缺筆作恆避穆宗諱湛字皆缺筆作椹作椹作避敬宗諱乃若髙宗諱治中宗諱顯睿宗諱旦玄宗諱隆基文宗諱涵皆不缺筆者禮天子事七廟自肅至敬七宗而髙祖太宗創業之君不祧者也玄宗以上則祧廟也故不諱册府元龜寶厯元年正月太常寺禮院上言玄宗廟諱準故事祧遷後不當更諱制可文宗則今上也古者卒哭乃諱故生不諱左傳文公宣公卷字更濫惡而成城字皆缺末筆榖梁襄昭定哀四公卷儀禮士昏禮皆然此為朱梁所補刻考之宋劉從乂黎持二記但言韓建劉鄩移石而不言補刻宋建隆三年劉從乂修文宣王廟記言天祐甲子嵗太尉許國公為居守移太學并石經於此甲子歲昭宗遷雒之年許國公者韓建也元祐五年黎持新移石經記則云舊在務本坊自天祐中韓建築新城而石經委棄于野至朱梁時劉鄩守長安從幕吏尹玉羽之請輦入城中置于此地即唐尚書省之西隅也今龍圗吕公領漕陜右以其處窪下命徙置於府學之北墉而建亭焉二説不同朱彛尊曰尹玉羽者京兆長安人以孝行聞劉鄩辟為保大軍節度推官厯雍汴滑兖從事仕後唐至光祿少卿晉髙祖召之辭以老退歸關中嘗著自然經五卷武庫集五十卷其事散見於册府元龜惜歐陽子不為立傳而其書亦不傳於世也然成字缺筆其為梁諱無疑昔人固未嘗遍讀而博考也詳見鎮東軍牆隍廟記下五經文字三卷凡一百六十部三千二百三十五字大厯十一年國子司業張參以説文字林兼采漢石經著為定體按劉禹錫國學新修五經壁記曰大厯中名儒張參為國子司業始詳定五經書於論堂東西廂之壁辨齊魯之音取其宜考古今之文取其正由是諸生之師心曲學偏聽臆説咸束而歸於大同積六十載崩剝汙衊泯然不鮮今天子尚文章尊典籍國學上言遽賜千萬時祭酒皥博士公肅韋公肅遂以羡贏再新壁書懲前土塗不克以夀乃折堅木負墉而比之其製如版牘而髙廣其平如粉澤而潔滑背施隂關使衆如一附離之際無迹而尋堂皇靚深兩屋相照申命國子能通法書者分章揆日懸其業而繕寫焉此文當作於太和年間自土塗而木版自木版而石壁凡三易矣乃今石刻其末曰乾符三年孫毛詩博士自牧以家本重校勘定當云毛詩博士孫自牧於文乃順七月十八日書刻字人魚宗會其字别體與朱梁所刻相類而本文不然當是開成中所刻其中有磨改數字者意自牧所為也九經字樣一卷凡七十六部四百二十一字國子監奏覆定石經字體官翰林待詔唐玄度狀準太和七年十二月五日勑覆定九經字體者今所詳覆多依司業張參五經文字為準其舊字樣歲月將久畫點參差傳寫相承漸致乖誤今並依字書參詳改正諸經之中别有疑闕舊字樣未載者古今體異隸變不同如總據説文即古體驚俗若依近代文字或傳寫乖訛今與校勘官同商較是非取其適中纂録為新加九經字樣一卷請附於五經字樣之末奉勑宜依開成二年八月十二日中書門下册府元龜周太祖廣順三年六月尚書左丞兼判國子監事田敏獻印板書五經文字九經字樣各二部一百三十䇿奏曰臣等自長興三年較勘雕印九經書籍經注繁多年代殊邈傳寫紕繆漸失根源臣守官膠庠職司較定旁求援據上備雕鐫幸遇聖朝克終盛事播文德於有截傳世教以無窮謹具陳進是此二書曾有印板而自宋以來學者不言之何也梓州刺史馮宿碑王起撰柳公權正書并篆額今在西安府儒學其文後半已漫漶不辨年月其首云開成元年十二月又云明年五月云公塔銘李𢎞度撰沙門建初行書開成四年五月今在西安府城南興教寺大遍覺法師玄奘塔銘劉軻撰沙門建初行書開成四年五月今在西安府城南興教寺太尉李光顔碑李程撰郭虔正書開成五年今在榆次縣司直廳石幢鄭模撰裴諸書庚申年正月是開成五年續有會昌元年評事李闕述一通今在西安府城內寂照和上碑段成式撰僧無可正書顧玄篆額開成六年正月今在咸陽縣贈太師崔陲碑劉禹錫撰柳公權正書會昌元年五月今在偃師縣大達法師玄祕塔碑銘裴休撰柳公權正書并篆額會昌元年十二月今在西安府儒學碑隂有勑內莊宅使牒及比丘正言疏大中六年四月皇帝巡幸左神䇿軍紀聖德碑崔鉉撰柳公權正書會昌三年拓本重藏舍利記采師倫正書會昌六年九月今在京師憫忠寺此初復佛寺之文周公祠靈泉碑崔珙奏答詔正書大中二年十一月今在岐山縣周公廟杜順和尚行記杜殷撰董景仁草書大中六年闕月今在西安府開佛寺睿宗與司馬鍊師書三通玄宗與司馬錬師書一通五言詩一首司馬承禎狀一通批答韓抗正書大中八年五月今在王屋山陽臺觀圭峰定慧禪師傅法碑裴休撰并書正書柳公權篆額大中九年十月今在鄠縣草堂寺吏部題名石幢大中十一年十一月今在西安府儒學按宋張舜民畫墁録曰長安今府宇即唐尚書省也府院即吏部也府録廳前石幢即郎官題名石也不知何年移此鄭恆暨夫人崔氏墓志銘秦貫撰正書大中十二年十二月此即今世所傳崔鶯鶯者也年七十六有子六人與鄭合葬此銘得之魏縣土中足辨會真記之誣而志墓之功於是為不細矣修文宣王廟記賈防撰溫孔裕奏中書門下牒正書咸通十一年三月今在曲阜縣廟中修武安君白公廟記正書乾符五年十二月今在咸陽縣李克用題名正書中和五年二月今在曲陽縣北嶽廟中其文曰河東節度使檢校太保同中書門下平章事隴西郡王李克用以幽鎮侵擾中山領蕃漢步騎五十萬衆親來救援與易定司空同申祈禱翌日過常山問罪時中和五年二月草一日克用記易定節度使檢校司空王處存看題至三月十七日以幽州請就和斷遂却班師再謁睟容兼申賽謝便取飛狐路却歸河東克用重記其下小字云天會十二年七月六日尚書都官員外郎知曲陽縣事髙君陳摹刋按舊唐書云時天子播越中原大亂幽州節度使李可舉鎮州節度使王鎔以河朔三鎮休戚事同惟易定二郡為朝廷所有乃同議攻處存以分其地又云幽鎮兩藩兵甲強盛易定於其間疲於侵寇賴與太原姻好每為之援即其事也又按宋沈括筆談云嶽祠在曲陽祠中多唐人故碑殿前一亭中有李克用題名則知此字乃當時所刻或毁於靖康之兵火而金人重刻之今石也然克用將門之子何能工於筆法乃爾豈亦如宣和書譜謂後梁太祖批答賀表當是筆吏所書之類與朱彛尊曰文稱中和五年二月者即光啓元年考僖宗以是年二月至鳳翔三月還京改元之詔猶未下也通鑑言克用遣將康君立救處存而題名則云領蕃漢步騎五十萬衆親來救援與通鑑異又云至三月幽州請就和斷遂班師取飛狐路却歸河東則又史所不及載者重藏舍利記正書景福元年十二月今在京師憫忠寺蜀先主廟碑郭闕撰正書乾寧四年今在涿州樓桑村廟中剝蝕其首行曰婁居道重修濟安侯廟記李巨川撰郭懷素正書光化二年四月在華州城隍廟內近日移之西安唐昭宗自華州還京改華州為興德府封少華山神為佑順侯華州城隍神為濟安侯此文多述韓建之功稱太傅許國公而不名唐文粹録房鄴少華山佑順侯碑頌與此同時朱彛尊曰巨川為韓建掌書記撰許國公勤王録以媚建方昭宗幸華建請散殿後軍誅李筠圍諸王十六宅皆巨川教之後為朱全忠所殺新唐書附諸叛臣之列修文宣王廟院記髙諷撰并書正書天祐十五年四月今在定州儒學碑稱太師中書令北平王者王處直也按舊唐書處直傳天佑元年加太保封太原王後仕偽梁封北平王檢校太尉又按通鑑梁太祖開平四年鎮定復稱唐天祐年號今此天祐十五年為梁之貞明四年晉王已拔楊劉矣重修法門寺塔廟記薛昌序撰王仁恭正書天祐十九年二月今在鳳翔府寺中通鑑後唐莊宗同光二年封岐王李茂貞為秦王今此碑天祐十九年建而其文已稱秦王則在同光之前二年矣蓋必茂貞所自稱又史言茂貞奉天祐年號此碑之末亦書天祐十九年而篇中厯述前事則並以天復紀年至天復二十年止亦與史不合陽翟縣侯禇亮碑八分書以下無年月拓本半缺北嶽神廟之碑鄭子春撰崔鐶八分書李逖篆額今在曲陽縣北嶽廟中神字作下從旦禮記郊特牲所以交於旦明之義也鄭康成曰旦當為神篆字之誤也莊子有旦宅而無情死亦讀為神昔之傳書者遺其上半因誤為旦耳畢邜乃是昴字省日作單卯巳異又加一點用為胎卵之卵豈古人卯卵通用歟金史有斜卯氏本並作卯而潞州五龍祠明昌癸丑祈晴碑有上黨尉斜邜溫玉竟作夕旁從阜與此碑畢之邜同碑隂紀段使君德政崔鐶撰并八分書崔敦禮碑于志寧撰子立政正書今在醴泉縣殘缺張阿難碑正書今在醴泉縣殘缺薑遐碑姪郕公晞撰并書正書今在醴泉縣殘缺安定郡王李光進碑令狐楚撰子季元行書今在榆次縣修北嶽廟碑劉端撰王知新行草今在曲陽縣廟中記王處直修廟事重修柏谷寺記李愚撰正書今在潞安府盤山題名大字正書薊州西北三十里盤山上有李靖舞劔臺李從簡曾逰十大字刻於石按册府元龜李從簡文宗開成初為左金吾衛將軍兼御史中丞將命北庭不能專對貶復州刺史意者其人乎晉王墓二殘碑正書朱彛尊跋曰代州柏林寺東晉王李克用墓斷碑二其一曰唐故左龍武軍統軍檢校司徒贈太保隴西李公神道之碑文曰公諱國昌字德興今為隴西沙陀人偉姿容善騎射蓋克用之父朱邪赤心也其一曰唐故使持節代州諸軍事代州刺史李公神道之碑文曰公即太保之次子也其名克字僅存餘可識者有公前躍馬彎弓及徐方等數字按史克用弟四人次曰克讓為振武軍校從討王仙芝以功拜金吾衛將軍宿衛京師賜第於親仁坊自克用稱兵雲中殺守將段文楚詔捕克讓克讓與僕十餘騎彎弧躍馬突圍出奔鴈門與碑文合則為克讓無疑但史載克讓守潼關與黃巢兵戰敗匿南山佛寺中為寺僧所殺不言其為代州刺史又得歸葬于代皆不可曉者當歐陽永叔時去五代甚近沙陀世次已不得詳其為唐家人傳謂太祖四弟皆不知其父母名號至國昌字德興紀亦遺之是二碑永叔亦未之見也淨住寺文賢劫像銘八分書今在西安府殘缺虢國公主花臺銘申屠液撰正書今在西安府南門內華塔寺梁鎮東軍牆隍廟記錢鏐撰開平二年歲在武辰月月字上下皆空今在紹興府卧龍山西岡上城隍廟中此碑以城為牆以戊為武按舊唐書哀帝紀天祐二年七月辛巳敕全忠請鑄河中晉絳諸縣印縣名內有城字並落下如密鄭絳蒲例單名為文九月己巳敕武成王廟宜改為武明王十月癸丑敕改成德軍曰武順管內稿城縣曰稿平信都曰堯都欒城曰欒氏阜城曰漢阜臨城曰房子避全忠祖父名也全忠祖信父誠十一月乙卯朔敕改潞州潞城縣曰潞子黎城曰黎亭甲申敕改河南告成縣曰陽邑蔡州襄城縣曰苞孚同州韓城縣曰韓元絳州翼城縣曰澮川鄆州鄆城縣曰萬安慈州文成縣曰屈邑澤州晉城縣曰髙都陽城縣曰濩澤安州應城縣曰應陽洪州豐城縣曰吳髙又按五代史滑州唐故曰義成軍以避梁王父諱故曰武順又册府元龜開平元年五月甲午改城門郎為門局郎曾子固跋韓公井記襄州南楚故城有昭王井故城今謂之故牆即鄢也由梁太祖父名誠避之然則城者誠之嫌名也册府元龜言帝曾祖諱茂琳開平元年六月癸卯司天監上言請改日辰內戊字為武從之然則戊者茂之嫌名也容齋續筆謂戊類成字故改之者非然戊本音茂不知何以有武音而鄭樵謂十辰十二日皆為假借甲本戈甲乙本魚腸丙本魚尾丁本蠆尾戊本武已本几又不知其説何所本也又如後漢執金吾丞武榮碑云天降雄彥資才卓茂仰髙鑽堅允文允武則并茂字亦讀為武其來久矣唐白居易詩有木名櫻桃得地早滋茂與露去住顧妒樹賦為韻僧彥修草書乾化闕年今在西安府儒學後唐李存進碑吕夢竒撰梁雍正書并篆額同光二年今在太原縣千峰禪院勑明宗御書天成元年今在澤州盤亭山末有璽曰書詔新鑄之印余所見宋元碑升作升斗作斗石作碩蓋如數目之借用一二等字務令筆畫繁多以防改竄今按此勑已用斗碩二字而水經注有五斗米道又云長湖南有覆斗山又舊唐書字多作斗碩又韓文公河南令舍池臺詩未許波瀾量斗碩則詩中亦用之矣鄧士望勘正劉漫塘文集云斗字古作豆俗誤併為一字作斗即杜詩秋雨歎亦然按漢書平帝紀民捕蝗詣吏以石斗受錢已作斗今浙西吳中人猶謂十斗為一石音石而北人讀石為擔誤也漢書蒯通傳守儋石之祿注應邵曰齊人名小罌為儋受二斛後漢書宣秉郭丹吳祐皇甫規傳並作擔石注今江淮人謂一石為一擔擔音丁濫反史記貨殖傳醬千甔索隱曰音都甘反漢書作儋孟康曰儋石罌受一石一音都濫反揚子法言吾見儋石矣冥福院牒長興四年九月今在泰安州冥福寺此牒無押而每人各用一印兩樞密使趙延夀范延光並見五代史準字與嵩山會善寺戒壇碑大厯二年牒同晉建雄節度使相里金碑李象撰成知訓正書天福五年十月今在汾陽縣小相里之北太師墓上五代史相里金傳略同惟傳云字奉金而此云字國寶傳云贈太師而此云贈太子太師又封西河郡開國侯而史遺之皆當以此碑為正也碑云顓頊生大業大業生庭堅庭堅仕堯為大理官至殷末有理徵為殷伯其孫仲明逃紂之禍故去玉而稱里氏至周時晉有大夫里克其妻同成氏攜小子季連避地居於相城時人遂呼為相里氏相里武為漢御史相里覽為前趙將軍而莊子書言相里勤之弟子韓非子言有相里氏之墨作碑者不能引也今汾陽有大相小相二村相里氏之後尚有數十家因考北齊寺碑題名多相里氏史言武士彠娶相里氏士彠并州文水人去此不逺至今千有餘年而裔孫猶居於此不獨晉俗淳朴而山谷之險猶足以自保故能纍代不遷若山東河南則兵火之餘人民亡散欲求元時遺族已寥寥不可見矣安邑縣北三十里亦有相里村駙馬都尉史匡翰碑陶榖撰閻光逺行書天福八年今在太原縣黃陵村開化寺珤嚴閣記蘇禹圭撰蘇曉行書開運二年今在太原縣蒙山寺內元人重刻天龍寺千佛樓碑李惲撰劉守清行書王廷譽篆額開運二年今在太原縣朱彛尊曰碑稱承鈞為睿宗皇帝繼元為英武皇帝皆史所未及周邢郡創修六曹軒宇記僧應文撰正書顯德元年八月今在順德府城西舊莊書不佳又多謬字衛州刺史郭公屏盜碑杜韡撰孫崇望正書顯德二年五月今在衛輝府治郭進為衛州刺史羣盜屏迹世宗勑右補闕杜韡序其事龍泉禪院記徐綸撰王獻可後序并書正書僧師試篆額顯德三年今在陽城縣內述天祐十九年按此地本屬梁此記乃追削梁號而稱天祐者中書侍郎景範碑扈載撰正書鄒平縣南五里有景相公墓通鑑後周顯德元年七月癸巳以樞密院直學士工部侍郎長山景範為中書侍郎同平章事此地唐時屬長山也景氏之裔自洪武間有兩舉人今亦尚有諸生不能記其祖矣不知何年謬傳為晉之景延廣而邑志載之以後山東通志等書襲舛承訛無不以為延廣墓後有令於此者謂延廣在晉為誤國之臣遂至笞其後人而毁其祠昔年邑之士大夫亦有考五代事而疑之者豫至其邑有諸生二人來稱景氏之孫請問其祖為誰豫乃取通鑑及五代史周世宗紀示之又示以景延廣傳曰延廣字航川陜州人也其官為馬步軍都指揮使非此明矣宋史咱居潤傳曰景延廣寓其族于雒乃謝而去間一日往郊外視其墓碑其文為翰林學士朝議郎尚書水部員外郎知制誥柱國扈載撰五代史扈載傳官銜同册府元龜載初為監察御史嘗遊相國寺僧院作賦留題於壁帝聞之命黃門就其院録之以進俄拜兵部員外郎知制誥雖剝落者十之一二而其曰故中書侍郎平章事景公諱範字甚明白且生封上柱國晉陽縣開國伯沒贈侍中而其文有曰我大周聖神恭肅文武孝皇帝建大功於漢室為北藩於魏郡又曰今皇帝嗣位登用舊臣又曰冬十一月薨於淄川郡之私第其末曰顯德三年歲次丙辰十二月己未朔越十日戊辰因歎近代士人之不學以本邑之人書本邑之事而猶不可信以明白易見之碑而不之視以子孫而不識其先人推之天下郡邑之志如此者多矣又按通鑑顯德二年八月丁未中書侍郎同平章事景範罷判三司尋以父喪罷政事今碑文有云以列卿歸第懸車故鄉嗟風樹之忽驚訴昊天兮何極則是罷官歸里而後遭父喪與史不同宋史張美傳曰世宗即位時宰相景範判三司被疾世宗命美為右領軍衛大將軍權判三司或者以疾而罷罷而遭父喪乎王元美作李于鱗友人襲克懋妻景氏墓志銘亦以為延廣之後雖本其家之行狀然王李二公亦未嘗究心於史學也金石文字記卷五
