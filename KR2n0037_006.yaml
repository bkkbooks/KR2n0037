body:
  text: 金石文字記卷六崑山顧炎武撰識餘岱嶽觀王圓題名右唐岱嶽觀碑題名之一此碑有開元十九年二十年建中元年貞元十四年題名都督兗州諸軍事任要行博城縣丞公孫杲二詩此碑前文從右方起後詩并題名或從右方起或從左方起每層髙下多寡參錯不一以文意筆法求之乃可辨其起訖凡唐人紀逰題名皆就舊碑之隂及兩旁書之前人已題後人即於空處插入大小髙下俱無定準宋初亦然自大中祥符以後題名者乃别求一石刻之字體始得舒縱亦不與舊文相亂然石小易於搬取故題名愈多而存者愈少今之溝渠碾磨之間皆是物矣此碑西側面又有宋政和甲子題名一條又按荼荈之荼與荼苦之荼本是一字古時未分麻韻荼荈字亦只讀為徒東漢以下乃音宅加反而加字音居何反猶在歌戈韻梁以下始有今音又妄減一畫為茶字此碑兩見荼字皆從草從余可見唐時字體尚未變爾雅檟苦荼廣韻九麻中有荼字又有茶字注曰俗是也又任要題名曰貞元十四年正月十一日立春祭嶽遂登太平頂宿其年十二月草一日立春再來致祭荼宴于兹曰荼宴者蓋唐時祭畢猶不用酒今不然矣宋董元康題名右小石刻在岱嶽觀豫既録唐碑往還數四道士謂余曰昨發地得石刻二請觀之其文亦可采因附焉下題同此盛勛題名右小石刻在岱嶽觀戊戌乃政和八年其年十一月己酉朔改元重和曰決獄者讞而決之古無仲夏斬決之事也宋真宗廣生帝君讃右碑在泰山南麓青帝觀中宋真宗御製廣生帝君讃并序其文及篆額皆御書青帝即禮記月令所謂其帝太皥而史記封禪書秦宣公作密畤於渭南祭青帝唐書王璵傳請置春壇祀青帝于國東郊者也夫帝者一而已矣易傳曰帝出乎震齊乎㢲相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮是周流于四時八卦之中而其為帝者一也家語載孔子之言曰丘也聞諸老聃曰天有五行水火金木土分時化育以成萬物其神謂之五帝古之王者易代而改號取法五行五行更王終始相生亦象其義故其生為明王者死而配五行是以太皥配木炎帝配火黃帝配土少皥配金顓頊配水於是有五天帝五人帝之說漢儒因之遂立感生帝之名謂帝王先祖皆感太微五帝之精以生鄭康成述春秋緯說蒼帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝叶光紀則王子雍諸儒所排駁而後世雖存五帝之祀亦不遵用其名者也豈若易傳之言簡而當哉若真宗之事又所不足論云升元觀牒右碑在泰山東南麓升元觀其大字草書甚遒徑不知何人筆録之以見當日牒文之式考宋史婁寅亮傳但云政和二年進士為上虞丞不言厯官兖州亦可以此碑補史之闕其曰太師魯國公則蔡京也普照寺有金大定五年牒碑長春觀有元丁亥年牒碑其式略同金元碑並有印曰尚書禮部之印即今通行大篆文不用女直䝉古字宋范致君題名右小石刻在泰山南麓后土廟錢伯言題名右碑舊在宋天書觀後人移之州城內嶽廟中西墀古松下行書大徑寸餘白龍池宋人題名內供奉官李舜舉被命禱祀帝嶽奉香勝槩於夀聖節日先欵青帝宫次詢白龍潭治平四年題兖守劉衮奉詔祈雪于岱宗登絶頂翌日謁白龍池之祠元祐丁卯孟春初四日奉符令林㑹題貫道建欄於此以游者元祐丁卯正月八日范陽正輔再逰同魯國景元符丁丑三月草六日元符庚辰七月晦趙習之徐安國弟居仁孫正仲同逰皇甫稱徐端朝孫㦢同遊建中靖國元年三月草六日題奉符令李圭因捕蝗恭謁白龍祠男彚侍行崇寧壬午孟春初七日誠中君寶德升崇寧二年八月草六日自王母池來訪此董元康政和甲午重九日攜家來游質贄賁侍行自恭觀元康兄留字政和乙未孟冬二十日莆陽陳國瑞子玉恭謁白龍池祠俯洞酌泉小憩而邁政和丁酉夏前二日姜子正子方李晉道劉言可刀文叔同來庚子四月李顯道張公美王仲與張去塵庚子孟夏十九日同逰池上鄄城李僓弟倰侄贛隨侍遊此癸卯季春草八日張子觀水于池十三年春三月右在嶽西傲來峰下白龍池石壁上平廣計二十餘丈書曰龍潭曰白龍池並大字其旁皆宋人題名尚未刓缺録之得十五首其文略無重復自治平迄宣和六十年間人名字亦可以想見當日太平之盛而金元以降洊遭兵火名山奧區委之榛莽無復有題名者矣張子觀水于池篆書張字作弡按劉原父弡仲醫銘釋弡為張以為張仲之器歐陽永叔從之趙明誠金石録疑之黃長睿東觀餘論則云弡其勿反非張字考之玉篇信然然此云弡子則為張子無疑蓋宋人之好竒者據原父永叔所定之字而用之耳宣和博古圗亦有周弡伯匜此條篆字大書無年號按宋朝紀元無有至十三者若曰金元又不合一代全無題名止此一人也元聖㫖碑右碑在州城內嶽廟西偏延禧殿前又有至正四年猴兒年聖㫖碑其文略同按元史泰定帝本紀有即位一詔與此相類鄙唁之語播之王言傳之史冊貽笑後人然其曰每年燒香的上頭得來的香錢物件只教先生每收掌者則是時香錢固未嘗以入官也後世言利之臣蓋元之不如已靈巖寺宋李迪詩右小石刻在長清縣靈巖山寺中其山距府九十里南接泰山北帶龍洞齊乘以為疑即水經之玉符山而魏書所云朗公谷者在其東南自前代稱為勝境宋金元人題字最多豫至則當兵火之後縱橫偃踣委之荆棘瓦礫之中然猶得唐一宋金合四十餘元以後不能悉數唐刻為天寶十一載造舍利函記文不工不足録而宋刻年月序次以此為首按史李迪諡文定前後三知兗州其再任乃仁宗天聖中也滕涉詩祖無擇詩孔舜思詩張㑹宗詩鮮于侁詩寃亭卞詩蔡安持詩杜欽況詩金王珩詩路伯達詩元𫝊亨詩右石刻大小不一凡十三通俱在靈巖寺其它刻宋時者則有田稹五言詩嘉祐五年王逵千佛殿記元豐庚申李公顔金像記元祐壬申卞育逰山記大觀戊子郭思逰山記大觀三年住持仁欽篆書心經大觀四年仁欽生老病死苦頌仁欽十二時歌仁欽靈巖十二景詩政和元年淨照和尚誡文政和五年劄付政和乙未趙子明題名靖康元年髙直臣題名而蔡卞經碑四幅前元符二年十二月十三日書後建中靖國元年十一月五日書在御書樓下特為書家所珍又有面壁像碑宋建中靖國元年陳師道記金皇統七年重立金時者則有皇統七年雲公禪師像正隆丙子張汝為題名太定戊戌蕭守中題名明昌六年本寺田園記明昌七年党懷英靈巖寺記元時者則有蛇兒年大元國師法旨碑䝉古字至元龍兒年帝師法㫖碑蒙古字大德六年天童覺和尚默照銘至正四年察罕布哈書唵嘛呢巴彌吽一行漢字一行蒙古字凡元碑最多不盡録録其稍異者有至治元年呼都克郡王太夫人巴約特氏詩詩只二句曰巖前松檜時時緑殿上君王歲歲春大字刻之亦不類婦人筆也又有宋蘇子由五言詩驗為後人補刻而復有子瞻徐州一歌誤刻於此其詩各見集中不録後之君子知豫之所取者非以吹二氏之狂瀾拾前朝之落艷而情深好古意在闡幽自有不能已者且因以覽世道之汙隆考文辭之醇雜亦豈不為學人之一助哉北嶽廟李敻詩恆嶽晨望有懷定州司馬李敻二儀均四序五嶽分九州靈造良難測神功匪易酬恆山北臨代秀崿東跨幽澒洞鎮河朔嵯峨冠嵩丘禋祠彰舊典壇廟列平疇古樹侵雲密飛泉界道流從官叨佐理銜命奉珍羞薦玉申誠效鏘金詎有由郊原照初日林薄委徂秋塞近風聲厲川長霧氣收他鄉饒感激歸望切祈求景福如光願私門當復侯右詩在真定府曲陽縣北嶽廟中廟有唐時大碑五其一韋虛心文陳懷志書行草其一張嘉貞文自書其一鄭子春文崔鐶八分書其一李荃文戴千齡八分書其一劉端文王知新書行草碑隂及兩旁刻字皆滿其上層為積土所蓋而余至時倉卒求梯不可得止就下方讀之大率皆貞元至天祐十數朝祭嶽題名六有宋人刻字獨此詩在韋碑後文雖不工然豫見近代君子搜剔唐人之詩至於無名氏不知何代人之作皆收而附之而此灼然不誤者乃不得與斷簡殘編之列又北嶽廟自大碑之外絶無題詠故特録焉又有宋王禹稱陳彭年韓琦三大碑及白憲書石幢一字皆可觀而稚圭自書逼真顔魯公世人傳其字者罕也惠明寺碑隂題名太原縣北門外惠明寺塔碑宋元豐八年吕惠卿撰并書其陰下方有此三十一大字餘題尚多不録凡碑文必面在先隂在後此碑元豐八年立為乙丑之歲而隂所題辛亥反在其前十有四年不可曉也豈非惠卿磨去前人之文而自刻之者與其隂嵗月之猶存則固心勞日拙而亦天理之未盡泯者與夫毁人以自成君子之所深戒而今之名公貴人為此者多矣歐陽詹所以悲顔魯公之碑而致弔于九江之驛也悲夫古碑之所以多不存於世其不以此也哉華嶽廟賈竦詩右在華嶽碑之左旁此碑前後空處為宋人攙入題名甚多幸正文皆八分書題名或隸或行不相混耳而近代人踵刻者尚未止有一題曰崇禎十七年後辛丑和州逸人戴移孝再登嶽亦八分書張惟一祈雨紀右在述聖頌碑之左旁八分書華隂縣令王宥等題名右在述聖頌碑之右旁上為篆下為八分書唐有兩上元年號此則肅宗時也宋陳執中題名右在碑隂韓賞文之下方有大厯九年華隂令盧朝徹謁嶽廟文有貞元九年十三年題名其宋代所刻惟此執中宋人所諡為榮靈者乃其書則不俗也其碑之前左方下又有元豐乙丑王子文題名拱極觀記跋易曰神而明之存乎其人本觀舊記爰自聖朝靖康改元中朝奉大夫薛公名公度所作刻諸琬琰意欲傳於久昨緣兵草蜂起大火縱焚致于泯滅其文則道之竊嘗録之以行逮今十三載矣經曰天地運度有數而不失也道之雖至愚緬思景貺得非真君之密贊耶謹募工重刋于石恭銘休美云時紹興九年歲次己未中元日前西嶽知殿兼拱極觀主賜紫道士雷道之謹記右小碑本在拱極觀觀已久亡萬厯中有人掊地得此碑置之嶽廟中與宇文周碑並立其碑文鄙淺無足采然吾於是有以見宋人風俗之厚而黃冠道流猶能念本朝而望之興復其愈於後世之人且千萬也夫紹興九年髙宗方在臨安而金人有許和之約考之於史八年十二月丁丑詔金國使來盡割河南陜西故地通好于我令尚書省榜諭九年三月丙申王倫受地于金得東西南三京夀春宿亳曹單州及陜西京西之地四月辛亥命樓照宣諭陜西諸路十年五月金人叛盟陷永興軍則此地之復歸於宋蓋無多日而雷道之一道士耳能于干戈喪亂之際而繫思本朝辭微旨切以視夫士大夫之靦顔臣僕者不大有徑庭邪余見朝邑藏春塢之記稱阜昌癸丑而西安府學有華夷圗刻亦稱阜昌七年以僞齊劉豫之號而欲夀之貞石豈不見此文而愧死也其沒于土中久而後出豈陷金之後觀主埋之如鄭所南井中心史之為邪劉汾詩右說經臺之左有碑前為老子度函谷關圗元大德庚子刻後為希聲堂碑八分書延祐二年朱象先撰而此詩則在碑之左旁亦八分書不著年月詳其風致當為元人之作草樓之前傳有老子繫牛柏後人琢二石牛置其下故末句云然霍山廟建文碑維建文元年歲次己卯二月壬寅朔二十二日癸亥皇帝遣序班周敖國子監生袁綱致祭于中鎮霍山之神曰豫荷昊天祐命承皇祖丕緒正大寶位統率神人乃正月壬午祗祭上帝於南郊山川百神既與奠享尚以未能特修祀事于祠下為憾是用遣官奉香幣牲醴致祭維神以靈峻之德作鎮中土時出雲雨協相兆民以稱豫懷柔之意焉尚饗右小石刻一通在霍山中鎮廟西壁上豫行天下見洪武永樂以來祭告嶽瀆之文及它碑記甚多獨未有建文年者意其在位日淺又或文皇御宇之日而臣下之獻諛者從而剷去之也乃此文雜於數十百碑之中而字畫完好無缺故亟録之後之君子每痛國史不存建文一代事蹟無從考證若使通雅之士厯深山窮谷而求之如此碑者世間或尚有一二不止霍山廟也不猶愈於羅永菴之詩程濟史彬之録僞撰而無稽者乎因并書之以告後人之能信古者諸碑别體字漢孔子廟禮器碑柤梪俎豆土仁疑泰山都尉孔宙碑雕幣弊張表碑頑訩凶荷􅀢苛忒金鄉長侯成碑滋滋孳履真淳于長夏承碑策薰勳晧昊天咳孩孤博陵太守孔彪碑拯拯馬魯峻碑樂於陵灌園之㛃潔當登緄衮職尹宙碑支判流仙遷巨鏕鹿白石神君碑黍稷稻稂梁曹全碑巴郡朐忍令巴郡太守樊敏碑晳析為韓魏米巫􅓇凶虐歲在汁協洽析里橋郙閣頌醳釋散關之􅢉漯濕魏受禪碑璿機璣大鹿麓大饗碑岐陽之獀搜封孔羡碑揖輯五瑞斑班宗彛大晧太皥建城鄉侯劉靖碑􅀈隰後魏弔殷比干墓文遷佂征􅀈睇荆棘工為綿蔑禀扶扶􅀢蔽默堯堯桀沉湎而不知甲兮終或已以貽戾甲下當有子字或當作惑己謂妲己也疑樹兮英風菊實實奮釁悖綱竊竊鬼邢侯已脯當作鄂侯萁箕子嗟人生疑多殃住往者􅂒厥屯亶邅汞乖良顚亡胥宇傳冤疑業以循修長殷亲辛址止故鄉乘桴條􅀈翺翔電曳容之葩裳㵱飄執垂益而談􅀢疑兮􅀈攄苦登􅀈疑巗六蠄螭遙裔裔帶􅀈訴柷揖祝融靈􅀈雛澑湸瀏亮府俯沐髮􅀈騶虞隨轡歙吸沆窺寒門疑瑟疑神疑而威陵愓揚雲祺旗大􅀈儀靈修傅說張猛龍碑􅀈像壑巉緝老使沮淭渠饒洮河出苐弟泣血磬罄力式􅀈休万刃仞英徽氶承華鄒方羣冥王生造頌李仲琁孔子廟碑夤寅賔􅀈敷化鄒魯扶疏䇐蒞曲阜㗛笑􅀈聘百刃仞謶庶筫質昭照良梁木西栖樓焕爤爛太公吕望碑與之歸發其潛盡盡之所出二盡字俱當作書功袘施於民儒默墨􅚾都􅀈聖枕率貇貌含􅀢毫彈翰其詞粵曰曾鄒魯咒巫祝􅜠肴觴華夷曾胄驪山溫泉頌數刃仞畯峻極公餗髙塘唐之雲尅克神尅聖菉緑樹北齊郭巨碑升斗南陽寺碑雜踏沓奸軌宄􅀢蔽日惚疑峰虧構扶疏􅱺象菀苑胥後周華嶽頌升荆壑葺恆姮娥斻旃䝉哥歌秩無壃疆豆盧恩碑龍襄驤將軍沙菀苑龍藏寺碑斗升踐祚阼河何人伽籃藍雖壞懷煩惚惱北拒吾五臺啓法寺碑梴植埏埴不惻測蕤裔裔綱剎剎􅀈鄽􅀈鄾象狐常醜奴墓志慕暮齒曵救菊陳明府修孔子廟碑􅀈溉釡㗛笑姚恭公碑􅀈俯黽勉敬友穆睦親唐宗聖觀記井韓幹皇甫誕碑肅煞殺旌橫劔梐丫枑扸析胥産鄒蕳簡呪祝網泣辜曵裾朱邸馬獦鬛初封昭仁寺碑兕夫子廟堂碑胥史反及烽莫幕裕唲管爾微㗛笑攝齊齊餐餐資覆匱簣以成山荆哥歌頌鄒化度寺碑九成宫迢遞逯逮虞恭公碑逯逮料方絶大漢漠歐陽詢書九歌蘭旌褒公碑逯逮剛孟法師碑江淩陵祕決訣芻豢摸模楷褚書聖教序菀苑蕳簡褚書兒寬贊版築飯牛之朋作明韋𤣥成作𢎞成懷仁聖教序耶邪扸析菀苑綱攬覽李衛公碑夔敵敵佾王居士磚塔銘惚惱緾纒蘭陵長公主碑皇帝字皆作篆文搖瑤華月邁奉蒨倩之傷神葴針許洛仁碑墜墬主蒱蒲州湹瀍度曲忖刌聲道因碑菀苑才晤悟聰晤悟鳬頤怡然理順具禍以藎燼崏岷蹲鵄鴟裕營輯葺原源李文墓志卒貿膺疑舟輕郢斫孔宣公碑魯國鄒人擊罄磬升科斗汦泯杍梓材浮罄磬率性爻晝畫縡載無聲臭華陽觀王先生碑施妍􅀈厲醜汦泯挺莛橫楹從三荆之樹斁瑣闥𤣥兔莬蜂蜂飛婫嫓斑班倕菀苑功虧覆蕢簣刷鄭惠王石塔記漆七修孔子廟詔表兩雨露鼐莊皼鼓賸朕乾封元年祭孔子文生芻李英公碑開業寺碑熟孰能􅕮土吐汦泯褚亮碑輜蓋㭊析澤王府主簿梁君志銘薄簿纂梁師亮墓志銘􅜠觴旌欽明饜厭代覃緾纒談覃思漆書懆慘于大猷碑天骨昴昻藏李承嗣造佛像銘􅀈斫法琬碑五桍袴􅱺象彌蕊寧思道石浮屠銘上輊輕車都尉鳬矧苑苑黃陂萬項頃景龍觀鐘銘正書中多用篆體苾明碑管鷹楊前從木後以手玉質金箱相圗牒莫賀特勤勒特勤勒垂譽碑俱用武后字法藏禪師塔銘窣泹涅愍愍弒殺戮裔裔葉慧明碑􅀈彌象象考盤槃遁代世勿用頥張廷圭孔子廟碑趙遁盾朖朗日􅀈矧韋虛心北嶽碑魁魁梁髙望石浮圗銘神元妙頤賾菀苑荆引秦望山法華寺碑􅀈炯誡僧瑤繇豪濠州御史臺精舍碑壂殿中棼二汦二泯咎蹲淨業法師塔銘父辿栝括地之姿乙速孤行儼碑海􅀈荆揚􅀈彌漫升明慶少林寺碑申緇林之敬石罄磬王充潛僭號蔡雍雍德鎣瑩神珠匝匝􅀢競有典咸袟秩嶽麓寺碑轡􅀈矧惱但但東林寺碑範梵經鎖憧幢㫋栴檀陶侃侃龎履溫碑衛寉霍子臯羔用成宰事大智禪師碑多所通栝括旃栴檀榗搢紳石壁寺鐵彌勒頌葺粲淨襯襯回回祿剛大德茂忠守辿道振禪師塔銘慜憫物惓倦搆遘疾兖公之頌傑隆闡禪師碑剎檀􅀈那猶由是我域耶邪山􅀈熙怡嵩陽觀頌􅀈愕眙升仙太子印多寶塔碑苾芻旃栴檀印臧懷恪碑潔潔矩楊揚州自天寶岠距于開元郭敬之家廟碑行中潔潔矩麾城搟摲邑邦之攸􅀢塈段行琛碑牛岡岡啓繇􅍑不缺景教流行碑寶裝璀翠粲不空碑象何攘讓靳英㠻墓志時流響嚮風楚金禪師碑工人杍梓匠象象閇閉熠耀剎怛怛真縱蹤周孝侯碑大護濩舉預豫章射獸虎獲護軍劾度去去草世事已揮插鍤草世存風烈俗哥歌揆日邠國公功德銘皼鼓瓦矢閞關極拯李晟碑迤沱演于後如衝如楥援殄遘搆亂𤣥奘塔銘納衲衣日曰贈太師崔陲碑徂萊來𤣥祕塔頤泹涅槃神䇿軍聖德碑齊聖廣泉淵葳㽔解辮蹶厥角大特勤勒嗢沒斯圭峰禪師碑礠磁州鄭恆墓志淇隩澳私茅苐內罔極葉業文者武安君白公廟記鯨勍敵零櫺星門崔鐶北嶽廟碑神畢茆淶易疏疏其浸如抵指諸掌升中多森蘿羅節㡯度沐浴皇化賡哥歌太平笇算殱魁繢繪事後素文賢劫像銘􅀈珉後唐李存進碑楊留劉補遺古金石刻不獨文詞之典雅字畫之工妙為可愛玩而先賢事跡前代制度不詳於史者往往著見焉其有資於博聞多識不細矣而其為物散在天地間日亡日少好古之士薈萃成書者十數家收之博而辨之精無若歐趙二録歐録之目千趙録二千皆據其實有者籍記之他書循名泛列固不辨其存亡也亭林先師實甚好古遊轍所至旁搜博採著成此書惟就碑刻現存及收得拓本者録之得三百餘通其數少於歐趙而考論詳核不啻過之夫今之去宋僅五百餘年而十亡七八則過此以往又當何如以彼亡佚者為可惜則其幸而存者可不知寶重哉耒夙有此好孜孜訪求所得有在兹編之外并歐趙所未録者不忍使其無聞謹附載於後以見古碑之亡於通都大邑而留於荒村窮谷者尚多有之搜羅表章無令泯滅是所望於後之君子門人潘耒謹識漢桐柏淮源廟碑八分書延熹六年今在桐柏縣洪氏隸釋載此碑缺五字今拓本字畫完好而乏淳古之氣蓋唐人重刻者據朱長文碑帖考云是釋曠書釋曠開元時僧金石録中有北嶽恆山碑亦其所書也後魏中嶽廟碑八分書太安二年今在登封縣魏太武帝因道士寇謙之奏請更造嵩嶽新廟立碑紀事趙氏金石録有其目余謁廟見此碑有一孔疑是漢碑審視乃知其為魏也碑中直稱謙之為天師為師君以太武奉道親受符籙故云然字體近拙而多古意中段剝蝕首尾具存碑隂復多題字嵩山碑刻自漢二石闕銘外無古於此者近日葉井叔作嵩陽石刻集記不知何以遺之北齊嵩陽寺碑八分書天平二年四月今在嵩山㑹善寺碑記生禪師造塔及其徒倫豔繼造二塔事書法不工而碑文可誦碑後刻云大唐麟德元年歲次甲子九月景午朔十五日庚申從嵩陽觀移來㑹善寺立則唐人固以為舊物而珍之矣歐趙録却不載唐龍門山石像記正書今在洛陽縣龍門山鐫石為佛像無慮萬計石窟最大者今名賓暘洞像尤髙大洞外石崖髙處有刻字拓之得二十餘行首尾不具不知年月姓名按集古録有三龕記貞觀十五年魏王泰為長孫皇后造岑文本撰銘褚遂良書今拓本有聿修隂德等語又有左武候大將軍相州都督雍州牧魏王及懷鏡奩而不追云云知即此記也汾隂公薛收碑于志寧撰永徽六年今在醴泉縣昭陵陪葬者百六十五人今存者僅十六碑記中載其十五惟遺此碑先師所録必目覩其碑與收得拓本者非然則置之蓋其慎也碑止存百餘字而額尚完葉有道碑李雍撰并書行書開元五年拓本有道之子慧明孫法善三世為道士明皇時法善見尊寵其祖若父之墓碑雍皆撰而書之可謂濫矣書法秀逸閒雅不見欹側之態蔡君謨謂是雍書最佳者良然端州石室記李雍撰正書開元十五年今在髙要縣肇慶府北七星巖古名定山亦曰嵩臺有洞通明宛委記刻在洞門石壁不類北海書集古録疑為張庭圭書庭圭長於八分凡雍文而庭圭書之者皆八分此則正書恐未然也記中云有若邦伯旱公開元時有畢刺史者為宋璟所稱旱當作畢是摹刻之誤支提龕銘蔡景撰正書開元十九年九月今在林縣谼峪衛輝府林縣林慮山在其西黃華天平谼峪其最勝處余逰谼峪宿谼山寺見元敕㫖碑金燈記勍公碑寺東三里許路傍有石龕刻三佛像視其銘乃唐物也書非名人而有初唐筆意以地僻人見者少故不入歐趙諸録惜在露地當移置寺中乃可久耳大照禪師碑李雍撰并書行書天寶元年拓本大照名普寂大通秀之嗣去達摩七世是名北宗門庭甚盛所謂兩京法主三帝門師者也碑當在嵩嶽寺今不存拓本乃翻刻者不逮雲麾嶽麓亞於娑羅耳比干墓碑李翰撰正書天寶十載今在汲縣比干廟唐太宗追贈比干為太師貞觀中既立碑刻詔及祭文天寶中李翰官於衛作此碑述封表之指其文雅正選入唐文粹中今碑乃宋建中靖國元年汲令朱子才重立少林寺還天王師子記正書天寶十四載今在少林寺碑載久視年間僧義奬等狀及武后口勑碑小非名筆故諸録遺之葉井叔官於登封而石刻記亦不載余至少林周行廊廡見此石嵌置東廡壁間亟搨得之知考古必須親閲也峿臺銘元結撰篆書大厯二年浯溪銘元結撰瞿令問篆書大厯三年􅝓亭銘元結撰瞿令問篆書大厯三年右三銘竝在祁陽縣元次山愛祁陽山水遂寓居焉名其溪曰浯溪築臺曰峿臺亭曰唐亭所謂三吾者也臺銘刻在臺之背甚完整溪銘亭銘刻於東崖石上隨石欹斜蘚厚難搨而篆筆特佳視臺銘更勝别有黃山谷書百餘字云與陶介石披榛翦穢得次山銘刻喜而識之又有皇甫湜五言古詩一首次山之子讓五言長律一首俱刻在中興頌之旁般若臺銘李陽氷篆大厯七年今在福州烏石山閩中絶少古刻鼓山題刻如麻無一唐蹟惟此銘在三山為最古又聞石塔寺有唐貞元中碑余未之見延陵季子廟碑蕭定撰張從申書大厯十四年八月今在丹陽縣丹陽城西南六十里有延陵鎮去鎮九里為吳季子廟有孔子十字篆碑及潤州刺史蕭定修廟記大理司直吳郡張從申書并識重刋篆碑歲月二碑蓋同時立也歐陽公不喜從申書僅録其三碑今存者獨此耳昔人評張書頡頏李北海今觀遺刻挺徑有餘而乏雋逸之氣恐未堪肩隨也濟瀆廟碑張洗撰八分書貞元十三年拓本唐制附祭北海於濟源此碑記新作祭器事碑文乃濟源令張洗字濯纓所撰簡古有體裁一洗駢儷之習洗與韓退之同時文體已矯傑如是蓋文弊之極而將變元結權德輿輩皆然不獨韓也阿育王寺常住田碑萬齊融撰范的正書太和七年十二月今在鄞縣育王寺碑載寺田興廢始末開元中祕書正字郎萬齊融撰文趙州刺史徐嶠之書碑燬太和中復立明州刺史于季友作後記屬處士范的重書之鄭氏金石略載的所書凡五碑則固有名當時者碑末有季友與的唱酬二律可補唐風之遺復東林寺碑崔黯撰柳公權書大中十一年今在廬山東林寺寺廢於㑹昌宣宗初崔黯為觀察使謀於舊僧正言修復之黯為作記歐公稱其文辭遒麗可愛今碑斷缺不可讀而字畫存者殊佳東林惟此殘刻及翻刻李北海碑猶存舊蹟若歐陽率更西林道場記顔魯公題名崔融題詩李渤題影堂碑隂皆不可見矣尊勝陀羅尼經正書咸通四年八月拓本經刻於石幢漳州押衙王剬造建州司戶參軍劉鏞書書法婉雅酷有虞氏廟堂筆意其碑當在漳州今未知存否尊勝石幢在處多有余所見吳中包山寺闕年刻溫州仙巖寺大中年刻皆完好包山者書法尤佳字大而刻深宛然如新也修禪道場碑正書無年月今在天台山寺在佛隴為智者大師修禪之所碑文補闕梁肅撰台州刺史徐放書天台山志所載有陳隋唐碑十五六通訪之都不存獨有此碑矗立榛莽中日就刓泐徙置近寺十夫力耳此碑現存而歐趙二録皆不載是知昔人罣漏亦不少也金石略所載又有天台佛隴禪林寺碑亦徐放書今則亡矣石橋寺詩貞元三年正月今在衢州衢州府城南三十里有爛柯山相傳為王質遇仙之所有洞明豁旁峙一碑乃唐衢州刺史嗣江王禕所題五言古詩元和元年州刺史陸庶記云刺史韋公以外祖信安郡王詩刻石朱彛尊云考新唐書表太宗第三子吳王恪恪第三子琨琨子褘舊唐書傳褘少繼江王嚻後封為嗣江王改封信安郡王景雲開元中兩為衢州刺史詩當作於景雲間而刻於貞元也詩中有薄煙冪逺村遙峰沒歸翼二語楊用修以為仙人遺句殆未見此碑故耳又有二碑刻唐人劉迥李幼卿李深謝劇羊滔薛戎詩各一首今亡朔方節度使李光進碑令狐楚撰嗣子季元行書元和十一年今在榆次縣光進與弟光顔並為唐名將憲宗平淮西光顔功最髙唐書二人並有傳光進碑令狐楚所撰光顔碑李程所撰皆名臣也然歐趙二録皆無此二碑歐録所載李光進碑楊炎撰韓秀實書者乃李光弼之弟非光顔兄也趙録有贈太保李良臣碑則光進之父官止雞田州刺史初無功績以光顔故贈太保與二子同葬一地乃趙氏録其一而遺其二殊不可解余友朱錫鬯過榆次趙村搨得此碑以副本遺余故得而録之其良臣光顔碑則已見記中矣憫忠寺重藏舍利記景福元年今在本寺舍利塔一燔於太和八年一燼於中和二年至是僧復嚴葬舍利於憫忠寺觀音像前南敘述記知常書之碑中所云隴西令公大王者李匡威也匡威欲遷舍利於閣內至拜疏於朝請發封壤詔可而後行當時崇重法寶如是金石文字記卷六
