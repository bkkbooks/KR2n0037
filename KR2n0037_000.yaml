body:
  text: 金石文字記目錄類二金石之屬提要臣等謹案金石文字記六卷國朝顧炎武撰前有炎武自序謂抉剔史傳發揮經典頗有歐陽趙氏二錄之所未具者今觀其書裒所見漢以來碑刻以時代為次條下各綴以跋其無跋者亦具其立石年月撰書人姓名證據今古辨正訛誤較集古金石二錄實為精核亦非過自標題也所錄凡百餘種後又有炎武門人呉江潘耒補遺二十餘種碑字間有異者又别為摘錄于末亦猶洪适𨽻釋每碑之後摘錄今古異文某字為某之遺意潜研堂金石文跋尾甞摘其舛誤六條一曰齊隴東王孝感頌炎武未見其碑額臆題為孝子郭巨墓碑一曰唐寂照和尚碑本無刻石年月炎記記為開成六年正月且未考開成無六年一曰元賜㝠福禪院地土牒趙延夀范延光皆押字炎武視之未審誤以為無押字一曰周中書侍郎平章事景範碑本行書而炎武以為正書本題孫崇望書而炎武失載其名皆中其失一曰後漢蕩隂令張遷頌炎武誤以既且二字合為暨字一曰後漢州從事尹宙碑書鉅鹿為鉅鏕證以廣韻注後魏弔比干文及北史皆作鉅鏕炎武誤謂不當從金案張遷頌碑拓本既且二字截然不屬炎武誠為武㫁然字畫分明而文義終不可解當從闕疑金石文跋尾所釋亦未為至確至於鉅鹿之鹿自史記以下古書皆不從金説文亦不載鏕字自玉篇始載之其為顧野王原本或為孫強所加或為宋大廣益㑹玉篇所竄入已均不可知然其註曰鉅鹿鄉名俗作鏕則從今實俗書具有明證北朝多行俗字顔氏家訓甞言之此書亦頗摘其訛北魏人書似不可據為典要廣韻注尤不甚可慿如開卷東字註謂東宫複姓齊有大夫東宫得臣亦可以據駁左傳乎是固未足以服炎武也惟其斥石鼓之偽謂不足儕於二雅未免勇於非古釋校官之碑謂東漢時有校官亦未免疎於考據是則其失之臆斷者耳然在近世著錄金石家其本末明白燦然明白終未能或之先也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀金石文字記原序余自少時即好訪求古人金石之文而猶不甚解及讀歐陽公集古録乃知其事多與史書相證明可以闡幽表微補闕正誤不但詞翰之工而已比二十年間周逰天下所至名山巨鎮祠廟伽藍之跡無不尋求登危峰探窈壑捫落石履荒榛伐頽垣畚朽壤其可讀者必手自鈔録得一文為前人所未見者輒喜而不寐一二先達之士知予好古出其所蓄以至蘭臺之墜文天禄之逸字旁搜博討夜以繼日遂乃抉剔史傳發揮經典頗有歐陽趙氏二録之所未具者積為一帙序之以貽後人夫祈招之詩誦于右尹孔悝之鼎傳之戴記皆尼父所未收六經之闕事莫不増髙五嶽助廣百川今此區區亦同斯指恨生晚不逢名門舊家大半凋落又以布衣之賤出無僕馬往往懐毫䑛墨躑躅於山林猿鳥之間而田父傖丁鮮能識字其或褊於聞見窘於日力而山髙水深為登渉之所不及者即所至之地亦豈無挂漏又望後人之同此好者繼我而録之也東吳顧炎武序
