body:
  text: 金石文字記卷一崑山顧炎武撰商比干銅盤銘今在汲縣北十五里比干墓上衛輝府志曰周武王封比干墓銅盤銘碑石殘斷字畫失真萬厯十五年知府周思宸重摹汝帖立石於墓前薛尚功鐘鼎欵識言唐開元中偃師縣土人耕地得此盤篆文甚竒古其釋文云左林右泉後岡前道萬世之藏兹焉是寳一作前岡後道藏一作靈一作寜茲一作於寳一作保今考之張邦基墨莊漫録曰政和間朝廷求三代鼎彛器程唐為陜西提㸃茶馬李朝孺為陜西轉運遣人於鳳翔府破商比干墓得銅盤徑二尺餘中有欵識一十六字又得玉片四十三枚其長三寸許上圓而鋭下濶而方厚半指玉色明瑩以盤獻之於朝玉留秦州軍資庫道君皇帝曰前代忠賢之墓安得發掘乃罷朝孺退出其盤其玉乆在秦庫近年王庶知秦州日取之而去祁寛居之嘗見之為余言之然則此碑之得自鳳翔不自偃師即其為何代之物不可知而比干殷人必無𦵏鳳翔之理也疑以傳疑姑存之編首云爾周石鼔文石鼓凡十相傳為周宣王獵碣今讀其文皆淺近之辭殊不及車攻吉日之閎深也金史馬定國傳言石鼔自唐以來無定論定國以字畫考之云是宇文周所造作辨萬餘言出入傳記引據甚明楊用修慎最稱好古而亦曰宣王之世去古未逺所用皆科斗籀文今觀説文所載籀文與今石鼓文不同石鼔乃類小篆余獨以其辭不足儕于二雅而疑之今在京師國子監先師廟㦸門左右有元潘迪音訓韓退之石鼓詩陋儒編詩不收入二雅褊迫無委蛇今讀此詩但有鋪張而無意味其有一章之可幾於二雅哉若岣嶁碑詩不知何所據而作注引盛𢎞之荆州記曰南嶽周廻數百里昔禹登而祭之因夢𤣥夷使者遂獲金簡玉字之書徐靈期南嶽記曰昔禹導水通瀆刻石書名山之髙而退之因此作詩其辭曰岣嶁山尖神禹碑字青石赤形摹竒科斗拳身薤倒披鸞飄鳳泊拏虎螭事嚴跡秘鬼莫窺道人獨上偶見之我來咨嗟涕漣洏千搜萬索何處有森森緑樹猿猱悲則是不獨自韓以前未有見此碑者即退之亦未之見也至宋嘉定壬申有何致字子一者始得之祝融峰下手摹以歸及衡山令搜訪已迷其處字奇而不合法語奇而不中倫韻奇而不合古可斷其為偽作而無疑也吉日癸巳世傳周穆王登壇山刻此四字於石金石録以為三代時所用皆古文科斗書而此乃類小篆疑而未信今壇山在贊皇縣東北一十五里而此石已移置縣之儒學㦸門西壁鼎銘今在丹徒縣焦山寺中鼎髙一尺三寸二分腹徑一尺五寸八分口徑一尺四寸五分耳髙三寸濶四寸二分足六寸一分深八寸二分銘九十三字皆古文蝕一字外為雲雷之形其文曰維九月既望甲戌王各古格字于周丙子烝于圖室司徒南中古仲字右古佑字世惠僉立古位字中廷王呼史端册令古命字世惠曰宣治佐王頗側弗作錫女古汝字𤣥衣束帶戈琱㦸縞韠彤矢鋚勒鑾旂世惠敢對揚天子不古丕字顯敬休用作尊鼎用享于列考用周簋壽萬年子孫永寳用朱彛尊曰鼎銘其人莫考曰王格于周曰司徒南仲殆周時器也其曰立中廷按毛伯敦銘文亦有之薛尚功釋為立而周禮小宗伯掌建邦之神位註故書作立鄭司農云立讀為位古者立位同字古文春秋經公即位為公即立則是銘曰立亦當讀位也吳季子墓碑唐大厯十四年潤州刺史蕭定重刻在丹陽縣延陵鎮吳季子廟越絶書曰毘陵上湖中冡者延陵季子冢也古名延陵墟即其地也後人又摹刻於縣南門外驛前元吾丘衍學古編曰按古法帖止云嗚呼有吳君子而已篆法敦古似乎可信今此碑妄増延陵之墓四字除之字外三字是漢人方篆不與前六字合且音君字作季字漢器蜀郡洗郡字半邉正與此君字同用此法也以季字音顯見其謬比干墓前有漢人篆碑亦有此説洪氏隸釋漢隸字源辨之甚明此不復具秦泰山石刻李斯篆金石録言劉跂作秦篆譜凡一百四十四字金薤琳琅言宋莒公摹本僅二世詔五十一字今所存惟臣斯臣去疾御史夫臣昧死言臣請具刻詔書金石刻因明白矣臣昧死請二十九字在嶽頂碧霞元君宫之東廡而泰安州城内東嶽廟中别刻一石亦止二十九字其宋本不傳嶧山石刻李斯篆秦刻乆亡宋淳化四年太常博士鄭文寳以徐鉉摹本刻之於石在陜西西安府儒學中元至元二十九年重刻者在鄒縣治其文有云功戰日作當是攻字古人以攻功二字通用齊侯鎛鐘銘肇敏于戎功作攻周禮肆師凡師不功則助牽王車故書功為工鄭司農讀為功古者工與功同字漢魯孝王刻石八分書金髙徳裔記曰魯靈光殿基西南三十歩有池明昌二年詔脩孔子廟匠者於池中得此石其文曰五鳳二年魯卅四年六月四日成今在孔子廟中五鳳二年者漢宣帝有天下之年也魯卅四年者魯孝王有國之年也上書天子大一統之年而下書諸侯王自有其國之年此漢人之例也三代之時侯國之為史者則但書本國之年而不書天子之年春秋隠公元年者何自魯人書之也泰誓十有三年者何自周人書之也趙明誠金石録有楚鐘銘曰惟王五十六祀考楚惟惠王在位五十七年而論之曰方是時王室衰弱六國争雄楚尤强大遂不用周之正朔嗚呼可謂僭矣楚之僭在王而不在乎自紀其元也春秋書隠公元年豈亦不用周之正朔者乎劉原父曰元者始爾君之始年謂之元年猶嵗之初月謂之正月非有天子諸侯之辨也漢時諸侯王得自稱元年漢書諸侯王表楚王戊二十一年孝景三年楚王延壽三十二年地節元年之類是也淮南子天文訓曰淮南元年冬者淮南王安始立之年也注者不解乃曰淮南王作書之元年又曰淮南王僭號此殆未讀史記漢書者矣又考漢時不獨王也即列侯於其國中亦得自稱元年史記髙祖功臣侯年表髙祖六年平陽懿侯曹參元年孝惠六年靖侯窋元年孝文後四年簡侯竒元年絳侯世家上言侯建徳十三年下言元鼎五年是也吕氏考古圖周陽侯甗鍑銘曰周陽侯家銅三習甗鍑容五斗重十八斤六兩侯治國五年五月國鑄第四吕大臨曰侯治國五年者自以侯受侯嗣位之年數色主反也文選魏都賦劉良注文昌殿前有鐘其銘曰惟魏四年嵗次丙申龍次大火五月丙寅作㽔賔鐘魏四年者曹操為魏公之四年漢獻帝之建安二十一年也嵩山太室神道石闕銘八分書元初五年四月今在登封縣中嶽廟南百餘歩銘八行年月及職官姓名共十三行完好未圮而其文剥蝕殆半若少室啟母二所即闕亦就隤矣其文曰惟中嵩髙神君休最純春生萬物寸起雲潤施原流宣竝天四海莫不䝉恩聖朝肅敬衆庶所尊奉起盡勤功徳刻石紀文顯異以傳後賢元初五年四月陽城長左馮翊萬年吕常始造作此石闕以後列職官姓名字多漫滅不可識竝天暜天也古人省文嵩山三石闕不載洪氏隸釋故今録其全文此三闕巋然尚在而永叔徳父當宋之盛時何以皆未之見則知二録所不及載者固多也開母廟石闕銘篆書延光二年今在嵩山啟母廟南漢避景帝諱改啓之字曰開葉封嵩陽石刻記曰今見存篆書三十二行前題名十行行七字内第三行止六字以少室石闕所列官名參考之則此十行之上無闕文也後二銘共二十二行前銘十二行年月一行每行十二字今止存六字後銘今止存九行每行亦止存六字蓋亡其上一層矣後銘視嵩髙志所載又闕四句又曰闕式以石條累砌如牆而闕其中石質甚粗劣空地間雜刻花紋亦不工細即篆文亦未盡善也内修條二字皆從彳嵗屠維協洽莫春予親至廟下視此石闕井叔所謂闕四句者今又得四行二十餘字以文多不能容故轉而刻於其旁仍亡其上一層也其文曰開母廟神道闕時太守朱寵丞零陵泉陵薛政五官椽隂林户曹史夏效監椽陳修長西河圜陽馮寳丞漢陽冀秘俊廷椽趙穆户曹史張詩將作椽嚴壽伍左福已上題名百川柏鯀稱遂浩浩下民震驚寫𤣥九山甄旅漢山辛癸之間斯民同心濟替又遭亂秦馮神􅀈彼飛雉符瑞靈支挺生􅀈清興雲降雨不歇比性乾坤我君千秋萬祀銘功昭眂後昆二年以上銘文重曰徳洋溢而溥優則文燿以消揺皇極正而降休芬茲楙于圃疇木連理於芊條胙日新而累熹咸來王而會朝九域其修治祀聖母虖山隅神亨而格釐我后以萬祺于樂而罔永厯載而保之已上後銘文重曰二字出楚辭逺逰篇所謂言之不足而長言之也井叔誤以為重日而云是年月一行按此一行今存六字二年之下重曰之上空石未鐫益明其非紀日矣漢書班倢伃自悼賦文選潘岳寡婦賦亦竝用重曰二字少室神道石闕銘篆書今在登封縣西十里邢家舖西距少室山尚十餘里當是漢時廟在其地葉封嵩陽石刻記曰凡二十一行行四字其所列丞薛政等與啓母廟同其為一時所立無疑也此闕有銘辭而今僅存二行八字其可辨者五字又云三月三日而上無年云郡陽城縣而上無郡名亦亡其上石一層矣其見存之文每行四字曰林芝日月而三月三日郡陽城縣興治神道君丞零陵泉陵薛政五官掾隂林户曹史夏效監廟掾辛述長西河圜陽馮寳丞漢陽冀秘俊廷掾趙􅀈户曹史張詩將作掾嚴壽廟佐向猛趙始北海相景君碑并隂八分書漢安二年八月今在濟寜州儒學漫漶魯相乙瑛置孔子廟百石卒史碑八分書永興元年六月今在曲阜縣廟中後人刻其上曰漢鍾太尉書洪氏隸釋曰按圖經云鍾繇書繇以魏太和四年卒上距永興七十八年圖經所云非也百石卒史者秩百石之卒史也漢書儒林傳郡國置五經百石卒史倪寛𫝊補廷尉文學卒史臣瓚曰漢注卒史秩百石是也若三輔卒史則二百石黄霸𫝊補左馮翊二百石卒史因其秩有不同故舉其石之多寡以别之水經注載此為後人不通者改作百夫吏卒杜氏通典刻本亦作百户吏卒三國志監本同魯相韓勑造孔子廟禮器碑并隂八分書永壽二年九月今在廟中碑兩旁竝有刻字郎中鄭固碑八分書延熹元年今在濟寜州儒學其文有云逡遁退讓者逡巡之異文也管子桓公蹵然逡遁漢書平當𫝊贊逡遁有恥敘𫝊逡遁致仕周禮司士注王揖之皆逡遁既復位儀禮士昬禮大射禮公食大夫禮注辟逡遁鄉射禮注少退少逡遁也聘禮注辟位逡遁又三退三逡遁也又辟位逡遁又辟於其東面位逡遁也又退為大夫降逡遁士喪禮注辟逡遁辟位也特牲饋食禮注辟位逡遁禮記玉藻注俛逡遁而退著屨也皆同此文顔之推匡謬正俗曰賈誼過秦論九國之師遁巡而不敢進遁者蓋取循聲以為逡字當音七均切然余考之古書亦多不同如晏子春秋有云晏子巡遁而對有云晏子逡循對曰漢書萬章𫝊章逡循甚懼外戚𫝊逡循固讓皆以下字為循而此碑及漢書禮注又以遁為巡又如莊子忠諫不聴蹲循勿争靈樞經黄帝避席遵循而却亢倉子荆君北面遵循稽首又逡循之異文而王莽傳俊儉隆約以矯世俗師古曰俊音千旬反退也其字從彳則又逡之異文也楚辭九章思美人遷逡次而勿驅兮漢書公孫𢎞傳有功者上無功者下則羣臣逡皆作逡碑又書妣為姕與堂邑令費鳳碑同而玉篇云姕必媚切女名此又後人之解也漢人書有遁甲開山圖雲麓漫鈔曰世傳遁甲書甲既不可隱何名為遁因引此碑證為循甲言以六甲循環推數也今按遁字古人以代巡字者多當是巡甲太𤣥經云巡乗六甲與斗相逢此碑上有一大孔漢碑多如此劉熙釋名碑被也此本王莽時所設也施轆轤以繩被其上以引棺也臣子追述君父之功美以書其上後人因焉故建於道陌之頭顯見之處名其文就謂之碑也此後漢時人所見云爾不知周時固有碑矣檀弓公室視豐碑注云豐碑斵大木為之形如石碑於椁前後四角樹之穿中於間為鹿盧下棺以繂繞正義曰繂即紼也鑿去碑中之木令空於空間著鹿盧鹿盧兩頭各入碑木以紼之一頭繫棺緘以一頭繞鹿盧既訖而入各背碑負紼末頭聴鼔聲以漸卻行而下之喪大記君葬用輴四綍二碑大夫葬用輴二綍二碑又曰凡封用綍去碑負引注云樹碑於壙之前後以紼繞碑間之鹿盧輓棺而下之此時棺下窆使輓者皆繫紼而繞要負引舒縱之備失脱也用紼去碑者謂縱下之時也此劉熙所指𦵏時施鹿盧下棺之碑也聘禮賓自碑内聴命又曰東面北上上當碑南注云宫必有碑所以識日景引隂陽也凡碑引物者宗廟則麗牲焉以取毛血其材宫廟以石窆用木祭義君牽牲既入廟門麗於碑注云麗繫也謂牲入廟繫著中庭碑也雜記宰夫北面於碑南東上此注家所指在宫廟之中一為賔揖之碑一為麗牲之碑者也碑之字本從石窆用木者取其便於事也其見於西漢人之書者淮南子盧敖見若士遯逃乎碑注曰匿于碑隂是也孫何碑解曰何始寓家於潁嘗適野見荀陳古碑數四皆穴其上若貫索之為者問故起居郎張公觀公曰此無足異也蓋漢去聖未逺猶有古豐碑之象耳後之碑則不然矣予見漢碑皆髙不過今之三尺餘可用以麗牲以木為之可用以引棺今既失其穿中之制而碑之髙大乃無限度與古人之碑名同而體異也楚相孫叔敖碑并隂八分書延熹三年五月拓本此碑見於水經注言在期思縣城西北隅楚相孫叔敖廟前然作文之人似不曽見春秋史記者其文云叔敖為相庶人有曽閔貞孝之行叔敖相楚莊王乃魯宣公時而曽閔二子魯定哀間人當楚昭王惠王之世援後贊前已為不順又云繼髙陽重黎伍舉子文之統則大可異伍舉乃靈王時人在叔敖後四五十年而邲之戰叔敖所斥嬖人伍參即舉之父乃云繼其統何耶又云仕于靈王又云卒而莊王封之按春秋莊王子共王共王子康王靈王今反以靈王在莊王之前可謂目不知書者矣碑云楚相孫君諱饒字叔敖馬驌曰左傳宣十一年令尹蒍艾獵城沂杜氏注蒍艾獵孫叔敖也不名饒冀州刺史王純碑八分書延熹四年十二月拓本泰山都尉孔宙碑并隂八分書延熹七年二月今在曲阜縣廟中按後漢書孔融父伷泰山都尉非也當依碑作宙三國志注引續漢書亦作宙其名伷者别自一人董卓傳以陳留孔伷為豫州刺史袁紹臧洪傳同符融傳薦達郡士范冉韓卓孔伷等三人三國志魏武帝紀豫州刺史孔伷注引英雄記伷字公緒鄭太𫝊孔公緒清談髙論嘘枯吹生九州春秋作胄乃獻帝時人伷事略見許靖傳此泰山都尉乃融之父耳又韓勑碑隂出錢數郎中魯孔宙季將千王𢎞撰曰漢碑隂無額獨此有篆門生故吏名五大字書法視前碑微異當别是一手西嶽華山廟碑八分書此為漢延熹八年四月甲子前𢎞農太守汝南袁逢所立㑹遷京兆尹後太守安平孫璆遵而成之者碑舊在華隂縣西嶽廟中嘉靖三十四年地震碑毁華州郭𦙍伯有此拓本文字完好今藏華隂王無異家其末曰京兆尹勅監都水掾霸陵杜遷市石遣書佐新豐郭香察書東漢人二名者絶少而察書乃對上市石之文則香者其名而特勘定此書者爾漢碑未有列書人姓名者歐陽叔弼以香察為名殆非也勅者自上命下之辭漢時人官長行之掾屬祖父行之子孫皆曰敕考之前史陳咸傳言公移敕書而孫寳之告督郵何竝之遣武吏俱載其文為敕曰他如韋賢丙吉趙廣漢韓延壽王尊朱博龔遂之傳其言敕者凡十數見後漢書始變為勑而後人因之淮南子重九􅀢注􅀢音整形也六朝時敕字多改作勑故因之而變五經文字曰敕古勑字今相承皆作勑惟整字從此敇何曽𫝊人以小紙為書者勑記室勿報則晉時上下猶通稱之也至南北朝以下則此字惟朝廷専之而臣下不敢用故北齊樂陵王百年習書數勑字而遂以見殺此非漢人所當忌也且蜀之秦宓字子勑見於國志矣歐陽公録魯相韓勑脩孔子廟器碑乃疑自古人臣無名勑者而陸徳明言此俗字也字林作敕𦙍伯以為其來旁從力者别音賚故魯相得名焉則不知此碑之作勑者又何説也沛相楊統碑孝以勑内仙人唐公房碑勑尉部吏收公房妻子皆此勑字今尚書臯陶謨益稷康誥多士詩楚茨易噬嗑大象之文竝作勑而周禮樂師詔來瞽臯舞注云來勑也勑爾瞽率爾衆工奏爾悲誦肅肅雍雍毋怠毋凶鄭康成漢人也其訓來為勑又何哉其曰左尉唐佑按百官志尉大縣二人小縣一人故橋𤣥補雒陽左尉此言左尉亦以縣大而設之兩尉與史書合濟隂太守孟郁堯廟碑韓勑孔廟後碑殽阬君碑張公神碑三公山碑無極山碑皆有左尉風俗通有武當左尉又郡國志𢎞農郡下云華隂故屬京兆建武十五年屬而此碑袁府君逢先為𢎞農太守後遷京兆尹故所書丞尉一為河南京人一為河南密人主者掾則華隂人漢時丞尉及掾俱用本郡人三輔郡得用他郡人𢎞農在後漢為三輔故得用旁郡人為丞尉而京兆尹所遣掾佐一為霸陵人一為新豐人則客也故别書於下而言京兆尹勑遣之以著袁君之已遷官而不忘敬于神也使其在本郡之官與掾則市石察書有不必言者矣又律厯志有太史治厯郎中郭香豈其人歟子曰可與言而不與之言失人因書之以遺無異而又惜𦙍伯之不獲同時而論正也婁機漢隸字源曰按繁陽令楊君碑隂有程勑則在漢非獨韓名勑也勑雖本音徠説文勞也考之碑韓字叔節鄭字伯嚴其義非勞徠之徠當讀為飭漢碑范史多用勑字蓋是時上下皆通用初無拘也考之博古圖諸書有孝成鼎銘曰工王褒造左丞輔掾譚守令史永省大官銅鐘曰考工令史古丞或令通主太僕監掾蒼省綏和壺曰掾臨主守右丞同守令寳省上林鼎曰工史榆造監工黄佐李負芻言省言監即察書之類也孝宣本號中宗而此碑乃作仲宗按孝亷栁敏碑五行星仲廿八舎栁宿之精是亦以仲為中也以孝武之求神仙為登假之道按列子黄帝篇曰天下大治幾若華胥氏之國而帝登假周穆王篇曰穆王幾神人哉能窮當身之樂猶百年乃徂世以為登假焉莊子徳充符篇曰彼且擇日而登假大宗師篇曰是知之能登假於道也若此蓋以為千嵗厭世去而上仙之意按曲禮告喪曰天王登假鄭氏注曰登上也遐已也上已者若仙去云爾是漢人之解登假皆以莊子之言為據也竹邑侯相張壽碑八分書建寜元年五月今在城武縣土人截為後人碑趺止存二百餘字冀州從事張表碑八分書建寜元年十一月拓本金鄉長侯成碑八分書建寜二年拓本其文有云滋滋履真者孳孳之異濟隂太守孟郁修堯廟碑亦以滋滋為孳孳漢碑未有志其夫人者此碑末云夫人以延熹七年嵗在甲辰十一月三日庚午遭疾終又郎中馬江碑云夫人寃句曹氏終温淑慎咸曰女師年五十五建寜三年十二月卒此後人作碑并志夫人之始史晨請出家榖祀孔子碑八分書建寜二年三月今在曲阜縣廟中飲酒畔宫者泮宫之異文也益州太守髙眹修周公禮殿記亦作畔宫史晨饗孔廟後碑八分書今在廟中後有武后天授二年馬元貞題名淳于長夏承碑八分書建寜三年六月舊在廣平府學都太僕穆金薤琳琅謂江隂徐公擴嘗得舊刻雙鈎其字以惠予與此絶異舊刻闕字四十五而此獨完好又積行勤約今作勤紹俱為可疑謂是後人偽作今此碑又亡而嘉靖二十四年知府唐曜重刻者在漳川書院彌失真矣衛尉卿衡方碑八分書建寜三年六月今在汶上縣其文有曰履該顔原兼修季由洪氏以顔原為顔淵原憲而都太僕以季由為仲由字季路即是一人與兼修之義不協按史記仲尼弟子𫝊公晳哀字季次孔子曰天下無道多為家臣仕於都惟季次未嘗仕逰俠𫝊季次原憲終身空室蓬户褐衣疏食不厭死而已四百餘年而弟子志之不倦然則季乃季次也四人皆安貧守道之士故竝舉言之其一字一名亦古文之所嘗有也博陵太守孔彪碑并隂八分書建寜四年六月今在曲阜縣其文有云抍馬者易明夷六二渙初六皆曰用拯馬壯拯字子夏傳説文字林竝作抍音升一音承上舉也漢時所傳如此而今作拯者唐開成以後所定也又按方言抍㧞也出㲻古溺字為抍周禮職幣注振猶抍也大司徒注振窮抍救天民之窮者也新唐書楊於陵傳抍救貧民用此字又作撜淮南子子路撜溺而受牛謝注撜音蒸舉也升出溺人則撜與抍同為一字矣古又有作承者列子使弟子竝流而承之李翕析里橋郙閣銘八分書建寜五年今重刻在略陽縣其文有云醳散闗之嘲漯者楊用修以醳為釋嘲為潮漯為濕是也歐陽永叔集古録曰後漢熊君碑其書顯字皆為􅢃按説文顯從㬎聲而轉為累其失逺矣莫曉其義也愚考累字从日从糸乃㬎之省説文㬎以日中視絲古文借以為顯字殽阬碑隂顯字再見皆作􅢃而後人寫作田者誤也古人以濕為漯者不一説文濕水出東郡東武陽入海从水㬎聲他合切漢書王子侯表濕成侯忠師古曰濕音它合反功臣表駟望侯冷廣以濕沃公士師古曰濕音它合反功臣表有濕隂定侯昆邪霍去病傳王莽傳竝作漯隂地理志平原有漯隂縣而水經濕餘水亦漯字之異文荀子窮則棄而儑注儑當為濕韓詩外傳作棄而累魏建成鄉侯劉靖碑隰字作􅀈惟其以日為田此永叔之所以疑也司隸校尉魯峻碑并隂八分書熹平二年四月今在濟寜州儒學石經八分書熹平四年予兩見此本一於鄒平張氏一於京師孫氏尚書盤庚篇三十餘字論語為政篇七十餘字堯曰篇三十餘字以視洪氏隸釋所存不過什之一而已按三體石經漢魏皆嘗立之熹平之立石見於後漢書靈帝紀蔡邕傳張馴傳儒林傳宦者傳正始之立石見於晉書衞恒傳而水經注則曰漢碑五經立於太學講堂前悉在東側碑上悉刻蔡邕等名魏正始中又立古篆隸三字石經魏初傳古文出邯鄲淳石經古文轉失淳法樹之於堂西石四十八枚廣三十丈雒陽伽藍記則曰堂前有三種字石經二十五碑表裏刻之寫春秋尚書二部作篆科斗隸三種字漢右中郎將蔡邕筆之遺跡也猶有十八碑餘皆殘毁復有石碑四十八枚亦表裏隸書寫周易尚書公羊禮記四部又讚學碑一所竝在堂前章懐太子引雒陽記則曰講堂長十丈廣二丈堂前石經四部本碑凡四十六枚少二枚西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉崩壊東行論語三碑二碑毁禮記碑上有諫議大夫馬日磾議郎蔡邕名此皆當時親見其石而記之者也合而考之其不同有四焉一曰漢五六七經之不同二曰魏石經三體一體之不同三曰堂西所立石為魏為漢之不同四曰後魏所存石諸經之不同後漢書本紀儒林宦者傳皆云五經蔡邕張馴傳則以為六經隋書經籍志又以為七經此言漢五六七經之不同也衛恒傳言魏初傳古文者出於邯鄲淳至正始中立三字石經轉失淳法因科斗之名更效其形水經注亦云三字石經在堂西而伽藍記以為表裏隸書隋書經籍志則謂之一字石經矣然則所謂效科斗之形而失淳法者安在耶此言魏石經三體一體之不同也金石録曰漢石經蔡邕小字八分書後漢書儒林傳序云為古文篆隸三體者非也盖邕所書乃八分而三體石經乃魏時所建也伽藍記二十五碑為三種字四十八碑表裏隸書水經注謂漢碑在堂東側而四十八碑為魏經在堂西乃雒陽記不言東側有碑而云堂前有四十六枚上有馬日磾蔡邕名又不言字之為三體一體無乃并水經之所謂魏者而指之為漢歟此言堂西所立石為魏為漢之不同也伽藍記云周易尚書公羊禮記四部雒陽記則多一論語而趙明誠金石録言其家所收又有詩儀禮苟非其傳拓之本出於神龜以前則不應以宋人之所收而魏時猶未見也此言後魏所存石諸經之不同也凡此皆不可得而詳矣若夫魏書江式傳謂魏三字石經立於漢碑之西為邯鄲淳書則不考衛恒之言而失之者也胡三省通鑑注云魏碑以正始年中立漢書言元嘉元年度尚命邯鄲淳作曹娥碑時淳已弱冠自元嘉至正始九十餘年謂淳所書非也孝静帝紀武定四年八月遷雒陽漢魏石經于鄴北齊書文宣帝紀言有五十二枚視伽藍記所列東二十五西四十八之數僅失二十一枚耳而隋書經籍志言河陽岸崩遂没於水得至鄴者不盈太半則不考北齊之紀而失之者也周書宣帝紀大象元年二月辛卯詔徙鄴城石經於雒陽隋書於劉焯傳言開皇六年運雒陽石經至京師而經籍志則云自鄴載入長安則自不考其列傳而失之者也此皆其乖誤之易見者也又晉書裴頠傳曰轉國子祭酒奏修國學刻石寫經而水經注諸書無言晉石經者豈頠嘗為之而未成耶今此之本据宋黄長睿東觀餘論云本在雒宫前御史臺中年乆摧散雒中好事者時時得之今張燾龍圖家有十版張氏壻家有五六版王晉玉家有小塊予皆得其拓本邵伯温聞見後録言近年雒陽張氏發地得石十數而董逌廣川書䟦記尚書存二百三十六字論語存三百五十七字今此石已不知其何所歸而拓本之存於世者固往往而有也衛恒四體書勢序曰自秦壊古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書許慎撰説文用篆書為正秦時李斯號為工篆諸山及銅人銘皆斯書也漢建初中扶風曹喜少異於斯而亦稱善邯鄲淳師焉略究其妙漢末又有蔡邕采斯喜之法為古今雜形然精密閑理不如淳也其所論者中郎之篆爾不言及隸以今推之漢人之所通行者隸也石經固有古文篆二體矣未知其出於何人若夫中郎之作隸者蓋随俗為之欲人易曉而已固不若許叔重之一㸃一畫皆有根柢也故唐李陽氷言蔡中郎以豊同豐按豐字自後漢三公山碑武都太守李翕西狹頌等碑多已作豊不始於中郎也李丞相將束為宋魯魚一惑涇渭同流而張參作五經文字每言上説文下石經石經之文大抵其變而從省者也省者謂之隸其稍繁而猶雜篆法者謂之八分為八分者已不必能通六書之指矣故韓退之贈張秘書詩云阿買不識字頗知書八分而况於為隸為真以至於行草乎雖然古文之變而為篆又變而為隸也五經之異同變而歸於一也此亦勢之不得不然而中郎固適當其時者也顔氏家訓曰世間小學者不通今古必依小篆是正書記凡爾雅三蒼説文豈能盡得蒼頡本指哉亦是随代損益各有同異然則唐人試士必以石經説文字林者蓋欲其兼古今之法而曉變通之意乎又按宋胡宗愈重刻漢石經記曰茲來少城得墜刻於一二故家因以鑱之錦官西樓宇文紹奕䟦言給事内翰胡公旁搜博訪合諸家所藏得蔡中郎石經四千二百七十字有竒以楷書釋之又得古文篆隸三體石經遺字八百一十九竝鑱諸石夫字至四千二百七十有竒三體之文又八百一十九可謂多矣而成都兵火之後此石恐已不存亦未見拓本元吾丘衍學古編曰石經遺字碑㑹稽蓬萊閣翻本破缺磨滅不異真古碑今無矣豫州從事尹宙碑八分書熹平四年四月今在鄢陵縣豫字磨滅以其潁川人而言本州知其為豫州也其文曰君諱宙字周南其先出自有殷迺迄于周世作師尹赫赫之盛因以為氏吉甫相周宣勛功有章文則作頌武襄獫狁二子著詩列於風雅及其𤣥孫言多世事景王載在史典秦兼天下侵暴大族支判流僊或居三川或徙趙地漢興以三川為潁川分趙地為鉅鏕故子心騰於楊縣致位執金吾子孫以銀艾相繼在潁川者家于傿陵克纘祖業牧守相亞君東平相之𤣥會稽太守之曽富波侯相之孫守長社令之元子也君體温良恭儉之徳篤親於九族恂恂於鄉黨交朋會友貞賢是與治公羊春秋經博通書𫝊仕郡厯主簿督郵五官掾功曹守昆陽令州辟從事立朝正色進思盡忠舉衡以處事清身以厲時髙位不以為榮卑官不以為恥含純履軏秉心惟常京夏歸徳宰司嘉焉年六十有二遭離寢疾熹平六年四月己卯卒於是論功叙實宜勒金石廼作銘曰於鑠明徳於我尹君龜銀之胄奕世載勛綱紀本朝優劣殊分守攝百里遺愛在民佐翼牧伯諸夏肅震當漸鴻羽為漢輔臣位不福徳壽不隨仁景命不永早即幽昬名光來世萬祀不泯左氏襄公三十年傳有尹言多當周景王之世漢書酷吏𫝊尹賞字子心楊氏人也以右輔都尉遷執金吾卒官今碑曰楊縣按楊氏縣屬鉅鹿郡於文不當省氏字也河東郡自有楊縣又鉅鹿之鹿不當從金位不福徳福字亦副字之誤溧陽長潘乾校官碑八分書光和四年十月宋趙彦衛雲麓漫鈔曰范曄後漢書永平十年閏月甲午南巡狩幸南陽祠章陵日北至又祠舊宅禮畢召校官弟子作雅樂奏鹿鳴帝自御塤篪和之以娛嘉賔則東漢時縣有校官矣都穆金薤琳琅曰碑在今南畿溧水縣學溧水即漢溧陽地也有元至順四年單禧釋文考正碑文與隸釋不同者十餘字碑辭末云永世支百民人所彰子子孫孫俾爾熾昌宋吳棫韻補引之作民人所瞻以證詩桑柔瞻字可讀為彰今此碑正作彰字不知才老何所據而改為瞻也單禧䟦云宋紹興十一年溧水尉喻仲逺得於固城湖濵置之官舍才老時此碑未出或據類文才老自注云三十卷本朝陶内翰穀所編録之耳白石神君碑并隂八分書光和六年今在無極縣後有燕元璽三年題名元璽慕容雋號郃陽令曹全碑并隂八分書中平二年十月今在郃陽縣此碑萬厯中掊地得之文字最為完好此洪氏所未見今録其文於左君諱全字景完燉煌效穀人也其先蓋周之胄武王秉乾之機翦伐殷商既定爾勲福禄攸同封弟叔振鐸於曹國因氏焉秦漢之際曹參夾輔王室世宗廓土斥竟子孫遷於雍州之郊分止右扶風或在安定或處武都或家隴西或居燉煌枝分葉布所在為雄君髙祖父敏舉孝廉武威長史巴郡胊忍令張掖居延都尉曽祖父述孝亷謁者金城長史夏陽令蜀郡西部都尉祖父鳳孝廉張掖屬國都尉丞右扶風隃麋侯相金城西部都尉北地太守父琫少貫名州郡不幸早世是以位不副徳君童齔好學甄極毖緯無文不綜賢孝之性根生於心收養季祖母供事繼母先意承志存亡之敬禮無遺闕是以鄉人為之諺曰重親致歡曹景完易世載徳不隕其名及其從政清擬夷齊直慕史魚厯郡右職上計掾史仍辟涼州常為治中别駕紀綱萬里朱紫不謬出典諸郡彈枉糾邪貪暴洗心同僚服徳逺近憚威建寜二年舉孝廉除郎中拜西域戊部司馬時䟽勒國王和徳弑父簒位不供職貢君興師征討有吮膿之仁分醪之恵攻城野戰謀若涌泉威牟諸賁和徳面縛歸死還師振旅諸國禮遺且二百萬悉以簿官遷右扶風槐里令遭同産弟憂棄官續遇禁罔潛隠家巷七年光和六年復舉孝廉七年三月除郎中拜酒泉禄福長訞賊張角起兵幽冀兗豫荆揚同時竝動而縣民郭家等復造逆亂燔燒城寺萬民騷擾人裹不安三郡告急羽檄仍至於時聖主諮諏羣僚咸曰君哉轉拜郃陽令收合餘燼芟夷殘迸絶其本根遴訪故老商量儁艾王敞王畢等恤民之要存慰髙年撫育鰥寡以家錢糴米粟賜癃盲大女桃婓等合匕首藥神明膏親至離亭部吏王宰程横等賦與有疾者咸䝉瘳快惠政之流甚於置郵百姓繦負反者如雲戢治廧屋市肆列陳風雨時節嵗獲豐年農夫織婦百工戴恩縣前以河平元年遭白茅谷水災害退於戌亥之間興造城郭是後舊姓及修身之士官位不登君乃閔縉紳之徒不濟開南寺門承望華嶽鄉明而治庶使學者李儒欒䂓程寅等各獲人爵之報廓廣聽事官舎廷曹廊閣升降揖讓朝覲之階費不出民役不干時門下掾王敞録事掾王畢主簿王厯戸曹掾秦尚功曹史王顯等嘉慕奚斯考甫之美乃共刋石紀功其辭曰懿明后徳義章貢王庭征鬼方威布烈安殊荒還師旅臨槐里感孔懐赴喪紀嗟逆賊燔城市特受命理殘圯芟不臣寜黔首繕官寺開南門闕嵯峨望華山鄉明治惠霑渥吏樂政民給足君髙升極鼎足中平二年十月丙辰造碑隂故三老商量伯祺五百郷三老司馬集仲裳五百徴博士李儒文優五百故門下祭酒姚之辛卿五百故門下掾王敞元方千故門下議掾王畢世異千故督郵李諲伯嗣五百故督郵楊動子豪千故將軍令史董溥建禮三百故郡曹史守丞馬訪子謀不言錢數下同故郡曹史守丞楊榮長孳故鄉嗇夫寜駿安雲故功曹任干子流故功曹曹屯定吉故功曹王河孔達故功曹王吉子僑故功曹王時孔良五百故功曹王獻子上故功曹秦尚孔都二但一二字故功曹王衡道興故功曹楊休當女五伯故功曹王衍文珪故功曹秦杼漢都千璉秦杼後一行但一璉字與都字竝故功曹王詡子𢎞故功曹杜安元進右上一層處士河東皮氏岐茂孝才二百右超上一層書之故門下賊曹王翊長河故主簿鄧化孔彥故市掾杜靖彦淵故市掾王尊文熹故郵書掾姚閔升臺萌仲謀三字一行萌字與閔竝宣二字一行與仲竝元一行與宣竝右第二層故市掾王建和故市掾成播尋舉故市掾楊則孔則故市掾程璜孔休故市掾扈安子安千故市掾髙貞顯和千故市掾王􅀈季晦故門下史秦竝静先右第三層右曹史髙廉吉千部掾趙炅文髙故塞曹史吳産孔才五百故塞曹史杜苖幼始故法曹史王文故賊曹史趙福文祉故集曹史柯相文舉千故金曹史精畼文亮故賊曹史王授文博起一行與博字竝右第三層左義士河東安邑劉政元方千義士侯褒文憲五百義士潁川臧就元就五百義士安平􅀈博季長二百右第四層按後漢書西域傳靈帝建寜元年疏勒王與漢大都尉於獵中為其季父和得所射殺和得自立為王三年涼州刺史孟佗遣從事任渉將敦煌兵五百人與戊巳司馬曹寛西域長史張晏將焉耆龜茲車師前後部合三萬餘人討疏勒攻楨中城四十餘日不能下引去據此碑則寛當為全戊巳司馬當為戊司馬而碑云和徳面縛歸死則當日邉臣虚上功狀而文人遂以飾之於碑者也碑又曰續遇禁罔潛隱家巷七年光和六年復舉孝廉此則全為黨錮中人而史傳闕之也朱彛尊曰史載疏勒王臣磐為季父和得所射殺而碑云和徳弑父簒位徳與得文亦不同大女桃婓揚雄反離騷昔仲尼之去魯兮婓婓遲遲而周邁師古曰婓婓往來貌也列仙傳江婓二女則竟以為妃之異文文選左思蜀都賦娉江婓與神逰吳都賦江婓於是往來五臣竝作妃其字亦可作婔真誥江婔登湄而解佩按魏書刑法志有河隂縣民張智壽妹容妃則固有以民間女而稱妃者凡亭舎之去郡縣逺者謂之離亭猶曰離宫也其在郭内者謂之都亭此文乃王敞王畢等相與為之而自稱為俊艾無乃自譽耶處士者徳行可尊之人義士則但出財之人而已今人出財布施皆曰信士宋太宗朝避御名凡義字皆改為信今之信士即漢碑所稱之義士也尉氏令鄭君碑八分書中平二年今在濟寜州儒學祗存數字碑隂列故吏處士人名尚完蕩隂令張遷碑八分書中平三年二月今在東平州儒學其文有云荒逺既殯者賔之誤中謇於朝者忠之誤而又有云爰既且於君則暨之誤古字多通而賔旁加歹巳為無理又何至以一字離為二字也歐陽趙洪三家皆無此碑山東通志曰近掘地得之豈好事者得古本而摹刻之石遂訛謬至此耶金石文字記卷一
