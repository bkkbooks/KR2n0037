body:
  text: 金石文字記卷三崑山顧炎武撰唐芮公豆盧寛碑正書永徽元年今在醴泉縣殘缺大唐三藏聖教序并記太宗撰序髙宗撰記褚遂良正書永徽四年十二月今在西安府城南慈恩寺塔下趙崡曰據張茂中逰城南記云寺經廢毁殆盡惟一塔儼然則今寺亦非唐剙而塔自宋熙寧火後不可登萬厯甲辰重加修飾施梯始得至其巔求記所謂唐人墨蹟孟郊舒元輿之類皆不可得塔下四門以石為桄桄上唐畫佛像精絶為㳺人刻名侵蝕可恨東西兩龕褚遂良書聖教序記尚完好而唐人題名碑刻無一存者問之僧云塔前元有碑亭乙卯地震塔頂墜壓為數段今亡矣萬年宫銘髙宗御製并書行草永徽六年五月今在麟逰縣舊唐書髙宗永徽二年九月戊戌改九成宫為萬年宫乾封二年二月辛丑改萬年宫依舊名九成宫冊府元龜永徽五年五月制萬年宫銘刻石于永光門外仍令中書門下及文武三品已上并學士自書名位于碑隂刻之尚書張後𦙍碑正書顯慶三年三月今在醴泉縣衛公李靖碑許敬宗撰王知敬正書顯慶三年今在醴泉縣殘缺其文有曰憫茲視􅳣􅳣即肉字謂蚩愚之人也史記李斯傳禽鹿視肉索隱曰禽鹿猶禽獸也言禽獸但知視肉而食之莊子及蘇子曰人而不學譬之視肉而食文子言人有二十五等其二十四等謂之肉人廣韻肉俗作􅳣越絶書陳音對越王斷竹續竹飛土逐􅳣作此􅳣字乃俗書也而今人以為古字誤矣王居士磚塔銘上官靈芝撰敬客正書顯慶三年十月近出終南山楩梓谷土中蘭陵長公主碑正書顯慶四年十月今在醴泉縣首曰太宗文皇帝之第十九女也殘缺岱岳觀造像記正書顯慶六年二月泰山之東南麓王母池有唐岱嶽觀今存小殿三楹土人稱為老君堂其前有碑二髙八尺許上施石蓋合而束之其字每面作四五層每層文一首或二首皆唐時建醮造像之記周環讀之得顯慶六年一首儀鳳三年一首天授二年一首萬嵗通天二年一首聖厯元年一首久視二年一首長安元年一首四年二首神龜元年一首景龍二年一首三年一首景雲二年三首開元八年一首大厯七年一首建中元年一首其空處又有唐代人題名書法不一東側面有詩一首其下題名西側面題名亦有詩一首中二側面皆無字唐碑存於泰山者唯此及𤣥宗泰山銘蘇頲東封朝覲頌二文皆磨厓刻於山上而此碑在山下以小而雙束故不仆書非名筆故摹拓者少而獨完至今因歎唐時六帝一后修齋建醮凡二十許共此二碑亦異乎近代之每嵗一碑以勞人而災石者矣但不知趙徳甫金石録何以不收恐古人碑記失傳者正多耳碑下為積土所壅予來㳺數四最後募人發地二尺下而觀之乃得其全文云許洛仁碑正書龍朔二年十一月今在醴泉縣殘缺大唐三藏聖教序并記褚遂良正書龍朔三年六月今在同州按舊唐書褚遂良傳永徽元年出為同州刺史三年徴拜吏部尚書顯慶三年卒於愛州至龍朔三年則遂良之亡已五年矣恐是後人追刻也王𢎞撰曰碑後有大唐褚遂良書在同州倅㕔十一字當是後人補書其書法亦微不類道因法師碑李儼撰歐陽通正書龍朔三年十月今在西安府儒學古人晤悟二字多通用此碑才晤聰晤即晤三空皆是悟字而王右軍蘭亭序悟言一室之内又以晤為悟陸雲逸民賦明發悟歌亦以晤為悟騎都尉李文墓誌銘正書麟徳元年二月今在同州會善寺造像記八分書麟徳元年十月今在本寺大殿前右贈太師孔宣公碑崔行功撰孫師範八分書乾封元年今在曲阜縣廟中碑文内升􅀈二字升音陞􅀈音㪷隸釋漢苦縣老子銘有􅀈星字司隸校尉楊孟文石門頌上順􅀈極白石神君碑米􅀈五錢注竝云斗字漢隸分韻升􅀈二字上升下斗唐比丘尼法琬碑天分斗極竟作升字則謬矣昔人以其文易混故改􅀈為斗俗作斗而二字多有誤者故漢書食貨志治田勤謹則畆益三升不勤則損亦如之臣瓚曰當言三斗尚書帝命驗黄曰神斗博雅誤作神升又世語姜維膽大如升誤作斗字之从斗者漢樊毅復華下民租田口筭碑斛作苦縣老子銘涼州刺史魏元平碑科作魏受禪碑料敵用兵料作王知敬李衛公碑運奇料敵料作歐陽通道因法師碑斜作韋虚心鄭子春北嶽廟碑史惟則慶唐觀金籙齋頌魁作晉書孝武帝紀論謝𤣥之善軍事何超音義曰力弔反一作料後人不知古人書法妄改為斷而淳化閣帖晉簡文帝書斟字作又於􅀈旁加一㸃以别升字後周華嶽頌字亦同張公禮龍藏寺碑揖讓而升大寳升字作斗以斗加一㸃為升則不經之甚矣燕公于志寜碑令狐徳棻撰子立政正書乾封元年十一月今在三原縣郭君碑乾封二年今在汾陽北七十里郭社村朱彛尊曰碑文有云揮霜鉞而斬老生盖從太宗攻霍邑者按唐書宋老生投塹為劉𢎞基所殺而温大雅創業起居注則云老生攀繩上城軍頭盧君諤所部人跳躍及而斬之今讀此碑乃知揮刃者之為郭君而首二行剥裂其名字門世及撰文者皆闕其知為郭君者藉有碑額存爾華陽觀王先生碑于敬之撰王𤣥宗正書拓本其文但云乾封二年十一月九日卒不著立碑之年按舊唐書髙宗調露二年二月戊午賜故玉清觀道士王逺知諡曰昇真先生贈太中大夫此碑所謂王先生名軌字洪範乃逺知之弟子也淄川公李孝同碑諸葛思禎正書咸亨元年五月今在三原縣碧落碑篆書韓王元嘉四男為母房太妃立碑云有唐五十三祀龍集敦牂則咸亨元年也唐書言垂拱中元嘉徙絳州刺史與此不合今在絳州有咸通十一年鄭承䂓釋文但篆文難通者頗多而翻刻復多舛誤如淮館儀僊釋僊為山貪逮餘漏釋逮為建注儀鄰以同煥釋同為洞直書心事釋書為言敂心感慕釋敂為叨竝誤敂古叩字出周禮宋謝靈運山居賦巻敂舷之逸曲感江南之哀歎用此字此碑用粤若稽古作乩託字作侂宋韓侂胄字本此大唐三藏聖教序記并心經僧懐仁集王右軍書咸亨三年十二月今在西安府儒學王𢎞撰曰序中如金容掩色心經中色不異空空中無色諸色字於草法合至空不異色色即是空空即是色無色聲香味觸法諸色字乃包字集書者誤以此作色字耳觀天地苞乎隂陽苞字下體文抱風雲之潤抱字右邉自見而昔人無言及之者金剛經王知敬正書咸亨三年月今在少林寺殿後字多剥落鄭惠王石塔記行書咸亨四年今在潞安府亳州録事叅軍殘碑八分書咸亨四年今在叅軍亡其姓但有父賢隋校書郎字又曰夫人恒農楊氏恒農本𢎞農避太子𢎞名改之又曰嫡子銀青光禄大夫直昭文館上柱國長樂下缺西峰秦皇觀基浮圖銘喬師望撰并書八分書上元二年七月拓本此當在華山西峰而今不得其處基字不諱而文有云匈奴獵關塞清越裳奉贄風塵不驚知其為前上元也師望時為華州刺史薛公阿史那忠碑正書上元二年今在醴泉縣明徴君碑髙宗御撰髙正臣書上元三年四月今在上元縣棲霞寺唐有兩上元此云景子者髙宗號也舊唐書明崇儼𫝊累遷正諫大夫特令入閣供奉崇儼每因謁見輙假以神道頗陳時政得失帝深加允納潤州棲霞寺是其五代祖梁處士山賔故宅帝特為製碑文親書於石論者榮之今按此碑乃髙正臣書史家以御製并訛為御書耳上柱國任君碑正書上元三年十一月今在汾州府南門外二里文侯村任君名㳟官至金紫光禄大夫上柱國臨濟縣開國男貞觀十七年二月卒夫人郭氏其文有曰未挂東都之冠先覆北墉之首按論語伯牛有疾注禮病者居北牖下仁山金氏曰牖字誤當作墉蓋室中北墉而南牖墉墻也修孔子廟詔表八分書儀鳳二年七月今在曲阜縣廟中武徳九年詔一通乾封元年詔一通皇太子請立碑表一通乾封元年祭文一通共一碑金明昌三年開州刺史髙徳裔記重建嵗月於末英公李勣碑髙宗御製并書行草儀鳳二年十月今在醴泉縣廣韻作贙胡畎切獸名似犬多力出西海倒一虎者非也五經文字亦云贙于犬反從二虎從貝俗以二虎顛倒與説文字林不同此書用俗體倒一虎而又缺一筆以避太祖諱今人不識之矣蘇文舉開業寺碑亦用此體爾雅贙有力注出西海大秦國有養者似狗多力獷惡沈佺期驩州寄家人詩且懼威非贙寜知心是狼杜甫哀蘇源明詩不要懸黄金胡為投乳贙寄劉峽州詩乳贙號攀石飢鼯訴落藤注引炙轂子載贙銘曰爰有獷獸厥形似犬飢則馴服飽則反眼出於西海名之曰贙梁昇卿御史臺精舎碑作􅀢一武一虎更奇文選左思魏都賦蒹葭贙雚蒻森李善注引説文曰贙分别也此又一義岱嶽觀造像記儀鳳三年三月開業寺碑蘇文舉正書開耀二年二月今在元氏縣封龍山西吳村碑隂多宋人題名有曰濟南李致至道王亢退之沿檄過此同宿承天佛舎元祐辛未陽月念五日題以廿為念始見於此楊用修謂廿字韻書皆音入惟市井商賈音念而學士大夫亦從其誤者也天后御製詩并書一通王知敬正書永淳二年九月今在少林寺中書令馬周碑許敬宗撰殷仲容八分書今在醴泉縣殘缺申公髙士亷塋兆記許敬宗撰趙模正書今在醴泉縣殘缺散騎常侍褚亮碑八分書今在醴泉縣殘缺以上三碑皆髙宗時立王徴君臨終口授銘弟紹宗甄録并書正書垂拱二年四月今在嵩山老君洞南徴君即王𤣥宗也美原神泉詩并序篆書垂拱四年四月今在富平縣碑兩面其一面為雲陽主簿明臺子徐彦伯字光序裕明子河東尹元凱字棫左司郎中温翁念字敬祖天官員外郎李通字至逺各詩一首五言十二句其額曰大唐裕明子書其一面為美原縣尉旦字􅀈序内三人皆以一字為字澤王府主簿梁府君并夫人唐氏墓誌銘四品孫義陽朱賔撰五品孫滎陽鄭莊正書垂拱四年十一月近出終南山楩梓谷土中岱岳觀造像記天授二年二月萬嵗通天二年聖厯元年臘月久視二年正月長安元年十二月四年九月十一月各一首碑凡大周年者天作而地作埊人作􅙷聖作臣作年作月作亦作􅂒韻㑹以􅂒為生字誤考此碑及順陵碑􅂒字竝是月字日作星作正作􅀢授作􅀈契苾明碑授作初作唯字無可考疑是應字凡數字作壹貳叄肆捌玖等字皆武后所改及自制字其厯年記有云設金籙寶齋河圖大醮桼桼古七字太𤣥經𤣥攡曰運諸桼政𤣥棿曰棿擬之二桼方言曰吳有桼娥之臺晉束晳𤣥居釋夕宿七娥之房王莽候鉦銘候鉦重五十桼斤是也後人不知妄于左旁添鑿三㸃淺而大又稍偏知非一筆唐碑書七字亦有作漆者今墨子書周公旦朝讀書百篇夕見漆十士張參五經文字七作漆後人省筆作柒柒即漆之草書趙古則謂以七漆二字合成造之非也山海經剛山多柒木水經注漆水下有柒縣柒渠柒溪字皆作柒今作㭍又柒之省舊唐書睿宗紀先天二年三月癸巳詔制敕表狀書奏牋牒年月等數作一十二十三十四十字是知前此皆借壹貳等字矣不知其始於何年也程大昌演繁露曰古書一為弌二為弍三為弎盖以弋為母而一二三随數附合以成其字特不知單書一畫為一單書二畫三畫為二為三起自何時今官府文書凡其記數皆取聲同而㸃畫多者改用之於是壹貳叄肆之類本皆非數直是取同聲之字借以為用貴點畫多不可改換為姦爾本無義理若十之用拾八之用捌九之用玖尤為不倫韻㑹捌破聲劉歆遂初賦石捌破之嵒嵒亦有似可相通者易之參天兩地左傳自參以上則往稱地來稱㑹是嘗以參為三矣考工記鍭矢參分茀矢參分莊子參月而後能外天下史記滑稽傳飲可八斗而醉二參竝以參為三顔子不貳過士有貳宗國不堪貳為其與正為副則貳之為二尚或可以傅會矣在顔師古時江充𫝊固已訛犬臺為太壹又薛宣傳本曰壹笑為樂而俗本乃改壹笑為壺矢是此時一己為壹矣若元本不用壹字則一字本止一畫何縁轉易為壺也又今漢書凡一字皆以壹代詩臺醉日富臺者之來大學臺是皆以修身為本周禮典命其士臺命公羊襄二十九年傳許夷狄者不臺而足則一變為壹已在師古之前矣册府元龜謂叙傳班壹當作一流俗本改壹為誤非也然而古今經史凡書千百之字無有用阡陌之阡伯叔之伯者予故疑舊本不曽改少畫以從多畫也然不能究其起自何時洪氏容齋随筆曰古書及漢人用字如一之與壹二之與貳三之與叄其義皆同鳲鳩序刺不壹也又云用心之不一也而正文其儀一兮表記節以壹惠注言聲譽雖有衆多者節以其行一大善者為諡耳漢華山碑五載壹巡狩祠孔廟碑恢崇壹變祝睦碑非禮壹不得犯而後碑云非禮之常一不得當則一與壹通用也孟子市價不貳趙岐注云無二價者也本文用大貳字注用小二字則二與貳通用也易繫辭參天兩地釋文云參七南反又如字音三周禮設其參注參謂卿三人則三與參通用也冊府元龜文宗太和二年十月詔天后所撰十二字竝却書其本字今按景龍以後碑志之文固皆書其本字矣不知何以復有此詔封祀壇碑武三思撰薛曜正書天册萬嵗二年今在登封縣西萬羊岡下截剥蝕亡其月日珍州榮徳縣丞梁師亮墓誌銘正書萬嵗通天二年三月今在西安府百塔寺師亮字永徽以本朝年號為字猶漢袁紹之字本初質帝年號本初古人之無避忌如此中嶽體𤣥先生潘尊師碣文王適撰司馬承禎八分書聖厯二年二月今在嵩山老君洞南題云弟子中巖道士馬書按唐書隱逸傳司馬承禎字子微事潘師正傳辟榖導引術無不通師正異之曰我得陶隱居正一法逮而四世矣則此碑稱弟子者司馬承禎也廣韻亦司字老君洞即唐之逍遥谷潘師正傳云居逍遥谷髙宗詔即其廬作崇唐觀及營奉天宫又勑直逍遥谷作門曰仙㳺北曰尋真昇仙太子碑行書聖厯二年六月今在偃師縣南三十五里府店緱氏山夲廟明堂令于大猷碑正書聖厯三年十一月今在三原縣碑云聖厯三年嵗次庚子十一月十二日合𦵏於雍州三原縣萬夀鄉之先塋而碑非此時立也蓋後續為之故其書竝不用武后所製字陪勑使麻先生祭岳詩守博城縣令馬在岱岳觀碑東側面其文剥蝕不全久視二年記所稱神都青元觀主麻慈力即其人也武后遣之至觀修醮神都即東都故有伊水嵩巖之句心經正書大足元年僧有晦建今在京師御製夏日㳺石淙詩并序薛曜正書久視元年五月今在嵩山石淙北崖上其詩天后自製七言一首侍逰應制皇太子􅖔顯太子左奉裕率兼檢校安北大都䕶相王􅖔旦太子賔客上柱國梁王􅖔三思内史􅖔狄仁傑奉宸令􅖔張易之麟臺監中山縣開圀男􅖔張昌宗鸞臺侍郎􅖔李嶠鳳閣侍郎􅖔蘇味道夏官侍郎􅖔姚元崇給事中􅖔閻朝隱鳳閣舎人􅖔崔融奉宸大夫汾隂縣開圀男􅖔薛曜守給事中􅖔徐彥伯右玉鈐衛郎將左奉宸内供奉􅖔楊敬述司封員外􅖔于季子通事舎人􅖔沈佺期各七言一首文内天台訛右銜訛衝瀑水訛曝順陵碑正書長安二年正月拓本首曰大周無上孝明髙皇后碑銘并序特進太子賔客監修圀史上柱圀梁王􅖔三思奉勅撰太子左奉裕率兼檢校安北大都護相王􅖔旦奉勅書此武后追尊其母楊氏之碑其時睿宗為相王奉勅書之字體與景龍觀鐘銘同内虎字再見末筆俱不全箎字號字亦同猶未斥唐諱又君字作亦他碑所未見疑古文君字亦類此仁山金氏謂商書太甲上篇自周有終相亦惟終當為自君古文君字似周故誤作周唐君臣正論武后改易新字以山水土為地千千万万為年永主久王為證蕭元眘佛像贊證字作􅀢長正主為聖一忠為臣一生為人一人大吉為君按舊唐書蘇頲傳𤣥宗欲於靖陵建碑頲諫曰自古帝王及后無神道碑若靖陵特建則祖宗之陵皆須追造𤣥宗乃止韋湊傳語亦同靖陵者𤣥宗母昭成后竇氏之𦵏也然則唐之髙祖太宗皆無碑矣順陵之有碑盖武后剙為之而乾陵之有碑則中宗踵為之乎髙延貴造佛像贊正書長安三年七月韋均造佛像贊正書長安三年九月蕭元眘造佛像贊行書長安三年九月李承嗣造佛像銘正書長安三年九月姚元景光宅寺造佛像銘正書長安四年九月今竝在西安府南門内華塔寺衛州共城縣百門陂碑辛怡諫文張元琮記孫去煩行書長安四年今在輝縣秋日宴石淙序張易之撰正書闕年月今在嵩山石淙南崖上騎都尉相里瑞碑正書今在汾陽縣小相里之北太師墓上太師者五代時相里金也二碑竝列此碑漫滅特甚其可識者曰上騎都尉相里府君之碑曰相里瑞字鳳威曰夫人任氏而中有而埊字知其為武后時立也岱嶽觀造像記神龍元年三月景龍二年二月三年三月各一首部將軍功徳記郭撰八分書景龍元年十月今在太原縣天龍寺後將軍名珣其氏曰部而部上闕一字官至天兵中軍副使右金吾衛將軍上柱國開國公與其夫人黑齒氏造像之記其文曰本支京海世食舊徳相虞不臘之奇族行太上懐邦由余載格盖蕃將之歸唐者也比丘尼法琬碑僧承逺撰劉欽旦正書景龍三年五月今在西安府城外賈里村許公蘇瓌碑盧藏用序并八分書張説銘景雲元年十一月今在武功縣漫漶長安縣丞蕭思亮墓誌銘顔惟貞撰正書景雲二年二月近出西安府城南神和原土中幽州石浮屠銘甯思道書景雲二年四月拓本賜道士楊太希勅景雲二年六月在岱岳觀東碑南面景龍觀鐘銘睿宗御書景雲二年九月今在西安府鐘樓上初唐人作字尚有八分遺意正書之中往往雜出篆體無論歐虞諸子即睿宗書亦如此猶之初唐律詩稍似古風平仄不盡穩順開元以後書法日盛而古意遂亡遂以篆楷為必不相通分為兩部然而蚩之从㞢岊之从巴黎之从􅽖薛之从􅎧虛之从鼎之从析益之从横此皆見行於今代者而不察其為篆也詩篇書法日以圓熟而俗筆生焉亦世道升降之一端矣馮本殘碑朝𨼆撰八分書先天元年十一月今在髙陵縣西南七里府君廟涼國公契苾明碑婁師徳撰殷𤣥祚正書先天元年十二月今在咸陽縣此碑立於先天元年十二月乃𤣥宗受禪之後而碑猶用武后字又明父何力史作何而此碑作河又其中特勤字再見皆特勒之訛按北史突厥傳大官有業護次特勒唐書突厥傳可汗者猶古之單于其子弟謂之特勒通典同温公通鑑考異曰諸書或作勑勤今從新舊二唐書迴紇傳依託髙車臣屬特厥近謂之特勒無君長契苾何力傳父葛隋大業中繼為莫賀咄特勒隋書髙祖紀突厥雍虞閭可汗遣其特勒來朝李崇傳突厥遣使謂崇曰若來降者封為特勒史傳中稱特勒者甚多此乃作特勤又栁公權神䇿軍碑亦云大特勤嗢沒斯此皆書者之誤若其中有云玉質金相作箱鷹揚字前从木後从才又其小失也誌公碑行書開元三年二月其額云大唐齊州章丘縣常白山醴泉寺誌公之碑今仍在寺中而其地已割入鄒平矣碑隂有誌公像其下方斷齾不全按此所述是梁之寳誌與陸倕文略同而曰既墓彼山又墳茲嶺則此地亦有誌公墳也按雒陽伽藍記别有一寳公豈即其人而作文者誤以為梁之寳誌乎不然何以一人而兩葬也按僧家有衣鉢爪髪塔不嫌兩葬灋藏禪師塔銘田休光撰正書開元四年五月今在西安府南山贈歙州刺史葉慧明碑江夏李國子太學生八分書開元五年七月今在金鄉縣此為葉法善之父本傳法善括州括蒼人三世為道士皆有攝養占卜之術髙宗聞法善名徴詣京師法善自髙宗則天中宗殆五十年嘗往來名山數詔入禁中盡禮問道然排擠佛法議者或譏其向背以其術髙終莫之測也睿宗即位稱法善有㝠助之功先天二年拜鴻臚卿封越國公仍舊稱為道士止於京師之景龍觀又贈其父為歙州刺史年一百七嵗卒其叙葉氏云聃季食沈子髙封葉則葉字當音式渉反今人讀為枝葉之葉者非也又其文有曰情隋地深字當作隨而省為隋兖州都督于知微碑姚崇撰正書開元七年六月今在三原縣漫漶修孔子廟碑李邕撰張廷珪八分書開元七年十月今在曲阜縣廟中舊唐書張廷珪傳廷珪素與陳州刺史李邕親善屢上表薦之邕所撰碑碣之文必請廷珪八分書之廷珪既善楷隸甚為時人所重庭字作廷邕傳同雲麾將軍李思訓碑李邕撰并書行書開元八年六月今在蒲城縣華嶽精享昭應之碑八分書開元八年今在華隂縣西嶽廟中其文即刻於後周天和二年頌碑之隂宣義郎行華州華隂縣主簿咸廙撰殿中侍御史劉升書銀青光禄大夫檢校華州刺史上柱國李光休題額碑之右旁有顔魯公大字題名乾元元年十月左旁有賈竦謁華嶽廟詩元和元年十月作并書太和六年四月姪男宣義郎行華州叅軍琡重修碑之下方亦有唐人題名此碑前後空處為宋人攙入題名甚多幸正文皆八分書題名或隸或行不相混耳廟中古碑嘉靖末地震多毁唐碑惟此與述聖頌二通僅存古碑隂多無刻字故後周之碑而唐人得以刻之觀此一碑而周人之質樸唐人之謙約兩見之矣按此為華隂縣主簿咸廙而新唐書趙冬曦傳有大理評事咸廙業亦開元時人恐即是一人北嶽府君碑韋虛心撰陳懐志行書開元九年三月今在曲陽縣北嶽廟中鎮軍大將軍吳文墓銘興福寺僧大雅集王右軍書開元九年十月此碑萬厯末浚西安府城濠得之今置儒學中俗謂之半截碑其文有曰夫人李氏圓姿替月潤瞼呈花唐人寫狀婦容云爾猶有碩人詩意今人以為嫌不肯作此語矣雲居寺石浮圖銘梁髙望書開元十年四月今在房山縣秦望山法華寺碑李邕撰并書開元十一年二月今重刻在紹興府秦望山御史臺精舍碑崔湜撰梁昇卿八分書開元十一年今在西安府儒學碑隂題名表其上格曰侍御史并内供奉列盧懐慎等名中格曰殿中侍御史并内供奉列崔湜等名下格曰監察御史下有一并字下缺不全列陸景初等名其盧崔陸三人姓名竝八分書盖梁筆也餘則正書乃後人續書之者碑額空處前後皆有刻前刻監察御史及姓名後刻知雜侍御史及姓名有自天寳元載以後七字按天寳三年始改年為載不當云元載恐是追書宋趙彦衛雲麓漫鈔曰唐有三院御史侍御史謂之臺院殿中侍御史謂之殿院監察御史謂之監院讀此文知唐時御史臺有獄又於其旁立精舎援引釋典以勸人回心作善然考之舊唐書開元十四年崔隱甫為御史大夫在職强正無所迴避自貞觀年李乾祐為御史大夫别置臺獄有所鞫訊便輒繫之由是自中丞侍御史以下各自禁人牢扉常滿隱甫引故事奏以為不便遂掘去之則其獄未幾而廢又言温造為御史中丞太和二年十一月宫中昭徳寺火宰臣兩省京兆尹中尉樞密皆環立於日華門外令神䇿兵士救之唯臺官不到造奏以臺有繫囚恐縁為姦追集人吏隄防所以至朝堂在後則又不知何時而復置也新書隱甫傳云其後患囚往來或漏泄復繫之厨院云宋時亦有臺獄曽肇記云始自開寳五年池州刺史馮公碑崔尚撰郭謙光八分書開元十一年今在咸陽縣其文曰公諱仁字𤣥長樂人馮文王之𦙍也仁下闕一字娑羅樹碑李邕撰并書行書開元十一年今重刻在淮安府張弨曰其末曰一歸可門可門者何門也考説文誰何之何本單作可其从人者則為儋何之何易何校滅耳詩何蓑何笠爾雅何鼓謂之牽牛是也後借為誰何之何更以擔荷為儋何字字日繁而忘其本矣此文以可為何可見開元時文字尚存古法石佛堂記孫義龍撰并書行草開元十二年三月今在臨城縣李莊漫漶淨業法師塔銘畢彦雄撰正書開元十二年六月今在西安府城南香積寺涼國長公主碑蘇頲撰𤣥宗八分書開元十二年十一月今在蒲城縣其文有云開元十二載八月辛丑薨于京永嘉里第按唐書天寳三年正月丙辰朔改年為載而此在其前二十年已云載矣盖文字中偶一用之後乃施之詔令符牒耳楊將軍新莊像銘正書開元十年今在西安府南門内華塔寺右武衛大將軍乙速孤行儼碑劉憲撰白羲晊八分書開元十三年二月今在醴泉縣叱干村漫漶古義士伯夷叔齊二公碑梁昇卿撰并書八分書開元十三年今在蒲州首陽山二賢廟中其文書于碑之兩面其側有後唐同光元年護國軍節度押衙丁約建立廟宇題字述聖頌正書開元十三年今在華隂縣嶽廟之東道院京兆府富平縣尉達奚珣撰序左補闕集賢殿直學士吕向撰頌并書其隂之上方有韓賞告嶽神文韓擇木八分書下方有大厯九年華隂令盧朝徹謁嶽廟文有貞元九年十三年題名左旁有乾元二年張惟一祈雨記右旁有上元元年華隂縣令王宥等題名李樞書上為篆下為八分紀泰山銘𤣥宗御製并書八分書開元十四年今在泰山頂石崖上東封朝覲頌蘇頲撰開元十四年在紀泰山銘右石崖上近有閩人林焞開府山東以忠孝㢘節四大字鑱於其上頌文毁去其十三四觀者笑之恒山祠碑張嘉貞撰并書行書開元十五年八月今在曲陽縣北嶽廟中舊唐書本傳嘉貞為定州刺史至州於恒嶽廟中立頌自為文書於石其碑用白石為之素質黒文甚為竒麗先是嶽祠為逺近祈賽有錢數百萬嘉貞自以為頌文之功納其數萬今白石碑尚在本傳又言嘉貞官至宰相不為子孫立業豈好貨者乎或矜夸其文則有之然唐人以文取錢未嘗以官取錢嘉貞於此又僅百而取一古之疾也今也或是之亡矣道安禪師碑宋儋撰并書行書開元十五年十月今在嵩山㑹善寺廢戒壇前中斷少林寺碑裴漼撰并書行書開元十六年七月今在大殿東南鐘樓下葉封曰文稱有御書碑額七字當是明皇書今亡之而上有横刻開元神武皇帝書七字似屬後人所為碑隂有少林寺賜田牒碑内王字俱鐫去按金史海陵正隆二年二月癸卯改定親王以下封爵等第命置局追取存亡告身公私文書但有王爵字者皆立限毁抹雖墳墓碑誌竝發而毁之則知前代封爵之碑有王字者多毁仆於此時而此碑以梵力獨存乃其間王宫夏王王言育王等字亦從而鐫去矣完顔之不通文義而肆為無道可勝歎哉唐碑遇帝號必空三字此碑所紀宇文周事有明皇帝皇上空三字有隋髙祖祖上空三字而前有周武帝却不空盖緇流不通古今者之所為也敬節法師塔銘正書開元十七年七月今在西安府城外杜永村龍角山慶唐觀紀聖銘𤣥宗御製并書八分書開元十七年九月今在浮山縣龍角山舊唐書地理志武徳二年分襄陵置浮山縣四年改為神山册府元龜載開元十四年九月制曰𤣥元皇帝先聖宗師國家本系昔草昧之始告受命之期髙祖應之遂於神降之所置廟改縣曰神山近日廟庭屢彰嘉瑞䖍荷靈應祗慶載深宜令本州擇精誠道士七人於羊角廟中潔齋焚香以崇奉敬比丘尼法澄塔銘志撰并書行書開元十七年十一月今在西安府城外東南馬頭空嶽麓寺碑李邕撰并書行書開元十八年九月今在寺中殘缺廬山東林寺碑李邕撰并書行書開元十九年七月今在寺中元延祐七年寺火碑壊後至元三年僧慶哲重摹刻石元氏令龎履温碑邵混之撰蔡有鄰八分書開元二十四年二月今在元氏縣西寺内碑隂有宋熙寜九年孟士龍遷碑記滎陽鄭陶撰大智禪師碑嚴挺之撰史惟則八分書并篆額開元二十四年九月今在西安府儒學碑隂記陽伯成撰史惟則八分書開元二十九年五月其上方有宋金人題名進法師塔銘陳光撰僧智詳正書開元二十五年七月今在西安府實際寺剥蝕檀法師塔銘姜立祐撰正書開元二十五年八月今在西安府西門外崇仁寺銘文正書而後列弟子沙門名皆八分書景賢大師身塔石記羊俞撰沙門温古行書開元二十五年八月今在嵩山㑹善寺葉封曰按王維有留别温古上人兄詩云宗兄此削髮蓋其族人亦必可稱者也周尉遲逈廟碑顔真卿撰蔡有鄰八分書開元二十六年正月今在彰徳府剥蝕過半任城縣橋亭記㳺芳撰王子言八分書開元二十六年閏八月今在濟寜州儒學泮池上鐵像頌王端撰蘇靈芝行書開元二十七年五月今在易州山頂石浮屠後記王守泰行書開元二十八年四月今在房山縣記金仙公主奏賜譯經四千餘巻并范陽縣東南五十里上㘺村趙襄子淀中麥田莊并果園一所及環山林麓石壁寺鐵彌勒像頌林諤撰房嶙妻髙氏行書開元二十九年六月今在交城縣石壁山寺末有金泰和四年䟦夢真容碑蘇靈芝行書開元二十九年六月今在盩厔縣樓觀是年四月𤣥宗自言夢見𤣥元皇帝云有像在京城西南百餘里即命使同諸道士求得之於盩厔縣樓觀東南山阜間迎至興慶宫大同殿宰相牛仙客李林甫拜賀金仙長公主碑徐嶠之撰明皇行書開元中今在蒲城縣鄎國長公主碑張説撰明皇八分書今在蒲城縣金石文字記卷三
