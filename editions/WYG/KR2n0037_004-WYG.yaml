body:
  text: 金石文字記卷四崑山顧炎武撰唐雲麾將軍李秀碑李邕撰并書行書天寶元年正月孫承澤春明夢餘録曰李秀字𤣥秀范陽人以功拜雲麾將軍左豹韜衛翊府中郎將封遼西郡開國公開元四年卒𦵏范陽之福禄鄉此碑為靈昌郡太守李邕文并書逸人太原郭卓然模勒并題額李北海有兩雲麾碑一為李思訓碑在蒲城一為此碑其官同其姓同也趙子圅名崡秦人未見此碑其著石墨鐫華乃以為一碑又以此碑為趙子昂所臨誤矣碑不知何時入都城萬厯初宛平令李䕃署中掘地得六礎洗視乃此碑存者百八十餘字碑首存唐故雲三字因築室砌之壁間名曰古墨齋後移少京兆署中止二礎其四礎相傳萬厯末王京兆惟儉攜之大梁道振禪師塔銘正書天寶元年正月今在闕褒封四子勅正書天寶元年二月今在盩厔縣樓觀舊唐書禮儀志天寶元年正月癸丑陳王府參軍田同秀稱於京永昌街空中見𤣥元皇帝以天下太平聖夀無疆之言傳於𤣥宗仍云桃林縣故關令尹喜宅旁有靈寶符發使求之十七日獻於含元殿二月丁亥御含元殿加尊號為開元天寶聖文神武皇帝辛卯親祔𤣥元廟丙申詔史記古今人表𤣥元皇帝昇入上聖莊子號南華真人文子號通𤣥真人列子號冲虚真人庚桑子號洞虚真人改莊子為南華真經文子為通𤣥真經列子為冲虚真經庚桑子為洞虚真經今人稱莊子書為南華經昉於此也李肇國史補曰天寶中天下屢言聖祖見因以四子列學官故有偽為庚桑子者其辭鄙俚非古人書兖公之頌張之宏撰包文該正書天寶元年四月今在曲阜縣孔子廟中舊唐書禮儀志開元二十七年八月制追諡孔子為文宣王贈顔子淵兖公閔子賽費侯冉伯牛鄆侯冉仲弓薛侯冉子有徐侯仲子路衛侯宰子我齊侯端木子貢黎侯言子㳺吴侯卜子夏魏侯又贈曾參顓孫師等六十七人皆為伯告華嶽文八分書在述聖頌碑隂之上方首云惟廿七祀孟秋右補闕韓賞敢昭告于泰華府君祠廟其末云天寶元年歲次壬午四月乙亥朔十日甲申諸王侍書榮王府司馬韓擇木書𤣥宗御書裴忠獻公墓碑𤣥宗賜張説勅今竝在聞喜縣東門外裴趙二公祠前一碑兩面心經陳令望書天寶元年四月拓本𤣥元靈應頌戴琁撰序劉同昇撰頌戴伋八分書天寶元年七月今在盩厔縣樓觀趙崡曰此頌刻於宗聖觀記之北面唐人分書甚佳但經元人翻本減弱矣碑側宋蘓軾書詩并弟轍詩嵗乆剥蝕元人别摹一碑視碑側字法亦減慶唐觀金籙齋頌崔明允撰史惟則八分書天寶二年十月今在浮山縣龍角山昔人所用莊子御六氣之辨意各不同惟梁簡文帝南郊頌𤣥黙御辨寂照秉真後周庾信至老子廟詩虚無推御辨寥廓本乘蜺及此碑云皇帝御辨無為齋心正一為得其旨若齊謝脁侍宴曲水詩於皇克聖時乘御辨梁敬帝禪位䇿文安國字萌本因萬物之志時乘御辨良㑹樂推之心後周庾信喜晴詩御辨誠膺錄維皇稱有建宋王旦汾隂壇頌欽明稽古御辨撫圗則以為首出在位之義梁王僧辨勸進元帝表坦然大定御辨東歸隋李德林從駕詩朝乘六氣辨夕動七星旒則以為巡逰之事唐朱子奢豳州昭仁寺碑御辨崆峒非趨湼槃之㟁乘雲谷口寧逰波若之門碧落碑峒山順風勞乎靡索汾陽御辨窅然自喪武后昇仙太子碑尋真御辨控鶴乘龍則以為訪道之事隋薛道衡髙祖文皇帝頌御辨遐逝乘雲上仙則又借為升遐之事而唐李嶠大周降禪碑翠鳯銜蕤黄龍御辨則又不知其何所出也隆闡法師碑天寶二年十二月今在西安府儒學題曰唐實際寺故寺主懐惲奉勑贈隆闡大法師碑銘并序其下曰懐惲及書葢不可曉文中有弟子大温寺主思莊敬想清徽勒兹𤣥琰疑即其人所書嵩陽觀聖德感應頌李林甫撰徐浩八分書裴逈題額天寶三載二月今在登封縣嵩陽宫遺址騎都尉薛良佐塔銘再從兄鈞撰弟良史正書天寶三載閏四月今在闕文言年止廿八卒于里第塔於終南山施陁林善知識之次此官而葬以僧者孝經𤣥宗御製序并注及書八分書今在西安府儒學前第二行題曰御製序并注及書其下小字曰皇太子臣亨奉勑題額其額曰大唐開元天寶聖文神武皇帝注孝經臺後有天寶四載九月一日銀青光禄大夫國子祭酒上柱國臣李齊古上表及𤣥宗御批大字草書三十八字其下有特進行尚書左僕射兼右相吏部尚書集賢院學士修國史上柱國晉國公臣林甫光禄大夫行左相兼兵部尚書𢎞文館學士上柱國渭源縣開國公臣李適之等四十五人姓名惟林甫以左僕射不書姓舊唐書王璠傳載李絳疏云左右僕射師長庶僚開元中名之宰相表狀之中不署其姓宋周必大二老堂雜志曰祖宗朝宰相官至僕射勅後乃不著姓他相階官自吏部尚書而下皆著姓中間人名下攙入丁酉歲八月廿六日紀九字是後人所添是歲乙酉非丁酉也又末二人官銜下不書臣亦可疑孝經疏序曰孝經河間顔芝所藏因始傳之於世自西漢及魏厯晉宋齊梁注解之者殆及百家至有唐之初雖備存祕府而簡編多有殘缺傳行者惟孔安國鄭康成兩家之注并有梁博士皇侃義疏播於國序然辭多紕繆理昧精研至唐𤣥宗朝乃詔羣儒學官俾其集議是以劉子𤣥辨鄭注有十謬七惑司馬堅斥孔注多鄙俚不經其餘諸家注解皆榮華其言妄生穿鑿明皇遂於先儒注中採摭菁英芟去煩亂撮其義理允當者用為注解至天寶二年注成頒行天下仍自八分御札勒於石碑即今京兆石臺孝經是也竇居士神道碑李邕撰段清雲行書天寶六載今在咸陽縣封安天王之銘李荃撰戴千齡八分書天寳七載今在曲陽縣北嶽廟中碑隂文康傑撰戴千齡八分書康傑文内有皇族從叔朝請郎行司兵叅軍欽囘不書姓而冠以皇族夫國君之尊族人不得以屬通而况天子乎崇仁寺陀羅尼石幢張少悌行書天寶七載五月今在西安府尊勝陀羅尼石幢天下多有不具載此以少悌之名而存之少林寺靈運禪師塔銘崔琪撰沙門勤闕行書天寶九載四月今在寺中碑頂有字云寺西石塔靈運師墳即梁帝皇嗣者也以其為梁武帝之裔而稱皇嗣亦為不順其隂刻陀羅尼經咒清河郡太夫人張氏墓誌銘索𤣥愛撰男林有鑒正書天寶九載五月今在咸陽縣永泰寺碑沙門靖彰撰荀望行書天寶十一載閏三月今在嵩山永泰寺多寶佛塔感應篇岑勛撰顔眞卿正書徐浩題額天寶十一載四月今在西安府儒學岑參集有登千福寺楚金禪師法華院多寶塔詩施燈功德經正書天寶十三載正月今在西安府城南香積寺東方朔畫像賛并碑隂夏侯湛撰賛顔真卿正書天寶十三載十二月今在陵縣署後堂憫忠寺寶塔頌張不矜撰蘇靈芝行書至德二載十一月今在京師憫忠寺宋文惟簡北庭事實曰燕京城東壁有大寺一區名曰憫忠唐太宗征髙麗囘念忠臣義士沒於王事者建此寺為之薦福東西有兩磚塔高可十丈是安禄山史思明所建此碑稱御史大夫史思明奉為大唐光天大聖文武孝感皇帝敬无垢淨光寶塔頌者是也春明夢餘録曰此碑葢建於思明初歸附之時其碑完好近日劉同人名侗作帝京景物畧謂碑上半斷裂不可讀且蘇靈芝書名甚著當時乃謂為李北海自鐫名尤誤之甚不知北海自鐫名乃伏靈芝也此碑書丹于石故以左為前按舊唐書肅宗紀至德二載十二月己丑賊將偽范陽節度使史思明以其兵衆八萬與偽河東節度使髙秀巖並表送降三載正月戊寅上皇御宣政殿冊皇帝尊號曰光天文武大聖孝感皇帝二月丁未大赦天下改至德三載為乾元元年今此碑建於二載十一月而己稱尊號又以大聖字移在文武之上與史書不合宣和書譜蘓靈芝儒生也嘗為易州刺史郭明肅書候臺記靈芝行書有二王法而成就頓放當與徐浩鴈行戈脚復類世南體亦善於臨倣者予後至燕一日與鄞人萬言同至憫忠寺諦觀此碑萬曰前行大唐光天大聖文武孝感皇帝及中間唐字史思明字類磨去重刻者石皆凹而首行憫忠寺上元只二字今改范陽郡三字蓋思明復叛之後磨去之及思明誅後此地歸唐後人重刻者也當日君臣之分殆如奕棊然非親至其下摩挲遺石而徒搨紙上之字未有能得其情者若年月尊號之先後亦從此而無疑矣華嶽題名顔真卿大字正書乾元元年十月今在華嶽碑之右旁王伯厚言華嶽題名五百十一人再題三十一人自開元訖清泰今存者惟此與述聖頌二碑不過二十餘人而已又因地震之後以碎石裝砌嶽廟大門牆上亦有唐人題名今王無異所搨得者通共九十二人有裴士淹李德裕李商隱名祈雨紀張惟一撰李權八分書乾元二年二月今在述聖頌碑之左旁大德禪師遷𦵏記沙門義宣撰行書乾元二年二月今在西安府華嚴寺乞御書題天下放生池碑額表并御書批荅顔真卿正書上元元年七月拓本有碑隂記一通書大厯九年甲子日贈工部尚書臧懷恪碑顔真卿撰并書正書今在三原縣九陂城臧氏墓上碑文有廣德元年十月字碑文厯敘臧氏自魯公子彄及僖哀二伯文武兩仲而其下又列丈人子原義和榮緒按莊子文王寓而政于臧丈人下距魯隱公殆四百年不得以為公子彄之後且莊子中名氏多是寓言不可為據莊子文王觀於臧見一丈夫釣李軌云臧地名也子原乃漢臧洪原字从厂从泉後人復添三㸃今後漢書作子源臨淮王李光弼碑顔真卿撰張少悌行書廣德二年十一月今在富平縣儒學左金吾衛將軍臧希晏碑韓秀弼八分書廣德二年八月今在三原縣心經趙偃正書廣德二年八月今在京師城内西南隅石鐙菴郭敬之家廟碑并隂顔真卿撰并書正書廣德二年十一月今在陜西布政司署中李寶臣記功載政頌王佑撰王士則行書并篆額永泰二年七月今在真定府察院内頌曰蟜蟜我公為君武臣以蟜為矯嵩山㑹善寺戒壇勅牒行書大厯二年十一月今在嵩山㑹善寺西上層刻中書奉勑牒中層刻沙門乘如謝表下層刻代宗御書批答二十四字碑文准字本當作準宋周必大二老堂雜志曰勅牒準字去十為准或謂本朝因宼準為相而改胡三省通鑑注亦云本朝宼準為相省吏避其名凡文書準字皆去十後遂因而不改又云曾公亮蔡京父皆名準而避其實不然予見唐告已作准又考五代堂判亦然頃在密院令吏用準字既而作相又令三省如此寫至今遂定今據大厯時牒已用准字則知此字自取省筆果若益公之言而改為準字則未見後人之遵用也廣韻二字竝收准字下注曰俗然管子書準字皆作准莊子平中准文子放准循繩淮南子眇者使之准王襃洞簫賦夔㐮准法皆用此字緯書有洛書靈准聽京房造准形如瑟十三弦郭忠恕佩觹集曰字林用准為平準之準字林吕忱作而後魏仇儒為趙準造妖言曰燕當傾趙當續欲知其名淮水不足北史長孫肥傳則准字之來乆矣又按宋順帝名準故沈約宋書平準令王準之皆作准然管莊諸書亦豈因此而改乎先塋記李季卿撰李陽冰篆書大厯二年三墳記李季卿撰李陽冰篆書大厯二年今竝在西安府儒學元吾丘衍謂陽冰即杜甫之甥名潮取海賦陽氷不冶之義為字既以字行乃别字少温楊用修嘗辨其非按陽氷趙郡人太白從叔其字少温見於宣和書譜與其名相應若名潮而以陽氷少温為字於義皆無取且陽氷工篆書潮工八分觀趙氏金石録載城隍神祠記忘歸䑓銘孔子廟記先塋碑三墳記等為李陽氷篆書而慧義寺彌勒像碑彭元曜墓誌為李潮書則其非一人明矣今人讀陽氷為陽凝非也按文苑英華有林滋陽氷賦戴侗六書故曰説文仌凍也冰水堅也俗作凝孫氏魚陵切説文蓋以冰為凝按仌於隸楷不能獨成文故後人加水焉凝之从冫从水無義當從今文大證禪師碑銘王縉撰徐浩正書大厯四年闕月今在嵩嶽寺撫州南城縣麻姑仙壇記顔真卿撰并書小字正書按魯公立此碑元作大字今有拓本而石亾其小字者乃别本後人補刻非初碑也大厯六年四月今在建昌府南城縣麻姑山萬厯初年重刻大唐中興頌元結撰顔真卿大字正書大厯六年六月今在祁陽縣石崖上宋馬永卿曰中興頌云復復指期此兩字出漢書匡衡傳云所㪅或不可行而復復之注云下復扶目反又何武為九卿時奏言宜置三公官又與翟方進共奏罷刺史㪅置州牧後皆復復故注云依其舊也下復扶目反美原田真人碑大厯六年九月今在富平縣美原鎮題曰美原縣永闕觀闕朝散大夫闕并州别駕上柱國蘭陵蕭森闕政撰并模晉王右軍書相傳田真人拔宅上昇處也陀羅尼經石幢銘僧昔真撰布衣康玠行書大厯六年十月今在富平縣六井容州都督元結墓碑顔真卿撰并書正書大厯闕年十一月今在魯山縣廣平郡公宋璟碑并碑側記顔真卿撰并書正書大厯七年九月今在沙河縣西北八里墓上宋州官吏八關齋㑹報德記顔真卿撰并書正書大厯七年今在歸德府南門亭内刺史崔倬敘顔魯公石幢事曰㑹昌中有詔大除佛寺凡堂閣室宇關於佛祠者掊滅無遺分遣御史覆視之州縣祗畏至于碑幢銘鏤賛述之類亦皆毁瘞此州闕元寺先有太師魯國顔公以郡守僚吏州人等為連帥田氏八關齋㑹鐫紀大幢亦鑿缺仆埋因訪其遺文於前刺史唐氏之家得其模本命工補刻大中五年正月一日八關齋㑹始於宋齊之間通鑑齊武帝永明元年上於華林園設八關齋胡三省注曰釋氏之戒一不殺生二不偷盜三不邪淫四不妄語五不飲酒食肉六不著花鬘瓔珞香油塗身歌舞倡伎故徃觀聽七不得坐髙廣大牀八不得過齋後喫食已上八戒故為八關雜録名義云八戒者俗衆所受一日一夜戒也謂八戒一齋通為八關齋明以禁防為義也文宣王廟新三門記裴孝智撰裴平八分書并篆額大厯八年十二月今在曲阜縣廟中干禄字書顔元孫撰顔真卿書正書大厯九年正月今在潼川州序稱第十三姪男真卿書按顔氏家訓曰兄弟之子北土多呼為姪案爾雅喪服經左傳姪名雖通男女竝是對姑之稱晉世以來始呼叔姪晉書王湛傳濟才氣抗邁於湛畧無子姪之敬書姪而又加男此唐人之俗稱也柳宗元祭六伯母文亦自稱姪男戴侗六書故曰爾雅女子謂晜弟之子曰姪喪服傳曰姪丈夫婦人報又曰謂吾姑者吾謂之姪賈公彦疏曰姪者對姑之稱若對世叔唯得言昆弟之子不得言姪也春秋傳曰姪其從姑潘岳楊仲武誄姑姪繼隕正用此所謂通男女之稱又曰齊靈公娶于魯曰顔懿姬無子其姪鬷聲姬生光又曰臧宣叔娶于鑄生賈及為而死繼室以其姪生紇今人謂兄弟之丈夫子亦曰姪非也古者兄弟之子皆曰子漢書疏廣與其兄子受父子竝為師傅後漢書蔡邕與其叔父質得罪上書自陳亦曰言事者欲陷臣父子晉書謝安傳安與兄子𤣥父子皆著大勲世説江左殷太常父子亦謂殷融與其兄子浩史記武安侯傳往來侍酒魏其跪起如子姪疑當時未有稱姪者漢書作子姓禮記喪大記注子姓謂衆子孫也列子秦穆公謂伯樂曰子姓有可使求馬者乎史記外戚世家既驩合矣或不能成子姓朱子語類姪字本非兄弟之子所當稱當稱從子為是自曾祖而下三代稱從子髙祖四世而上稱族子清源公王忠嗣碑元載撰王縉正書大厯十年四月今在渭南縣𤣥靖先生李君碑顔真卿撰并書正書大厯十二年五月今在句容縣茅山都穆金薤琳琅曰碑稱隱居先生以三洞真法傳升𤣥先生升𤣥付體𤣥先生體𤣥付正一先生正一付先生今考隱居先生者梁陶𢎞景升𤣥為王逺知體𤣥為潘師正正一為司馬子微三人唐書有傳惟𤣥靖無之予嘗逰茅山至玉晨觀其前有雷平池池南為伏龍岡𤣥靖𦵏其上碑今在觀中四周皆刻文字道士以亭覆之髙力士殘碑行書大厯十二年五月今在蒲城縣梵網經心地戒品髙堅正書大厯十三年正月今在嵩山㑹善寺後一碑兩面贈揚州都督段行琛碑張增正書李同系篆額大厯十四年閏五月今在汧陽縣孔子廟殘碑程浩撰顔真卿正書今在華州此文載于唐文粹為扶風縣文宣王廟記大厯二年駕部郎中程浩文而今西安府學有僧夢英書此一記其文正同但去扶風古縣也以下半篇其跋云此記刋石元在湖州臨安縣夢英愛而書之豈駕部先作此於扶風魯公又書之於湖州而去其半篇耶又考唐地里志臨安縣屬杭州不屬湖州得非夢英之誤耶今華州有此殘碑數十字其文同顔魯公與郭僕射書行草今在西安府儒學世謂之争坐位帖宋沈括夢溪筆談曰都堂及寺觀百官㑹集坐次多出臨時唐以前故事皆不可考惟顔魯公與左僕射定襄郡王郭英又書云宰相御史大夫兩省五品供奉官自為一行十二衛大將軍次之三師三公令僕少師保傅尚書左右丞侍郎自為一行九卿三監對之從古以來未嘗參錯此亦畧見當時故事顔魯公與蔡明逺書行草拓本二帖竝依金石録附于大厯之末顔氏家廟碑顔真卿撰并書正書李陽氷篆額建中元年七月今在西安府儒學一碑兩面并兩旁為四幅碑題曰唐故通議大夫行薛王友柱國贈秘書少監國子祭酒太子少保顔君廟碑銘乃真卿之父也其文曰君諱惟貞字叔堅及敘其先世則曰魏有盛盛字叔臺青徐二州刺史闗内侯始自魯居于琅邪臨沂孝悌里生廣陵太守葛繹貞子諱欽字公若生汝隂太守護軍襲葛繹子諱黙字靜伯生晉侍中右光禄大夫西平靖侯諱含字𢎞都隨元帝過江生侍中光禄勲西平定侯諱髦字君道生州西曹騎都尉西平侯諱琳字文和生宣城太守御史中丞諱靖之字茂宗生巴陵太守度支校尉諱騰之字𢎞道生輔國江夏王叅軍諱炳之字叔豹生齊持書御史兼中丞諱見逺字見逺生梁鎮西記室叅軍諱協字子和生北齊給事黄門侍郎待詔文林館平原太守隋東宫學士諱之推字介生皇秦王記室諱思魯字孔歸君之曾祖也率子弟奉迎義旗于長春宫拜儀同生勤禮字敬君之祖也著作郎修國史夔府長史贈虢州刺史生昭甫本名顯甫敬仲殆庶無恤少連務滋辟疆昭甫字周卿君之父也髙宗侍讀曹王屬贈華州刺史生我伯父諱元孫臮君君生闕疑允南喬卿真長幼輿真卿允臧自父以上竝直書其名而加諱字其他伯叔羣從悉名之予讀張燕公集有唐贈并州刺史先府君碑首曰府君諱隲字成隲范陽方城人也又有周通道館學士張府君墓誌乃説之曾祖也首曰君諱弋字嵩之范陽方城人也又曰君即太常卿隆之曾孫徵君子犯之孫河東從事俊之子又有唐處士張府君墓誌乃説之祖也曰曾祖徵君諱子犯祖河東郡從事諱俊父通道館學士諱弋竝直書其名而加諱字唐文粹載陳子昂我府君有周居士文林郎陳公墓誌文曰公諱元敬字某五世祖太樂生髙祖方慶方慶生曾祖湯湯生祖通通生皇考辯又有梓州射洪縣武東山陳居士墓銘序曰君諱嗣字𢎞嗣太樂即君之髙祖父也生曾祖方慶生祖湯生皇考迥君即迥之第二子也竝直書其名惟父加一諱字劉禹錫集有子劉子自傳曰曾祖凱官至博州刺史祖鍠殿中丞侍御史父諱緒浙西鹽鐵副使贈吏部尚書亦惟父加一諱字白居易集有故鞏縣令白府君事狀曰高祖諱建曾祖諱士通祖諱志善父諱温公諱鍠即居易之祖又曰長子諱季庚㐮州别駕事具後狀其㐮州别駕府君事狀曰公諱季庚字某鞏縣府君之長子即居易之父李翺集有皇祖實錄一篇其首曰公諱楚金葢古人臨文不諱而子昻禹錫自祖以上不加諱字又所謂不逮事王父母則不諱者也今人自述先人行狀而使他人填諱非古也文有云子泉𢎞都之德行子泉即顔淵也避唐髙祖諱顔魯公奉使蔡州書行書今在同州其上有魯公畫像書曰眞卿奉命來此事期未竟止縁忠勤無有旋意然中心悢悢始終不改㳺于波濤宜得斯報千百年間察真卿心者見此一事知我是行亦足達於時命耳又曰人心無路見世事只天知下有題曰觀此筆蹟不顯歲月以事實考之葢使李希烈時也希烈以建中元年䧟汝州盧杞建議遣公奉使至正元宋諱貞故作正元年八月丙戌公不幸遇害困躓賊庭者踰二年刃加於頸而色不變度無還期誓不易節葢書此以自表云靖康元年七月壬申朝散郎祕閣修撰知同州軍事唐重書又有忠義堂帖宋人所刻此帖名為奉命帖又有移蔡一帖曰貞元元年正月五日眞卿自汝移蔡天也天之昭明其可誣乎有唐之德則不朽耳十九日書葉少藴避暑録話曰顔魯公眞蹟宣和間存者猶有數十本其最著者與郭英又論坐位書在永興安師文家祭姪季明文病妻乞鹿脯帖在李觀察士衡家乞米帖在天章閣待制王質家寒食帖在錢穆甫家其餘與蔡明逺帖盧八倉曹帖送劉太眞序等當作劉太沖不知在誰氏皆有石本坐位帖安氏初析居分為二人多見其前段師文後乃併得之相繼皆入内府世間無復遺矣孫承澤曰送劉太沖序墨蹟舊在中書趙士禎家後歸之闗中南宗伯宗伯沒其邑中舉人東䕃商得之後復歸之南氏余從東君借臨月餘今國學所摹印即趙氏本也視墨蹟文字及書法俱小異豈傳世不止一本乎今忠義堂所刻已上諸帖皆有之又有送辛晃序清逺道士同沈恭子逰虎丘寺詩末題大厯五年十二月又有開元二年二月顔元孫告身一通乾元元年四月顔昭甫告身一通寶應元年七月顔惟貞贈秘書少監告身一通殷氏贈蘭陵夫人告身一通大厯十二年八月顔真卿刑部尚書告身一通建中元年八月顔真卿太子太師告身一通後有宋至和二年蔡㐮跋嘉定乙亥留元剛刻石景教流行中國碑僧景淨撰吕秀巖正書建中二年太蔟月今在西安府城外金勝寺不空和尚碑嚴郢撰徐浩正書建中二年十一月今在西安府儒學舊唐書王縉傳曰初代宗喜祠祀未甚重佛而元載杜鴻漸與縉喜飯僧徒代宗嘗問以福業報應事載等因而啟奏代宗由是奉之過當嘗令僧百餘人於宫中陳設佛像經行念誦謂之内道塲其飲膳之厚窮極珍異出入乘廐馬度支具廩給每西蕃入宼必令羣僧講誦仁王經以禳鹵宼苟幸其退則横加錫賜胡僧不空官至卿監封國公通籍禁中勢移公卿爭權擅威日相凌奪凡京畿之豐田美利多歸於寺觀吏不能制僧徒雖有贓姦蓄亂敗戮相繼而代宗信心不易乃詔天下官吏不得箠曵僧尼又見縉等施財立寺窮極瓌麗每對揚啓沃必以業果為證以為國家慶祚靈長皆福報所資業力已定雖小有患難不足道也故禄山思明毒亂方熾而皆有子禍僕固懐恩將亂而死西戎犯闕未擊而退此皆非人力所能制也帝信之愈甚公卿大臣既推以業報則人事棄而不修故大厯刑政日以陵遲有由然也五臺山有金閣寺鑄銅為瓦塗金於上照耀山谷計錢巨億萬縉為宰相給中書符牒令臺山僧數十人分行郡縣聚徒講説以求貨利代宗七月望日於内道塲造盂蘭盆飾以金翠所費百萬又設髙祖以下七聖神座備幡節龍傘衣裳之制各書尊號於幡上以識之舁出内陳於寺觀是日排儀仗百寮序立於光順門以俟之幡花鼓舞迎呼道路歲以為常其傷教之源始於縉也史傳所言佞佛之弊至切故具録之按此碑不空以一胡僧而官至特進大鴻臚開府儀同三司肅國公遂為後代沙門授官之祖吁亦異矣冊府元龜載不空贈官詔曰大道之行同合於異相王者至理總歸於正法方化成之齊致何儒釋之殊塗故前代帝王罔不崇信法教𢎞闡與時偕行特進試鴻臚卿大興善寺三藏沙門大廣智不空我之祖師人之舟楫超詣三學坐離於見聞修持萬行常示於化滅執律捨縛護戒為儀繼明善教之志來受人王之請朕在先朝早聞道要及當付囑常所歸依每每執經内殿開法前席凭几同膠序之禮順風比崆峒之問而妙音圎演密行内持待扣如流自涯皆悟滌除昬妄調伏魔寃天人洗心於度門龍鬼受職於神印固以氣消災厲福致吉祥當有命秩用申優禮而得師為盛味道滋深思復强名載明前志夫妙界有莊嚴之士内品有果地之儀本乎尚德敬順時典可開府儀同三司仍封肅國公贈司空諡曰大辯正廣智不空三藏和尚又言大厯三年二月興善寺不空三藏上言因修寺塔下見古埏得一小棺長尺餘發視有十餘重棺皆金寶裝飾中有舍利骨及佛髪一條每棺一鎖䂓製妙絶有殷仲文題賛其説近怪仲文為桓𤣥侍中領左衛將軍安帝反正出為東陽太守未至關中不可以欺里巷之儒而代宗乃出寶輿具威儀迎入内道塲奉之何哉宋洪邁容齋三筆曰自唐代宗以胡僧不空為鴻臚卿開府儀同三司其後習以為常至本朝尚爾元豐三年詳定官制所言譯經僧官有授試光禄鴻臚卿少卿者請自今試卿者改賜三藏大法師試少卿者賜三藏法師詔試卿改賜六字法師少卿四字並冠以譯經三藏乆之復罷吴嶽祠堂記于公異撰冷朝陽行書興元元年十月今在隴州按唐書是年五月二十八日副元帥李晟復京師七月十三日德宗至自興元八月晟至鳯翔斬叛卒王斌等及涇帥田希鑒此則以其年之十一月祭告吳山而掌書記于公異為此文也碑中所云相國涼公鎮鳳翔者李抱玉也范陽郡新置文宣王廟碑韋稔撰張澹行書貞元五年二月今在涿州李元諒懋功昭德頌張濛撰韓秀弼八分書李彛篆額貞元五年十月今在華州治大門内舊唐書李元諒傳元諒本駱元光嘗在潼闗領軍積十數年軍士皆畏服德宗居奉天賊泚遣偽將何望之輕騎襲華州刺史董晉弃州走望之遂據城將聚兵以絶東道元諒自潼關將所部乘其未設備徑攻望之遂拔華州望之走歸元諒乃修城隍器械召募不數日得兵萬餘人軍益振以功加御史中丞賊泚數遣兵來宼輒擊却之遷華州刺史兼御史大夫潼關防禦鎮國軍節度使與副元帥李晟進收京邑力戰壊苑垣而入遂復京師賜姓李改名元諒官終隴右節度使姜嫄公劉廟碑髙郢撰張誼行書貞元九年四月今在邠州城南唐邠寧節度觀察使張獻甫所遷謂之新廟聖母帖僧懐素草書貞元九年五月今在西安府儒學李抱真德政碑董晉撰班宏正書貞元九年今在潞安府杜府君夫人韋氏墓誌銘李宣撰姪成均行書貞元十年八月今在西安府城外寺坡杜君官至京兆尹名濟嵩山㑹善寺戒壇記陸長源撰陸郢八分書并篆額貞元十一年七月在大厯勅牒碑之隂同州澄城令鄭公德政碑闕撰鄭雲逵行書貞元十四年正月今在本縣文多剥泐但云公字叔敖鄭州滎陽人而不得其名少林寺厨庫記顧少連撰崔溉正書貞元十四年今在寺中尚書李公造華嚴三㑹普光明殿功德碑支髙撰并書貞元十六年四月今在交城縣西北五里萬卦山天寧寺其文有云如月之亘森菌桂以馨香如山之容寘大椿之夀筭是用詩如月之恒恒字作亘音古鄧反按詩如月之恒傳云恒弦也箋云月上弦而就盛陸德明釋文恒本亦作縆同古鄧反沈音古恒反正義云月光至八日九日月體正半昬而中似弓之張而弦直謂上弦也考工記弓人恒角而短鄭司農云恒讀為裻縆之縆是縆恒亘同為一字而陸氏讀為去聲此文因用之耳今廣韻縆字平去二聲齊收楚辭九歌縆瑟兮交鼔一作絙招魂姱容修態絙洞房些一作縆李善西都賦注亘與縆古字通韓文公送侯叅謀詩信知後㑹時日月屢環絙古人頌君之辭其言月不以望而以弦猶之言日不以中而以升日中則昃月望則虧故古人之取義不於其已盛而於其將盛此大易所以貴乎月幾望也今人讀為恒乆之恒失之矣生民詩恒之秬秠釋文恒古鄧反本又作亘其西又有一碑為汾州衆香寺沙門克誠撰大半剥落有太尉李公抱貞字靳英㠻墓誌銘張遇撰并書行書貞元十七年二月近出漷縣錠子村土中劍州長史李廣業碑鄭雲逵撰正書貞元二十年十一月今在三原縣鉅鹿時􅀈墓誌銘劉通明撰行書貞元二十一年四月其文曰𦵏薊縣燕夏鄉海王村之南原近出之土中字拙而率楚金禪師碑沙門飛錫撰吴通微正書附奉勅追謚號記貞元二十一年七月在顔魯公多寶塔碑隂送李愿歸盤谷序韓愈撰髙從闕書貞元年今在濟源縣廨其末有記云貞元辛闕歲建丑月渤海髙從闕乃書者之名而石缺之也宋元祐八年濟源縣令傅君俞重刻懐素藏真律公二帖草書今在西安府學賈竦謁華嶽廟詩正書元和元年十月詩五字十八韻刻於後周天和二年華嶽碑之左旁蜀丞相諸葛武侯祠堂碑裴度撰柳公綽正書元和四年二月今在成都府文稱元和二年相國臨淮公鎮蜀者武元衡也裴公時為節度掌書記文有云誰謂阻深殷為强國誰謂遳脆勵為勁兵此用左思魏都賦禀質遳脆語廣韻遳七戈切脆也唐書王伾傳形容遳陋晉周孝侯碑今在宜興縣首曰晉故散騎常侍新平廣漢二郡太守尋除楚内史御史中丞使持節大都督塗中京下諸軍事平西將軍孝侯周府君之碑晉平原内史陸機撰右軍將軍王羲之書其末曰唐元和六年歲次辛卯十一月十五日承奉郎守義興縣令陳從諫重樹前試太常寺協律郎黄以下缺張燮編次陸士衡文集收入此篇謂其中多訛謬文理不接且孝侯戰沒而云舊疾増加奄捐館舍明是不讀史者偽作按此碑本唐人之書故業字晉諱而直書不避其於唐諱則世字二見皆作廿虎字二見一作虎一改作獸基作􅀢豫作預而塗中亦當作涂中三國志吴主傳作棠邑涂塘以淹北道晉書宣帝紀王凌詐言吳人塞涂水武帝紀琅邪王佃出涂中海西公紀桓温自山陽及㑹稽王昱㑹于涂中孝武紀遣征虜將軍謝石帥舟師屯涂中安帝紀譙王尚之衆潰逃于涂中字竝作涂唐人加阝為滁即今之滁州而碑作塗非也文選梁任昉奏彈曹景宗東關無一戰之勞涂中罕千金之費李善本作塗中士衡逸少既不同時而晉以前碑亦未有署某人書者其文對偶平仄全是唐人可定其為偽作也書梁王肜作彤尤誤王𢎞撰曰按史士衡兄弟以惠帝大安二年十月見殺於成都王穎又十四年元帝即晉王位始稱建武元年而碑云建武元年冬十一月甲子追贈平西將軍封清流亭侯諡曰孝禮也然則已死之士衡又烏知十四年後之事而預為云云如此耶又處之戰死在元康七年正月癸丑今碑云元康元年捐館亦誤石壁寺甘露義壇碑李逢吉撰正書元和八年三月今在交城縣石壁山寺碑隂有進甘露表云臣説言臣所部太原府交城縣石壁山寺今月二十二日夜甘露降於寺内戒壇西及寺外栢林上大枝小葉無不周徧凝泫垂滴甘甜如蜜當寺臨壇大德僧慎微與僧惠廣等一十五人咸共觀嘗覆問如狀云云貞元十二年九月二十五日臣説者河東節度使北都留守太原尹李説即普光明殿碑所謂尚書李公者也此碑為元至順三年重刻唐時以太原府為北都交城距府八十里故有戒壇而安禄山反楊國忠遣侍御史崔衆至太原納錢度僧尼道士旬日得百萬緡當日差徭之重剃度之嚴皆可知矣内侍李輔光墓誌崔元畧撰巨雅正書元和十年四月今在髙陵縣文稱門吏晉州司法叅軍巨雅此輔光為河中監軍所除唐時士人而出於内侍之門者葢不少矣輔光少選入内而有夫人輔氏子四人唐之宦官有權位者則得娶婦史之所載髙力士娶吕𤣥晤女李輔國娶元擢女皆奉勅為之而楊復光至假子數十人又後漢書劉瑜傳言常侍黄門亦廣妻娶周舉傳言豎宦之人亦復虚以形埶威侮良家取女閉之至有白首歿無配偶逆於天心單超傳言四侯轉横多取良人美女以為姬妾則固不始於唐時也唐人日曰二字同一書法惟曰字左角稍缺石經日字皆作曰此碑及𤣥奘塔銘亦然故陸氏釋文於九經中遇二字可疑者即加音切宋以後始以方者為曰長者為日而古意失矣碑内宫掖作官踐阼作祚士君子作仕皆誤盧藏用書蘓許公碑亦以踐阼作祚南海神廣利王廟碑韓愈撰陳諫正書元和十五年十月今在廣州府東南八十里海神廟中太保李良臣碑李宗閔撰楊正正書長慶二年今在榆次縣邠國公功德銘楊承和撰并書正書陸邳篆額長慶二年十二月今在西安府儒學都穆金薤琳琅曰邠國公者内侍梁守謙也考之唐史宦者守謙無傳惟憲宗元和十五年書帝暴崩於太極殿中尉梁守謙王守澄等共立太子殺吐突承璀及澧王惲而韓文公平淮西碑亦載守謙在帝左右嘗命之徃撫蔡師夫守謙以一宦者而爵至上公此可見憲宗之信任小人宜其晚節不終卒死宦者之手然則予之録此蓋將為天下後世之戒而非徒取其文字也西平郡王李晟碑裴度撰柳公權正書太和三年四月今在髙陵縣狀嵩髙靈勝詩尉遲汾撰正書太和三年六月今在中嶽廟壁有宋熙寧丁巳王紳題字題云府尹王侍郎准制拜嶽準字作准佛頂尊勝陀羅尼經序僧叡川撰僧無可正書太和六年四月今在西安府百塔寺義陽郡王苻璘碑李宗閔撰桺公權正書今在富平縣儒學金石録云題中書侍郎同平章事李宗閔撰宗閔太和七年為此官宋王楙野客叢書曰苻堅其先本姓蒲其祖以䜟文改為苻符融其先魯頃公孫仕秦為符璽郎以符為氏故苻堅之姓從草符融之姓從竹二姓固自不同而唐義陽郡王苻璘碑合從竹而書作苻而苻堅之苻又有書從竹者皆失於不契勘耳余考漢碑隸書率以竹為􅀈少有從竹者如符節字皆然今前漢書符瑞多從􅀈魏晉以下真書碑亦有書符節為苻莭者蓋古者皆通用故耳此又不可不知顔元孫干禄字書曰從草者為姓從竹者為印亦未之察也符融之符獨非姓乎金石文字記卷四
