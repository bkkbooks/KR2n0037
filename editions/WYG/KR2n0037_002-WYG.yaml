body:
  text: 金石文字記卷二崑山顧炎武撰漢巴郡太守樊敏碑八分書建安十年三月重刻本字甚拙惡其文有云晳為韓魏者析之異米巫􅓇虐者凶之異嵗在汁洽者協之異士女涕泠者零之異吕氏春秋􅓇氣不入身無苛殃漢書藝文志星事􅓇悍後漢書禮儀志大儺中黄門倡侲子和曰甲作食􅓇廣韻􅓇即凶字古文漢三公山碑攘去宼􅓇魏横海將軍吕君碑羣􅓇鼎沸竝作此字爾雅嵗在未曰協洽史記厯書作汁洽天官書作叶洽方言自闗而東曰洽闗西曰汁春秋文耀鉤黑帝叶光紀周禮禮記注竝作汁周禮太史讀禮書而協事故書協作叶杜子春云叶協也書亦或為協或為汁大行人協辭命故書協作叶鄭司農云叶當作汁張衡西京賦五緯相汁五臣本作叶五經文字協字古文作叶而緯書有樂汁徴圖漢書五行志引洪範協用五紀字又作旪師古曰旪讀曰叶四字皆以十為聲而从劦从口从水从日則各異耳尚書大傳其歌聲比余謡名曰晳陽注謂春厥民析則析之為晳或亦可通用乎執金吾丞武榮碑八分書無年月今在濟寜州儒學殘缺婁機漢隸字源曰碑言遭桓帝大憂哀隕而亡當是靈帝時也王𢎞撰曰碑額漢故執金吾丞武君之碑十字作隂文凸起他碑所無秦君碑八分書無年月滕縣東四十里馬山後有古城半圯于河土中得此碑其文曰余聞湯武千載周孔異世以義相髙况余天禄踐跡遵基竊慕揚善喟然而歎其鄙辭曰於穆秦君命世優邁承祖皇裔出睪紀行録功必本其初惟君總角勵志仲尼從容六藝佃田疇升階英妙轉典蒸黎為政崇傳五教竝和仁賢叙位法依蕭何囹圄空虚鄉無逋逃凡百肅雍莫不率從境内既寜路不資遺耕夫千畝餘種不歸𤣥清介白食茹㧞葵三年有成嬰兒謡歌鼓腹喜徳踊躍嘔唏水静魚集國富民繁户増十倍牧守孔嘉怒不斷刑寛不容非化准邠邵比翮而飛永如南山不缺不虧略取大較丹書刻石垂示後昆識者察焉魏公卿上尊號碑八分書拓本殘缺按此文當在延康元年而刻於黄初之後受禪碑八分書黄初元年十月拓本耒按以上二碑竝在許州今現存封孔羡碑八分書黄初元年今在曲阜縣孔子廟中後人刻其下曰陳思王曹植詞梁鵠書謬也書輯五瑞作揖太皥作大皓三恪作愘胡三省通鑑注曰漢平帝元始元年封褒成君孔霸曽孫均為褒成侯奉孔子祀王莽敗失國光武建武十三年復封均子志為褒成侯志子損和帝永元四年徙封褒亭侯世世相傳至獻帝初國絶魏文帝黄初二年封孔子二十一世孫羨為宗聖侯邑百户宋書禮志曰漢以後天下送死奢靡多作石室石獸碑銘等物建安十年魏武帝以天下彫弊下令不得厚𦵏又禁立碑髙貴鄉公甘露二年大將軍叅軍太原王倫卒倫兄俊作表徳論以述倫遺美云祗畏王典不得為銘乃撰録行事就刋於墓之隂云爾此則碑禁尚嚴後復弛替晉武帝咸寜四年又詔曰此石獸碑表既私褒美興長虚偽傷財害人莫大於此一禁斷之其犯者雖㑹赦令皆當毁壊至元帝大興元年有司奏故驃騎府主簿故恩營葬舊君顧榮求立碑詔特聴立自是後禁又漸頽大臣長吏人皆私立義熙中尚書祠部郎中裴松之又議禁斷於是至今裴松之傳曰松之以世立私碑有乖事實上表陳之由是竝斷以故終魏之世略無紀功述行之文其立碑之見於史者惟田豫顔斐二人而晉世則扶風王駿魏舒羊祜杜預閻徳唐彬嵇紹丁紹范平立碑之事百有餘年亦僅七八見齊建武中范雲上表求為太宰竟陵王子良立碑事竟不行其文載昭明太子選中所引亦止太宰褚淵丞相豫章王嶷二例若劉勔之生為立碑安成王秀之四碑竝建史家書之以為異事而自魏至陳文字之罕𫝊於後有繇然矣隋書禮儀志梁天監六年申明葬制凡墓不得造石人獸碑唯聴作石柱記名位而已又考漢末蔡中郎集中胡廣陳寔各三碑橋𤣥楊賜胡碩各二碑又袁滿來年十五胡根年七嵗各有碑夫一人而至二碑三碑冗矣殤子而為之立碑濫矣至於闕樓人獸之飾亦多在桓靈之世水經注言閹寺擅權五侯暴世割剥公私以事生死如荆州刺史李剛之石闕祠堂四壁隱起彫刻為君臣官屬龜龍麟鳳之文飛禽走獸之像𢎞農太守張伯雅之引水入塋域為池沼蟾蜍吐水石湟承溜蜀郡太守王子雅之石樓雙峙欒櫨承栱雕簷四柱窮巧綺刻妙絶人工者為𦵏薶之侈一至於此繇上之人不為之限制也然則魏武之禁其可已乎吳紀功碑皇象篆書天璽元年江寜府南天禧寺門外有石三段乃吳後主天璽元年巖山紀功徳石其文不全宋元祐六年轉運副使胡宗師輦置漕臺後圃仍題其末今在府學顧起元曰府學中三段石碑按實録吳天册元年吳郡臨平湖開又於湖邊得石函函中有小石青白色長四寸廣二寸刻上作皇帝字於是改元天璽立石刻於巖山紀吳功徳其文乃東觀令華覈作黄長睿東觀餘論曰皇象書人間殊少惟建康有吳時天發神䜟碑若篆若隸字勢雄偉相傳乃象書也戚光續志云象書獨歩漢末况體兼篆􅘴誠宜居周鼓秦刻之次魏鍾繇諸碑勿論也其石四方面背濶書各八行兩旁狹書行其文書滿三方而虚其一辭雖不可讀其可識者百八十餘字首曰上天帝言次曰天發神䜟曰天䜟廣多曰將軍禆將軍闗内侯曰詔遣中書郎曰章咸李楷賀吳寵建業丞許等十二人曰永歸大吳上天宣命曰文字炳朖曰在諸石上其後又别書曰蘭臺東觀令曰巧工九江曰吳郡曰東海夏侯此蓋列與事之臣於正文之後猶秦碑刻制爾泰山碑似方非方四面廣狹皆不等正與此石類晉葛洪曰吳之善書則有皇象劉纂岑伯然朱季平皆一代之絶手如中州有鍾元常胡孔明張芝索靖各一邦之妙竝用古體俱足周事晉太公吕望表八分書太康十年三月今在汲縣西門太公廟水經注曰縣故汲郡治城西北有石夾水飛湍濬急人亦謂之磻谿言太公常釣於此也今其文曰般谿之山明靈所託般即磻之異文水經注又言縣民故會稽太守任宣白令崔瑗曰太公生於汲舊居猶存君與髙國同宗今臨此國宜正其位以明尊祖之義遂立壇祀又言城北三十里有太公泉泉上又有太公廟晉太康中范陽盧無忌為汲令立碑於其上此碑是无忌所立無字作无而自稱為太公之裔孫然則崔盧二姓皆出太公其後人之門第可謂盛矣表云其紀年曰康王六年齊太公望卒蓋壽百一十餘嵗宋王應麟困學紀聞謂尚書顧命稱齊侯吕伋則成王之末伋已嗣太公為齊侯以太公為康王時卒者非矣開寳中詔修先代帝王祠廟而以鬻熊配文王召公配武王周公唐叔配成王太公畢公配康王葢因此碑而誤蘭亭序王羲之行書永和九年三月蘭亭序以定武本為最佳其真者已不可得即宋人重刻之本存於世者亦少惟京師國子監一石為諸家刻本之冠然不知其所自來元史周伯琦傳言順帝以伯琦工書法命摹王羲之所書蘭亭序智永所書千文刻石宣文閣中意此伯琦所摹後人因閣廢而移於此也王𢎞撰曰今又有東陽本不讓國子監本宣徳間何士英作兩淮鹽運使得之淮南井中潁上上黨皆不及也梁上清真人許長史舊館壇碑陶𢎞景正書天監十七年今在句容縣茅山碑首云弟子華陽隱居丹陽陶𢎞景造隱居手自書前此未有列書人之名者此其始也水經注滎口石門碑稱陳留邉韶字孝先頌石銘李善注文選頭陀寺碑文云碑在鄂州題云齊國録事叅軍琅邪王􅋄制則作文人姓名前此已有書之者也其書金陵地肺字作胇瘞鶴銘華陽真逸撰正書今在丹徒縣焦山下刻於崖石輟耕録云須潮落方可模故罕得其全文者歐陽文忠公以舊記稱王羲之書為非又疑顧况號華陽真逸而此書類顔太師沈存中則真以為况黄長睿東觀餘論謂陶𢎞景嘗居華陽故自號華陽隠居西清詩話云陶隠居外傳隠居號華陽真人晚號華陽真逸𢎞景著書不稱建元直以甲子紀嵗今此銘曰壬辰曰甲午壬辰梁天監十一年甲午十三年也𢎞景以天監七年逰海嶽住㑹稽及永嘉至十年還茅山十二年弟子周子良化去𢎞景為作傳即十一年在華陽可知也董逌書䟦載南陽張壆所記云瘞鶴銘今存於焦山凡文章句讀之可識及㸃畫之僅存者百三十餘字而所亡失者幾五十計其完書盖九行行之全者二十五字而首尾不預焉熙寜三年春余索其遺逸於焦山之隂偶得十二字於亂石間石甚迫隘偃卧其下然後可讀故昔人未之見而世不傳其後又有丹陽外仙江隂真宰八字與華陽真逸上皇山樵似是真侣之號余於崖上又得唐人詩詩在貞觀中已列銘後則銘非顧况可知矣今考此銘字體與舊館壇碑正同其為隱居書無疑予友淮隂張弨以丁未十月探幽山下復得七字云惟寜之上有厥土二字華亭之上有爽塏勢掩四字其右題名徴下有君字皆昔人之所未見也後魏孝文皇帝弔殷比干墓文正書太和十八年十一月今在汲縣北十五里比干墓上魏書劉芳傳髙祖遷雒路由朝歌見殷比干墓愴然悼懐為文以弔之芳為注解表上之即此文也此碑字多别搆如蔑為薨蔽為弊菊為葬寔為寔箕子為萁子往為住厥為􅂒邅為亶顛為􅀢辛為亲因為囙桴為翺為􅀈曳為电芙蓉為􅀈容葩為􅀢漂揺為㵱䬙慮為􅀈螭為蠄裔為􅒨帶為􅀢訴為􅀈雛為􅀈瀏為淄俯為府闔為闔騶虞為􅀈隨為轡為吸為歙闚為睇為􅀈不可勝記顔氏家訓言晉宋以來多能書者故其時俗􅉍相染尚所有部帙楷正可觀不無俗字非為大損至梁天監之間斯風未變大同之末訛替滋生蕭子雲改易字體邵陵王頗行偽字前上為草能旁作長之類是也朝野翕然以為楷式畫虎不成多所傷敗爾後墳籍略不可看北朝喪亂之餘書迹鄙陋加以專輒造字猥拙甚於江南乃以百念為憂言反為變不用為罷追來為歸更生為蘇先人為老如此非一徧滿經傳追來為歸見穆子容太公碑作先人為老見張猛龍碑作更生為蘇今人猶用之胡三省通鑑注引宋景文手記曰北齊時里俗多作偽字始以巧言為辨至隋有栁􅈯其字又以巩易巧矣困學紀聞亦引此又云以文子為學今觀此碑則知别體之興自是當時風氣而孝文之世即已如此不待喪亂之餘也江式表云皇魏承百王之季世易風移文字改變篆形錯謬隸體失真俗學鄙習復加虚巧談辨之士又以意説炫惑於時難以釐改後周書趙文深傳太祖以隸書紕繆命文深與黎景熙沈遐等依説文及字林刋定六體成一萬餘言行於世盖文字之不同而人心之好異莫甚於魏齊周隋之世别體之字莫多於此碑雜體之書莫過於李仲琁而後之君子旋覺其謬自唐時國子監置書學博士立説文石經字林之學而顔元孫作干禄字書張參作五經文字唐𤣥度作九經字様天下之文始漸歸于一矣顧以此二碑出于千嵗之逺而與孔壁之文蘭臺之典同什襲而寳之豈不可笑也哉雖然此碑不傳則唐人正字之功不得而著乎千載也存之以示後人使知趣舎云爾又考魏書道武帝天興四年十二月集博士儒生比衆經文字義類相從凡四萬餘字號曰衆文經太武帝始光二年三月初造新字千餘頒之逺近以為楷式天興之所集者經傳之所有也始光之所造者時俗之所行而衆文經之不及收者也則知説文所無後人續添之字大都出此三國志注引㑹稽典錄言孫亮時有山隂朱育依體像類造作異字干名以上是别撰之字自漢而有矣磚浮圖石葢銘正書嵩山㑹善寺掘地得此石蓋銘曰神龜三年七月三日魏故太傅侍中太尉公清和王薨世子元亶字子亮次子元􅀈字子開奉為建七層磚浮圖一區敢用頂髮及諸雜寳上塔追誠崇敬千載弗忘謹銘圅葢今存寺中元􅀈當是元啓魯郡太守張猛龍碑并隂行書正光三年正月今在曲阜縣孔子廟其隂書陽原縣義士州主簿王人生造頌文多剥缺中嶽嵩陽寺碑銘八分書天平二年四月今在嵩山㑹善寺末有正書一行曰大唐麟徳元年嵗次甲子九月景午朔十五日庚申從嵩陽觀移來㑹善寺立碑文東作柬矩作短潛作灒馴作廵啄作喙洋作庠騖作務惟皇帝太后不跳行不空闕猶存古式􅜝字三見曰法身凝􅜝曰䖍禮禪􅜝曰至􅜝至妙廣韻􅜝與寂同莊子注取其􅜝寞無情耳􅜝音寂本亦作寂葉封嵩陽石刻集記曰此碑上截刻佛相雕鏤層疊佛相隆起餘地鐫平此文刻於下截當碑四分之一其字之上方又刋空方六寸許深入二寸許其䂓製亦逈異於後代也北齊諸碑亦率類此李仲琁修孔子廟碑并隂興和三年十二月今在曲阜縣廟中魏書李仲琁傳除車騎大將軍兖州刺史仲琁以孔子廟牆宇頗有頽毁遂脩改焉即此碑也其文一行之中有篆有分有隸有草雜亂無倫而或者以為竒然則作詩者亦當一句騷一句漢魏一句選一句律而後為竒也此愚之所不解也引禮記梁木其摧作良木尤誤太公吕望碑穆子容撰正書武定八年四月今在汲縣西北三十里太公廟北史言子容少好學無所不覽求天下書逢即寫録所得萬餘卷魏末為兼通直散騎常侍聘梁齊受禪卒於司農卿其辭曰作其辭粤古曰字與日同一書法故變其文為粤欲讀者之易曉也驪山温泉頌正書今在臨潼縣北齊石刻佛經天保二年朱彛尊記曰太原縣之西五里有山曰風峪風峪之口風穴存焉相傳神至則穴中肅然有聲風之所從出也愚者捧土塞穴建石佛于内環列所刻佛經凡石柱一百二十有六積嵗既久虺蝎居之雖好逰者弗敢入焉丙午三月予至其地率土人燎薪以入審視書法非近代所及徘徊久之惜皆掩其三面未獲縱觀其全也由唐以前書卷必事傳寫甚者編韋續竹截蒲葺栁而浮屠之言亦惟山花貝葉綴集成文學者於時窮年筆札不能聚其百一難矣石經肇自蔡邕嵗久淪缺至唐鄭覃周墀復勒於京兆後唐長興中始更傳寫為雕印舎至難而就至易由是書籍日以盛顧世之學者忽其易反或束而不觀何與豈其所謂日盛者乃其所以衰與北朝之君臣崇奉釋氏故石刻經像在處多有今佛宫所棲少者百人多者數千人然通其㫖者率以語言文字為無用見講説佛經往往鄙置不屑嗚呼佛之説雖異於吾儒要皆彼國中之先生長者也既用其法盡棄其先生長者之言果何如哉九經之文在西安府學儒者雖不能盡觀而得之者咸知愛惜至風峪所藏其徒雖繁莫有顧焉者矣是則釋氏之無人不尤甚於吾道之衰也夫又曰通鑑載後唐劉后與李存渥奔晉陽李彦超不納存渥走至風谷為其下所殺北夢瑣言載此正作風谷胡三省注風谷當作嵐谷唐長安三年分宜芳縣置嵐谷縣屬嵐州非也風谷即風峪北人讀谷為裕俗竝加山作峪按北齊書段韶𫝊突厥從北結陣而前東距汾河西被風谷大唐創業起居注煬帝於樓煩置宫因過太原取龍山風谷道行幸則風谷之名已著於前代矣相里寺碑八分書天保三年正月今在汾陽縣太相里崇勝寺碑刻佛像其下方及兩旁皆題名碑隂有文并頌一通漫滅孔子廟碑八分書乾明元年今在曲阜縣廟中字剥落不可辨孝子郭巨墓碑正書武平元年正月拓本其文曰開府中兵叅軍梁㳟之盛工篆隸騎兵叅軍申嗣邕微學摛藻則此碑文嗣邕撰恭之書乃後人列名之權輿也少林寺碑正書武平元年正月今在本寺大殿前刻佛像與相里寺碑製略同書法甚劣齋字作㑹善寺大殿前有武平七年十一月造像記其製亦同是年十二月改元隆化其明年國亡矣南陽寺碑八分書武平四年六月今在青州府北門外龍興寺龍門山造像記正書武平六年六月雒陽西南二十五里伊闕山亦謂之龍門左傳謂之闕塞昭二十六年兩山相對伊水出其中泉出石竇下注于伊固昔日神都名勝之地後魏胡太后崇信浮屠鑿崖為窟中刻佛像大者丈餘凡十餘處後人踵而為之尺寸可磨悉鐫佛像至於今未已蚩蚩之氓謂鐫佛之功可得福報而其出於女子者尤多余嘗過而覧之既不可徧惟此武平六年者書法差可畫方格如棊局而其半亦已磨滅唐人則多總章以後及武后年號乃知魏齊唐三代之時無非女主為之崇飾耳按魏書宣武帝景明元年詔大長秋卿白整凖大京靈巖寺石窟於雒南伊闕山為髙祖文昭皇太后營石窟二所初建之始窟頂去地三百一十尺至正始二年終始斬山二十三丈大長秋卿王質謂斬山太髙費功難就奏求下移就平地去一百尺南北一百四十尺又言永平中中尹劉勝奏為帝復造石窟一凡為三所其所謂大京靈巖寺者在魏舊都平城今大同府城西三十里雲岡堡巖上刻佛像無數是其作俑也周華嶽頌万紐于瑾撰趙文淵八分書天和二年十月今在華隂縣西嶽廟其結銜曰使持節驃騎大將軍開府儀同三司大都督司宗治内史臨淄縣開國公万紐于瑾造此文車騎大将軍儀同三司縣伯大夫趙興郡守白石縣開國男南陽趙文淵字徳本奉勅書余所見碑撰人書人列名者始此其隂為唐刻華嶽精享昭應之碑而左右旁各有題名别見於後万紐于瑾者唐瑾也後周書本傳時燕公于謹勲髙望重朝野所屬白文帝言瑾學行兼修願與之同姓結為兄弟庶子孫承其餘論有益義方文帝歎異者久之賜瑾姓万紐于氏又云封姑臧縣子以平江陵功進爵為公而不言臨淄者史闕也李昶樂運𫝊竝云臨淄公唐瑾又曰趙文深字徳本少學楷隸雅有鍾王之則筆勢可觀當時碑牓唯文深及冀㑺而已太祖以隸書紕繆命文深與黎景熙沈遐等依説文及字林刋定六體成一萬餘言行於世及平江陵之後王褒入闗貴逰等翕然竝學褒書文深之書遂被遐棄文深慙恨形於言色後知好尚難反亦攻習褒書然竟無所成轉被譏議謂之學歩邯鄲焉至於碑牓餘人猶莫之逮王褒亦每推先之宫殿樓閣皆其迹也其書厯官與此碑悉同其以淵為深者避唐諱耳又達奚武𫝊武之在同州也時屬天旱髙祖勑武祀華嶽嶽廟舊在山下常所祈禱武謂僚屬曰吾備位三公不能燮理隂陽遂使盛農之月久絶甘雨天子勞心百姓惶懼忝寄既重憂責實深不可同於衆人在常祀之所必須登峰展誠尋其靈奥嶽既髙峻千仞壁立巖路嶮絶人跡罕通武年踰六十唯将數人攀藤援枝然後得上於是稽首祈請陳百姓懇誠晚不得還即於嶽上藉茅而宿夢見一白衣人來執武手曰快辛苦甚相嘉尚武遂驚覺益用祇肅至旦雲霧四起俄而澍雨逺近霑洽髙祖聞之璽書勞武賜雜綵百匹按武以保定三年出為同州刺史天和三年轉太傅則此碑正其在州時立也後周改華州為同州豆盧恩碑八分書今在咸陽縣碑云恩字永恩今北史附見其兄豆盧寜𫝊但言永恩而闕其名其厯官與傳略同後半漫滅不可讀隋天龍山碑八分書開皇五年今在太原縣天龍寺龍藏寺碑張公禮撰正書開皇六年十二月今在真定府龍興寺大殿内其後為天寧閣九間五層髙一百三十尺中有銅觀世音像髙七十二尺四十二臂各有所執之物俗謂之大佛寺也碑為隋開皇六年恒州刺史鄂國公金城王孝􅀈立而其末乃云齊開府長兼行叅軍九門張公禮撰齊亡入周周亡入隋而猶書齊官蓋君子之能不降其志而其時之人亦不以為非也其書踐阼為踐祚何人為河人伽藍為伽籃懐為壊五臺為吾臺則理之不可通者疑為後人模刻之誤又宋歐陽公集古録云龍藏寺已廢此碑今在常山府署之門此嘉祐八年所書而龍興寺乃乾徳元年建據文忠集録之日碑尚不在龍興此其徙置之由已不可問金薤琳琅曰寺在隋名龍藏歐公謂寺廢與碑在常山府署蓋未嘗親厯其地故誤書耳惟其大書齊官則必非後人之所加也余考顔之推仕厯周隋而其作家訓猶謂梁為本朝蓋同此意其時南北分疆興亡迭代為之臣者雖不獲一節以終而心之所主見于稱名之際者固較然不易如此然則今人之不及古者又豈獨書法之陋文字之訛而己哉大戴禮武王踐阼禮記曲禮踐阼臨祭祀正義曰踐履也阼主人階也天子祭祀升阼階履主階行事故云踐阼也文王世子篇成王幼不能涖阼周公踐阼而治注踐履也代成王履阼階方氏曰涖阼臨朝也阼者主人所有事之階故適子冠於阼以著代繼體之君臨朝行事謂之踐阼史記漢文帝紀辛亥皇帝即阼正義曰主人階也古時殿前兩階無中間道故以阼階為天子之位王莽傳引書逸嘉禾篇云周公奉鬯立于阼階隋書載北齊邢子才議曰君位在阼階故有武王踐阼篇啖氏春秋傳曰凡天子崩諸侯薨既殯而嗣子為君康王之誥是也未就阼階之位來年正月朔日乃就位南面而改元春秋所書是也公即位者即阼階之位也韓文公集元和聖徳詩皇帝即阼方崧卿注謂東階也或作祚非安喜公李使君碑八分書開皇十七年二月今在馬嵬堡北五里趙􅀈曰碑獨闕使君名而有季父琰之琰之見魏書使君封安喜縣公官亦不卑而隋書無傳不可考同州塔銘八分書仁壽元年十月今在同州其文曰維大隋仁壽元年嵗次辛酉十月辛亥朔十五日乙丑皇帝暜為一切法界幽顯生靈謹於同州武鄉縣大興國寺奉安舎利敬造靈塔願太祖武元皇帝元明皇后皇帝皇后皇太子諸王子孫等并内外羣官爰及民庶六道三塗人非人等生生世世值佛聞法永離苦空同昇妙果啟法寺碑周彪撰丁道護正書仁壽二年十二月拓本李淵為子祈疾疏行書大業二年正月今在鄠縣草堂寺滎澤令常醜奴墓志正書大業三年八月今在興平縣崇寜寺墓之有誌始自南朝南齊書云宋元嘉中顔延之作王球石誌素族無碑策故以紀徳自爾以來王公以下咸共遵用今之傳於世者惟此及梁羅二志為隋代之文爾梁任昉撰文章縁起謂誌墓始晉殷仲文隸釋謂東漢已有墓碑昉未之見也周必大得光武時梓潼扈君墓甎橅脫隸書而非鐫也以此知東漢誌墓初猶用甎久方刻石今謂起於江左者疑亦禁碑之後至晉末復剙為之而名曰誌耳鷹揚郎將義城子梁羅墓誌正書大業四年八月今在西安府城外杜曲古人之字未必皆工而後人貴之者以其所從來逺也此志正書猶帶八分凡隋以前之書法多如此而書志之人未必其通文義也鷹揚之字出詩大明之篇而此志前作陽後作楊宣政元年周武帝之號而書作正汪汪萬頃作傾羽儀作議降疾不瘳作抽與乾坤而齊固作個禁旅之禁作􅀢樊川之樊亦作􅀢此皆文理之至謬豈可以其出于古而不論哉志云大漸之期春秋六十有一按大漸出書顧命疑非人臣之所宜稱然列子書言季梁得疾七日大漸則固已通用之矣漢蔡邕作太傅胡公夫人靈表云皇姑没而中感遂大漸兮速流議郎胡君夫人哀讚云疾大漸以危亟齊王儉作褚淵碑文云景命不永大漸彌留任昉竟陵文宣王子良行狀云大漸彌留話言盈耳梁沈約安陸昭王緬碑文云遘疾彌留欻焉大漸唐王紹宗作王徴君臨終口授銘云吾六兄同人見疾大漸惟幾盧藏用蘇許公碑文亦云大漸之始遺令遵行陳明府修孔子廟碑仲孝俊撰八分書大業七年七月今在曲阜縣廟中左光禄大夫姚辨墓志銘虞世基撰歐陽詢正書大業七年十月拓本按此銘金薤琳琅載其全文闕四十餘字今予所得本全智永千字文今在西安府儒學一行正書一行草書宋大觀己丑刻唐秦王告少林寺主教行書今在寺中其文刻於裴漼碑之上方首曰太尉尚書令陜東道益州道行臺雍州牧左右武候大將軍使持節凉州總管上柱國秦王王字為後人鐫去世民告柏谷塢少林寺上座寺主以下徒衆及軍民首領士庶等柏谷塢王世充建為轅州少林寺牒云武徳四年四月廿七日衆僧等翻轅州城歸國末曰四月卅日按舊唐書太宗紀髙祖受禪拜尚書令右武候大將軍進封秦王加授雍州牧武徳元年冬拜太尉陜東道行臺尚書令尋加左武候大將軍涼州總管三年加拜益州道行臺尚書令七月總率諸軍攻王世充於洛邑則此乃四年之四月卅日也其五月丙寅則世充降而河南平矣世民二字草書特大乃太宗親書又按金石録載唐太宗賜少林寺教書八分書武徳二年與此不同或别是一教宗聖觀記歐陽詢撰序陳叔達撰銘八分書武徳九年二月今在盩厔縣樓觀大殿前皇甫誕碑正書今在西安府儒學萬厯中亭圮壓碑中斷題曰隋柱國左光禄大夫𢎞義明公皇甫府君碑銜曰銀青光禄大夫行太子左庶子上柱國黎陽縣開國公于志寜製銀青光禄大夫歐陽詢書皇甫君以仁壽四年九月卒而不書立碑年月按舊唐書于志寧𫝊貞觀三年累遷中書侍郎太宗命貴臣内殿宴怪不見志寜或奏曰勅召三品以上志寜非三品所以不來太宗特令預宴即加授散騎常侍行太子左庶子累封黎陽縣公則此碑貞觀初立也其不書年者不以隋臣而䝉唐號也隋字作隨虞世南孔子廟堂碑歐陽詢九成宫醴泉銘王知敬李衛公碑髙宗李英公碑天后順陵碑于敬之華陽觀王先生碑裴漼少林寺碑皆然當日金石之文二字通用自司馬温公作通鑑以後始壹用隋字而水經注溳水東南逕隋縣西隨字作隋則知此自古人省筆之字謂文帝始去辵而為隋者未必然也杜氏通典武徳九年六月太宗居春宫總萬幾下令曰依禮二名不偏諱今具官號人名及公私文籍有世及民兩字不連讀者竝不須諱避此碑中有世子及民部尚書字豳州昭仁寺碑朱子奢撰正書貞觀四年十一月今在長武縣距邠州西八十里唐太宗與薛舉戰争之地按舊唐書太宗紀貞觀三年十二月癸丑詔建義已來交兵之處為義士勇夫殞身戎陣者各立一寺命虞世南李百藥褚亮顔師古岑文本許敬宗朱子奢等為之碑銘以紀功業此其一也孔子廟堂碑正書貞觀四年今在西安府儒學其書銜曰太子中舎人行著作郎臣虞世南奉勅撰并書司徒并州牧太子左千牛率兼檢校安北大都護相王旦書碑額相王旦者睿宗也舊唐書宣宗大中五年十一月國子祭酒馮審奏文宣王廟碑始太宗立之睿宗篆額加大周二字盖武后時書也請琢去偽號從大唐字從之此大周字削而相王之銜獨存也其末曰永興軍節度管内觀察處置等使王彦超再建則元碑已亡此重刻也此碑與皇甫誕碑竝書胥為廣韻胥俗作然考之漢人如韓勑孔廟禮器碑桐柏淮源廟碑司空宗俱碑巴郡太守張納碑竹邑侯相張壽碑戚伯著碑金廣延母徐氏碑殽阬祠碑隂楊震碑隂及魏公卿上尊號奏北齊南陽寺碑固已書為􅇧矣漢人碑亦或作􅀢後周華嶽頌作􅀢故李善注枚乗七發以通厲骨母之塲為胥母之誤而壻字一傳為再傳為􅀈三傳為􅀈四傳為聟皆胥之變也詩有女同車釋文壻音細字林作􅀈戰國䇿韓且坐而胥亾乎王胥臣之反而行竝作咠書大傳不愛人者及其胥餘作咠晉書五行志淪咠於北音義咠息魚反張駿𫝊有黄龍見於揖次之嘉泉吕光載記迎大豫於揖次音義揖子魚反次音恣漢書地理志武威郡有揟次縣此皆胥字之誤漢仙人唐公房碑壻字作聟晉王右軍帖有女聟字其書幕為莫笑為㗛覆簣為覆匱荆為􅀈歌為哥其字或通或俗而及之為反則重刻者誤也臨淄郡公房彦謙碑李百藥撰八分書貞觀五年三月今在章丘縣西南七十里趙山之陽彦謙唐相𤣥齡之父金石録以為歐陽詢書房彦謙髙祖法夀自宋歸魏封壯武侯子孫承襲魏隋唐三書皆同獨碑作莊武按漢膠東國有壯武縣文帝封宋昌為壯武侯正義曰括地志云壯武故城在萊州即墨縣西六十里後漢志壯武故夷國左傳隱元年紀人伐夷是也賈復𫝊封膠東侯食郁秩壯武等六縣晉張華亦封壯武侯字竝作壯獨此碑與左傳杜氏注作莊化度寺邕禪師塔銘李百藥撰歐陽詢正書貞觀五年十一月拓本九成宫醴泉銘魏徴撰歐陽詢正書貞觀六年四月今在麟逰縣舊唐書本隋之仁夀宫太宗改為九成宫是也虞公温彦博碑岑文本撰歐陽詢正書貞觀十一年十月今在醴泉縣殘缺冊府元龜貞觀十一年二月丁巳詔曰佐命功臣義深舟楫或定謀帷幄或身摧行陣同濟艱危克承鴻業追念在昔何日忘之使逝者無知咸歸寂寞若營魂有識還如疇曩居止相望不亦善乎漢氏使將相陪陵又給以東園秘器篤終之義恩意深厚古人之志豈異我哉自今已後功臣密戚徳業尤著如有薨亡宜賜塋地一所及秘器使其窀穸之時喪事無闕所司依此營備稱朕意焉二十年八月丁亥詔曰周室姬公陪於畢陌漢庭蕭相附彼髙園寵賜墳塋聞諸上代從窆陵邑信有舊章蓋以懿戚宗親類本同之枝榦元功上宰猶在身之股肱哀榮之義實隆始終之契斯允今宜聿遵故實取譬拱辰庶在鳥耘之地無虧魚水之道宜令所司於昭陵南左右廂封境取地仍即標識疆域擬為葬所以賜功臣其有父祖陪陵子孫欲來從葬者亦宜聽允醴泉縣志曰昭陵諸碑若文皇后碑止存屭贔長孫無忌碑存而字盡滅其碑字尚有存者僅二十一片房𤣥齡存五百餘字禇遂良書髙士廉存三百餘字許敬宗撰趙模書段志𤣥存八百餘字張後𦙍馬周蘭陵公主各存六百餘字公主碑李義府撰殷仲容八分書姜遐許洛仁各存九百餘字姜碑姪郕公晞撰書孔頴達存千字于志寧撰阿史那忠崔敦禮各存七百餘字崔碑于志寜撰子立政書豆盧寛存四百字李義府撰薛收張阿難監門將軍王君各百餘字徒存形似唯唐儉存字千一百乙速孤行儼存字千四百劉憲撰白羲晊八分書李靖存字千五百許敬宗撰王知敬書李勣存字千八百髙宗御製御書乙速孤昭祐存字二千五百餘苗神谷撰釋行滿書又一碑存字百五六十可辨而前有蘭陵公主字中有詔詞曰第十九女則公主或有二碑不可知此崇禎十一年苟好善所修志云又二十六年而余至陵下時值雪後空山無人未及徧訪僅見李衛公一碑其下截俱劖去後又購得四五碑皆然且有并其碑而仆之者矣趙崡曰萬厯戊午四月余為九􅉄之逰距昭陵十里宿髙生儼家翼日同行北一里許得許洛仁碑又北半里許得薛收碑似昭仁寺碑駸駸有伯施法折而西一里許為趙村村有廣濟寺寺後石鼓唐人書尊勝經咒精健絶倫止存十三從趙村北行里許為莊河村未至先于道旁冢得姜遐斷碑至村則有段志𤣥碑東行數十歩有監門將軍王君碑横於田間又東行數十歩一碑無字亦無冢蓋土人平之而并磨其碑耳以圖考疑是長孫無忌碑又東行半里許為劉洞村流水界之渡而東有房梁公𤣥齡碑褚河南正書又東數十歩有髙士亷碑又東數百歩有李靖碑撰書姓氏殘缺與諸碑同而上半完好靖冢作三山形文皇以象其功土人謂上三冢李勣冢亦如靖土人謂下三冢二冢南北相去不二里勣碑髙宗御書髙二丈餘嶄然屹立與温彦博碑搨者甚多土人捶其字殆盡彦博碑在靖碑北數十歩歐陽詢書書法視皇甫九成化度三碑最為得中而不復可搨至西峪村村東南古冢相連有褚亮碑阿史那忠碑張後𦙍碑孔穎達碑豆盧寛碑張阿難碑鱗次都不百歩書與段姜等碑皆有法而孔碑極類虞伯施但結搆小疎昔人謂為伯施書非也頴達卒在世南後當是習世南者書之爾既而又得蘭陵公主碑于老軍營之西北得馬周碑于狗村之東得唐儉碑于小陽村之北又得崔敦禮碑又有尉遲敬徳碑自額以下埋土中聞十五年前令芮質田掘而搨數十紙余出之了無一字又山半數冢土人謂宰相墳仆一碑𫝊是魏鄭公碑其東山半數冢土人謂亂冢坪仆二碑余皆起之則與尉遲碑同蓋土人捶而仆且瘞之也又明日登山謁昭陵有六馬皆以片石刻其半左右各三陵北四十五里叱干村村東二冡一為乙速孤昭祐碑苗神客撰釋行滿正書一為乙速孤行儼碑劉憲撰白羲晊八分書地僻搨者少故得稍完褒公段志𤣥碑正書貞觀十六年今在醴泉縣殘缺京師至徳觀主孟法師碑岑文本撰褚遂良正書貞觀十六年五月拓本贈比干太師詔并祭文薛純陁八分書貞觀十九年二月今重刻在衛輝府舊唐書太宗紀貞觀十九年二月贈殷比干為太師諡曰忠烈命所司封墓葺祠堂春秋祠以少牢上自為文以祭之晉祠銘太宗御製并書行書貞觀二十一年七月祠在今太原府西南四十里距今太原縣八里而今縣則古晉陽之故址唐時為并州為北都為河東節度使治昔人立廟於此以祀唐叔考之北齊書已有其名而唐髙祖起兵嘗禱于此冊府元龜太宗貞觀二十年正月幸晉祠樹碑製文親書之於石今存祠中蓋昔之并都甚大祠去城三四里爾在懸甕山之麓晉水之所發源後人於此引池結亭架橋其上林水翳然足為一方之勝其廟負山而東面者晉水之神南面者唐叔之神後晉天福六年封唐叔為興安王臺駘為昌寜公而宋時又封晉水為顯靈昭濟聖母飾為婦人之像今之人但言聖母而不復知有唐叔為古先有土之君矣水經注云昔智伯遏晉水以灌晉陽後人踵其遺蹟蓄以為沼沼西際山枕水有唐叔虞祠水側有涼堂結飛梁於水上北史薛孝通曽與諸人同詣晉祠皆屈膝盡禮孝通獨捧手不拜顧而言曰此乃諸侯之國去吾何逺㳟而無禮將為神笑是則當時之所祀者唐叔非水神也祠前蓮花臺上有鐵人四一紹聖四年一五年造俱完一𢎞治十一年一無年月俱壊今之工不及古也碑隂字體不一其上右方云司徒太子太師上柱國趙國公臣無忌太子太保上柱國宋國公臣瑀特進太子詹事兼左衞率上柱國英國公臣勣光禄大夫刑部尚書上柱國鄖國公臣張亮禮部尚書上柱國江夏郡王臣道宗太常卿駙馬都尉柱國安徳郡公臣楊師道正議大夫守中書令太子左庶子兼攝吏部尚書護軍臣馬周凡七行皆當日書者其餘則皆宋人續題錯亂無次其空處又有洪武二年行省參知政事楊憲題而絶無一唐人題者以御書之碑不敢擅刻也東軒筆録吕升卿為京東察訪㳺㤗山題名於真宗御製封禪碑之隂刋刻搨夲傳於四方後二年升卿判國子監㑹蔡承禧為御史言其題名事以為大不㳟遂罷升卿判監他碑則唐人之題固纍纍也舊唐書東夷傳新羅王真徳遣其弟國相伊贊于金春秋及其子文正來朝春秋請詣國學觀釋奠及講論太宗因賜以所製温湯及晉祠碑并新撰晉書將歸國令三品已上宴餞之淤泥禪寺心經正書貞觀二十二年三月今在京師城内西南隅秀峰寺其末曰大唐貞觀二十二年三月吉日建立誤作三十二以三字改成弍字按貞觀止於二十三年此碑疑是後人偽刻然予見兖州龍興寺修三門記宋太平興國七年刻亦以八字改成七字古人碑碣之文亦有草率若此者此碑又曰宫官張功謹敬徳監造今山東河北寺院多云創自敬徳或謂是尉遲敬徳非也敬徳名㳟考許敬宗所作神道碑及本傳竝無鎮幽州事亦不當列於宫官之下也又史言尉遲敬徳晚年閒居學延年術修飾池臺奏清商樂以自奉養不交通賔客凡十六年而不聞其事佛國子祭酒孔頴達碑于志寧撰正書貞觀二十六年今在醴泉縣殘缺梁公房𤣥齡碑褚遂良正書今在醴泉縣金石文字記巻二
